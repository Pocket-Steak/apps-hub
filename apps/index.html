<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak's Apps</title>
  <meta name="description" content="A bold, fun hub for PocketSteak's projects and apps." />

  <style>
    :root{
      --ink:#0a0a0a; --ink-invert:#fff;
      --shadow-1:0 20px 60px rgba(0,0,0,.35);
      --radius-xxl:28px; --grid-max:1120px;
      --tile-fg:#0b0b0b; --mark-bg:rgba(255,255,255,.92); --mark-border:rgba(0,0,0,.05);
      --brand:#ff7a18;
    }

    .theme-night{
      --bg-a:#0b0b0d; --bg-b:#141417; --bg-c:#1c1c20; --bg-d:#2a2a2f;
      --tile-1:linear-gradient(135deg,#2c2c31,#16161a);
      --tile-2:linear-gradient(135deg,#34343a,#1b1b20);
      --tile-3:linear-gradient(135deg,#3a3a41,#202026);
      --tile-4:linear-gradient(135deg,#2f2f36,#141419);
      --tile-fg:#f2f3f5; --mark-bg:rgba(255,255,255,.08); --mark-border:rgba(255,255,255,.15);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink-invert);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,.18), transparent 60%),
        radial-gradient(1000px 600px at 110% 10%, rgba(255,255,255,.12), transparent 55%),
        linear-gradient(135deg,var(--bg-a),var(--bg-b) 35%,var(--bg-c) 70%,var(--bg-d));
      background-size:200% 200%;
      animation:bgShift 18s ease-in-out infinite alternate;
    }
    @keyframes bgShift{from{background-position:0% 40%}to{background-position:100% 60%}}

    header{max-width:var(--grid-max);margin:0 auto;padding:20px 18px 0}
    .mast{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
    }

    .logo{
      width:clamp(104px,14vw,148px);
      display:block;
      flex:0 0 auto;
      filter:drop-shadow(0 14px 28px rgba(0,0,0,.28));
    }

    .mast-title{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      line-height:1.02;
      text-align:center;
    }
    .mast-title .line1{ font-weight:900; font-size:clamp(34px,4.9vw,72px); }
    .mast-title .line2{ font-weight:900; font-size:clamp(31px,4.4vw,66px); }

    .mast-title .line1,
    .mast-title .line2 {
      background: linear-gradient(180deg, #ffb457, #ff7a18 60%, #ff5400);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .mast-bar{
      height:8px; border-radius:999px;
      background:rgba(255,255,255,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 10px 26px rgba(0,0,0,.18);
      margin:12px 0 14px 0;
    }

    main{max-width:var(--grid-max);margin:0 auto;padding:8px 18px 42px}
    .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(235px,1fr))}

    .tile{
      display:flex;flex-direction:column;gap:10px;padding:18px;
      border-radius:24px;
      background:var(--tile-1);
      color:var(--tile-fg);
      box-shadow:var(--shadow-1);
      border:1px solid rgba(255,255,255,.2);
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .tile:hover{transform:translateY(-3px);box-shadow:0 22px 56px rgba(0,0,0,.42)}

    .mark{
      width:54px;height:54px;display:grid;place-items:center;
      border-radius:16px;font-size:28px;
      background:var(--mark-bg);
      border:1px solid var(--mark-border);
    }

    .name{font-weight:900;font-size:21px;line-height:1.08}
    .desc{opacity:.9;font-weight:600;font-size:14px;line-height:1.4}

    .actions{margin-top:auto;display:flex;justify-content:flex-end}

    .btn{
      font-weight:900;
      padding:9px 13px;
      border-radius:12px;
      background:var(--brand);
      color:#fff;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .btn.disabled{
      background:rgba(255,255,255,.18);
      cursor:not-allowed;
    }

    footer{text-align:center;color:rgba(255,255,255,.75);font-weight:600;padding-bottom:20px;font-size:13px}

    @media (max-height: 900px){
      header{padding:16px 16px 0}
      .logo{width:clamp(96px,13vw,132px)}
      .mast-title .line1{font-size:clamp(28px,4.2vw,60px)}
      .mast-title .line2{font-size:clamp(26px,3.8vw,54px)}
      .mast-bar{margin:10px 0 12px 0}
      main{padding:6px 16px 30px}
      .grid{gap:14px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
      .tile{padding:16px;gap:8px}
      .mark{width:48px;height:48px;font-size:24px}
      .name{font-size:19px}
      .desc{font-size:13px}
    }

    @media (max-width: 700px){
      header{padding:16px 14px 0}
      .mast{gap:8px}
      .logo{width:96px}
      main{padding:6px 14px 28px}
      .grid{gap:14px;grid-template-columns:1fr}
    }
  </style>
</head>

  <script>
    const APPS = [
      {
        emoji: "🗳️",
        name: "The Secret Vote",
        desc: "Anonymous room-based ranking magic.",
        url: "https://pocket-steak.github.io/secret-vote/#/"
      },
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "Live countdown to August 15, 2026.",
        url: "/countdown/"
      },
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "Weekly calendar, grocery list, to-do list, and family notes.",
        url: "/family/"
      },
      {
        emoji: "🧪",
        name: "Command Center TST",
        desc: "Test copy of the family command center for trying changes safely.",
        url: "/family-tst/"
      }
    ];

    const grid = document.getElementById("grid");

    grid.innerHTML = APPS.map((app) => `
      <article class="tile" data-url="${app.url}" data-wip="${app.underConstruction ? 1 : 0}">
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <div class="actions">
          ${
            app.underConstruction
              ? `<button class="btn disabled">Coming Soon</button>`
              : `<button class="btn">Open</button>`
          }
        </div>
      </article>
    `).join("");

    grid.addEventListener("click", (e) => {
      const tile = e.target.closest(".tile");
      if (!tile) return;
      if (tile.dataset.wip === "1") return;

      const url = tile.dataset.url;
      if (!url) return;

      if (url.startsWith("/")) {
        window.location.href = url;
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });
  </script>
</body>
</html>
