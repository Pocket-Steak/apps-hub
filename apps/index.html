<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PS STACKD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hot: #FF4500;
      --hot-faint: rgba(255,69,0,0.08);
      --bg-deep: #080300;
      --text: #f0ece4;
      --muted: #888;
      --dim: #1a0a00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* Full-page subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,69,0,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,69,0,0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    /* Page corner brackets */
    .c { position: fixed; width: 28px; height: 28px; z-index: 10; pointer-events: none; }
    .c-tl { top: 16px; left: 16px; border-top: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .c-tr { top: 16px; right: 16px; border-top: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }
    .c-bl { bottom: 16px; left: 16px; border-bottom: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .c-br { bottom: 16px; right: 16px; border-bottom: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }

    /* ── Header ── */
    .s-header {
      position: relative;
      z-index: 1;
      padding: 36px 48px 32px;
      border-bottom: 1px solid var(--dim);
      background: linear-gradient(180deg, rgba(255,69,0,0.04) 0%, transparent 100%);
    }

    .s-lockup {
      display: flex;
      align-items: center;
      gap: 24px;
      max-width: 1160px;
      margin: 0 auto;
    }

    .s-logo-img {
      width: clamp(72px, 9vw, 100px);
      flex-shrink: 0;
      filter:
        drop-shadow(0 0 20px rgba(255,69,0,0.7))
        drop-shadow(0 0 50px rgba(255,69,0,0.3));
      animation: float 4.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .s-title-col {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .s-bar-mark {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 6px;
    }

    .s-bar {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF4500, #ff2200);
    }
    .s-bar:nth-child(1) { width: 120px; }
    .s-bar:nth-child(2) { width: 84px; opacity: 0.65; }
    .s-bar:nth-child(3) { width: 50px; opacity: 0.35; }

    .s-wordmark {
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(30px, 4.5vw, 52px);
      letter-spacing: -1px;
      color: #fff;
      line-height: 1.0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .s-wordmark .hot {
      color: var(--hot);
      text-shadow: 0 0 22px rgba(255,69,0,0.8);
    }

    .s-tagline {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 5px;
      color: var(--hot);
      opacity: 0.4;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .s-hud {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: rgba(255,69,0,0.3);
      letter-spacing: 2px;
    }

    /* ── Tiles section ── */
    .grid-section {
      position: relative;
      z-index: 1;
      padding: 48px 48px 64px;
    }

    .modules-inner {
      max-width: 1160px;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--hot);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,69,0,0.18);
      opacity: 0.65;
    }

    .app-layout { display: flex; flex-direction: column; gap: 14px; }

    .grid { display: grid; gap: 14px; }
    .row-primary { grid-template-columns: repeat(4, 1fr); }
    .row-secondary { grid-template-columns: repeat(2, 1fr); }

    .row-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,69,0,0.15) 30%, rgba(255,69,0,0.15) 70%, transparent);
      margin: 6px 0;
    }

    .tile {
      position: relative;
      background: rgba(255,69,0,0.025);
      border: 1px solid rgba(255,69,0,0.1);
      border-radius: 8px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.22s ease;
      cursor: pointer;
    }

    .tile:hover {
      background: rgba(255,69,0,0.07);
      border-color: rgba(255,69,0,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(255,69,0,0.10), 0 0 0 1px rgba(255,69,0,0.28);
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-size: 24px;
      background: rgba(255,69,0,0.08);
      border: 1px solid rgba(255,69,0,0.14);
    }

    .name {
      font-family: 'Black Ops One', sans-serif;
      font-size: 15px;
      letter-spacing: 0.5px;
      line-height: 1.2;
      color: var(--text);
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 400;
    }

    .actions { margin-top: auto; }

    .btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--hot);
      color: #fff;
    }

    .btn:hover { background: #fff; color: #000; }

    .btn.disabled {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
      cursor: not-allowed;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn.disabled:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: #1a0800;
      border-top: 1px solid var(--dim);
      background: #050200;
    }

    /* ── Mobile ── */
    @media (max-width: 980px) {
      .row-primary { grid-template-columns: repeat(2, 1fr); }
      .s-hud { display: none; }
    }

    @media (max-width: 700px) {
      .s-header { padding: 24px 20px; }
      .grid-section { padding: 32px 20px 48px; }
      .row-primary, .row-secondary { grid-template-columns: 1fr; }
      .s-logo-img { width: 60px; }
    }
  </style>
</head>
<body>

  <div class="c c-tl"></div>
  <div class="c c-tr"></div>
  <div class="c c-bl"></div>
  <div class="c c-br"></div>

  <header class="s-header">
    <div class="s-lockup">
      <img class="s-logo-img" src="/assets/pocket_steak_logo.png" alt="Pocket Steak" onerror="this.onerror=null;this.src='/pocket_steak_logo.png';" />
      <div class="s-title-col">
        <div class="s-bar-mark">
          <div class="s-bar"></div>
          <div class="s-bar"></div>
          <div class="s-bar"></div>
        </div>
        <div class="s-wordmark">
          <span>POCKET STEAK</span>
          <span>STACK<span class="hot">D</span></span>
        </div>
        <div class="s-tagline">Every Tool. One Stack.</div>
      </div>
      <div class="s-hud">
        <span>SYS // ONLINE</span>
        <span>STACK // LOADED</span>
        <span>BUILD // ACTIVE</span>
      </div>
    </div>
  </header>

  <div class="grid-section">
    <div class="modules-inner">
      <div class="section-label">// STACK MODULES</div>
      <div class="app-layout">
        <div class="grid row-primary" id="primary-grid"></div>
        <div class="row-divider"></div>
        <div class="grid row-secondary" id="secondary-grid"></div>
      </div>
    </div>
  </div>

  <footer>© 2026 POCKET STEAK STACKD &nbsp;·&nbsp; ALL SYSTEMS NOMINAL</footer>

  <script>
    const PRIMARY_APPS = [
      {
        emoji: "🍽️",
        name: "Recipe Extractor",
        desc: "Pull clean recipes from the web.",
        url: "https://pocketsteak-recipes.vercel.app/"
      },
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "Weekly calendar, grocery list, to-do list, and family notes.",
        url: "/family/"
      },
      {
        emoji: "⭐",
        name: "FAVES",
        desc: "Store your top favorite things in ranked lists.",
        url: "https://pocket-faves.vercel.app/"
      },
      {
        emoji: "🃏",
        name: "MTG Tracker",
        desc: "Track MTG social activity and sign-ins.",
        url: "https://mtgsocialtracker.vercel.app/auth/sign-in"
      },
      {
        emoji: "⚾",
        name: "Diamond Edge",
        desc: "Baseball betting picks and edges.",
        url: "https://baseball-betting-app.vercel.app/"
      },
      {
        emoji: "🗓️",
        name: "Schedule Sync",
        desc: "Manage shifts and weekly work schedules.",
        url: "https://shiftsync-peach.vercel.app/"
      }
    ];

    const SECONDARY_APPS = [
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "Live countdown to August 15, 2026.",
        url: "/countdown/"
      },
      {
        emoji: "🧪",
        name: "Command Center TST",
        desc: "Test copy of the family command center for trying changes safely.",
        url: "/family-tst/"
      }
    ];

    const renderTiles = (apps) => apps.map((app) => `
      <article class="tile" data-url="${app.url}" data-wip="${app.underConstruction ? 1 : 0}">
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <div class="actions">
          ${app.underConstruction
            ? `<button class="btn disabled">// COMING SOON</button>`
            : `<button class="btn">LAUNCH ></button>`
          }
        </div>
      </article>
    `).join("");

    document.getElementById("primary-grid").innerHTML = renderTiles(PRIMARY_APPS);
    document.getElementById("secondary-grid").innerHTML = renderTiles(SECONDARY_APPS);

    document.addEventListener("click", (e) => {
      const tile = e.target.closest(".tile");
      if (!tile || tile.dataset.wip === "1") return;
      const url = tile.dataset.url;
      if (!url) return;
      if (url.startsWith("/")) {
        window.location.href = url;
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });
  </script>
  <script src="../feedback-widget.js" data-app-name="Apps Hub" data-feedback-endpoint="https://baseball-betting-app.vercel.app/api/send-feedback" defer></script>
</body>
</html>
