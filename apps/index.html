<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PS STACKD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hot: #FF4500;
      --hot-faint: rgba(255,69,0,0.08);
      --bg-deep: #080300;
      --text: #f0ece4;
      --muted: #888;
      --dim: #1a0a00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
      background: var(--bg-deep);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* Full-page subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,69,0,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,69,0,0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    /* Page corner brackets */
    .c { position: fixed; width: 28px; height: 28px; z-index: 10; pointer-events: none; }
    .c-tl { top: 16px; left: 16px; border-top: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .c-tr { top: 16px; right: 16px; border-top: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }
    .c-bl { bottom: 16px; left: 16px; border-bottom: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .c-br { bottom: 16px; right: 16px; border-bottom: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }

    /* ── Header ── */
    .s-header {
      position: relative;
      z-index: 1;
      padding: clamp(18px, 2.4vh, 26px) 48px clamp(14px, 2vh, 20px);
      border-bottom: 1px solid var(--dim);
      background: linear-gradient(180deg, rgba(255,69,0,0.05) 0%, transparent 100%);
    }

    .s-lockup {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 2.8vw, 30px);
      max-width: 1280px;
      margin: 0 auto;
    }

    .s-logo-frame {
      width: clamp(58px, 6.4vw, 82px);
      aspect-ratio: 11 / 14;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .s-logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter:
        drop-shadow(0 0 18px rgba(255,69,0,0.75))
        drop-shadow(0 0 45px rgba(255,69,0,0.35));
      animation: float 4.5s ease-in-out infinite;
    }

    .s-logo-fallback {
      display: none;
      width: 100%;
      aspect-ratio: 1;
      place-items: center;
      border: 1px solid rgba(255,69,0,0.45);
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,69,0,0.28), transparent 55%),
        rgba(255,69,0,0.08);
      color: #fff;
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(255,69,0,0.7);
      box-shadow: 0 0 35px rgba(255,69,0,0.18);
    }

    .s-logo-frame.logo-error .s-logo-img { display: none; }
    .s-logo-frame.logo-error .s-logo-fallback { display: grid; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .s-title-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    .s-bar-mark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-bottom: 5px;
    }

    .s-bar {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF4500, #ff2200);
    }
    .s-bar:nth-child(1) { width: 110px; }
    .s-bar:nth-child(2) { width: 77px; opacity: 0.65; }
    .s-bar:nth-child(3) { width: 46px; opacity: 0.35; }

    .s-wordmark {
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(30px, 3.8vw, 46px);
      letter-spacing: -1px;
      color: #fff;
      line-height: 1.0;
    }

    .s-wordmark .hot {
      color: var(--hot);
      text-shadow: 0 0 20px rgba(255,69,0,0.8);
    }

    .s-tagline {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 5px;
      color: var(--hot);
      opacity: 0.4;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .s-hud {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: rgba(255,69,0,0.3);
      letter-spacing: 2px;
    }

    /* ── Tiles section ── */
    .grid-section {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      padding: clamp(18px, 2.8vh, 30px) 48px clamp(22px, 3.2vh, 36px);
    }

    .modules-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--hot);
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 1px solid rgba(255,69,0,0.18);
      opacity: 0.65;
    }

    .app-layout { display: flex; flex-direction: column; gap: 12px; }

    .grid {
      display: grid;
      gap: 12px;
    }

    .app-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .tile {
      position: relative;
      background: rgba(255,69,0,0.025);
      border: 1px solid rgba(255,69,0,0.1);
      border-radius: 8px;
      min-height: 166px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: all 0.22s ease;
      cursor: pointer;
    }

    .tile:hover {
      background: rgba(255,69,0,0.07);
      border-color: rgba(255,69,0,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(255,69,0,0.10), 0 0 0 1px rgba(255,69,0,0.28);
    }

    .mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-size: 20px;
      background: rgba(255,69,0,0.08);
      border: 1px solid rgba(255,69,0,0.14);
    }

    .name {
      font-family: 'Black Ops One', sans-serif;
      font-size: 14px;
      letter-spacing: 0.3px;
      line-height: 1.2;
      color: var(--text);
    }

    .desc {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.4;
      font-weight: 400;
    }

    .actions { margin-top: auto; padding-top: 2px; }

    .btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 13px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--hot);
      color: #fff;
    }

    .btn:hover { background: #fff; color: #000; }

    .btn.disabled {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
      cursor: not-allowed;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn.disabled:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 12px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: #1a0800;
      border-top: 1px solid var(--dim);
      background: #050200;
    }

    /* ── Mobile ── */
    @media (max-width: 980px) {
      .app-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .s-hud { display: none; }
    }

    @media (max-width: 700px) {
      .s-header { padding: 20px 20px; }
      .s-lockup {
        flex-direction: column;
        gap: 12px;
      }
      .grid-section { padding: 24px 20px 40px; }
      .app-grid { grid-template-columns: 1fr; }
      .s-logo-frame { width: 56px; }
      .s-wordmark { font-size: 28px; }
    }
  </style>
</head>

  <script>
    const logo = document.getElementById('logo');
    logo.addEventListener('error', () => {
      logo.closest('.s-logo-frame')?.classList.add('logo-error');
    });

    const PRIMARY_APPS = [
      {
        emoji: "🍽️",
        name: "Recipe Extractor",
        desc: "Pull clean recipes from the web.",
        url: "https://pocketsteak-recipes.vercel.app/"
      },
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "Weekly calendar, grocery list, to-do list, and family notes.",
        url: "/family/"
      },
      {
        emoji: "⭐",
        name: "FAVES",
        desc: "Store your top favorite things in ranked lists.",
        url: "https://pocket-faves.vercel.app/"
      },
      {
        emoji: "🃏",
        name: "MTG Tracker",
        desc: "Track MTG social activity and sign-ins.",
        url: "https://mtgsocialtracker.vercel.app/auth/sign-in"
      },
      {
        emoji: "⚾",
        name: "Diamond Edge",
        desc: "Baseball betting picks and edges.",
        url: "https://baseball-betting-app.vercel.app/"
      },
      {
        emoji: "🗓️",
        name: "Schedule Sync",
        desc: "Manage shifts and weekly work schedules.",
        url: "https://shiftsync-peach.vercel.app/"
      }
    ];

    const SECONDARY_APPS = [
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "Live countdown to August 15, 2026.",
        url: "/countdown/"
      },
      {
        emoji: "🧪",
        name: "Command Center TST",
        desc: "Test copy of the family command center for trying changes safely.",
        url: "/family-tst/"
      }
    ];

    const renderTiles = (apps) => apps.map((app) => `
      <article class="tile" data-url="${app.url}" data-wip="${app.underConstruction ? 1 : 0}">
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <div class="actions">
          ${app.underConstruction
            ? `<button class="btn disabled">// COMING SOON</button>`
            : `<button class="btn">LAUNCH ></button>`
          }
        </div>
      </article>
    `).join("");

    document.getElementById("app-grid").innerHTML = renderTiles([...PRIMARY_APPS, ...SECONDARY_APPS]);

    document.addEventListener("click", (e) => {
      const tile = e.target.closest(".tile");
      if (!tile || tile.dataset.wip === "1") return;
      const url = tile.dataset.url;
      if (!url) return;
      if (url.startsWith("/")) {
        window.location.href = url;
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });
  </script>
