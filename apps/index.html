<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PS STACKD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --hot: #FF4500;
      --hot-dim: #cc3700;
      --hot-bright: #ff6a33;
      --hot-glow: rgba(255,69,0,0.55);
      --hot-faint: rgba(255,69,0,0.08);
      --hot-mid: rgba(255,69,0,0.2);
      --bg-deep: #080300;
      --bg-mid: #0f0500;
      --text: #f0ece4;
      --muted: #888;
      --dim: #1a0a00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* ── Nav ── */
    .tab-nav {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 100;
      background: #050200;
      border-bottom: 1px solid var(--dim);
    }

    .tab-btn {
      flex: 1;
      padding: 16px 8px;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
      background: transparent;
      color: #444;
      border-bottom: 3px solid transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .tab-btn.active {
      color: var(--hot);
      border-bottom-color: var(--hot);
      background: var(--hot-faint);
    }

    .tab-btn:hover:not(.active) { color: #666; }

    /* ── Hero ── */
    .s-hero {
      min-height: 100vh;
      background: var(--bg-deep);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 40px;
    }

    .s-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,69,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,69,0,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .s-glow {
      position: absolute;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(255,69,0,0.16) 0%, transparent 68%);
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .s-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.10) 3px,
        rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
    }

    .s-corner { position: absolute; width: 32px; height: 32px; }
    .s-corner.tl { top: 24px; left: 24px; border-top: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .s-corner.tr { top: 24px; right: 24px; border-top: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }
    .s-corner.bl { bottom: 24px; left: 24px; border-bottom: 2px solid rgba(255,69,0,0.45); border-left: 2px solid rgba(255,69,0,0.45); }
    .s-corner.br { bottom: 24px; right: 24px; border-bottom: 2px solid rgba(255,69,0,0.45); border-right: 2px solid rgba(255,69,0,0.45); }

    .s-lockup {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 36px;
    }

    .s-logo-img {
      width: 190px;
      filter:
        drop-shadow(0 0 28px rgba(255,69,0,0.65))
        drop-shadow(0 0 70px rgba(255,69,0,0.25));
      margin-bottom: 4px;
      animation: float 4.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .s-bar-mark {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
      width: 190px;
      padding-left: 12px;
      margin-bottom: 10px;
    }

    .s-bar {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF4500, #ff2200);
    }
    .s-bar:nth-child(1) { width: 100%; }
    .s-bar:nth-child(2) { width: 70%; opacity: 0.65; }
    .s-bar:nth-child(3) { width: 42%; opacity: 0.38; }

    .s-studio {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 7px;
      color: var(--hot);
      opacity: 0.5;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .s-wordmark {
      font-family: 'Black Ops One', sans-serif;
      font-size: clamp(58px, 14vw, 88px);
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
    }

    .s-wordmark .hot {
      color: var(--hot);
      text-shadow: 0 0 28px rgba(255,69,0,0.8);
    }

    .s-tagline {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--hot);
      opacity: 0.5;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .s-hud {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: rgba(255,69,0,0.35);
      letter-spacing: 2px;
      margin-top: 32px;
    }

    /* ── Stack modules section ── */
    .grid-section {
      background: var(--bg-deep);
      padding: 56px 28px 72px;
      position: relative;
    }

    .grid-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim) 30%, var(--dim) 70%, transparent);
    }

    .modules-inner {
      max-width: 1160px;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--hot);
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,69,0,0.18);
      opacity: 0.7;
    }

    .app-layout { display: flex; flex-direction: column; gap: 14px; }

    .grid {
      display: grid;
      gap: 14px;
    }

    .row-primary { grid-template-columns: repeat(4, 1fr); }
    .row-secondary { grid-template-columns: repeat(2, 1fr); }

    .row-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,69,0,0.18) 30%, rgba(255,69,0,0.18) 70%, transparent);
      margin: 8px 0;
    }

    .tile {
      position: relative;
      background: rgba(255,69,0,0.025);
      border: 1px solid rgba(255,69,0,0.1);
      border-radius: 8px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.22s ease;
      cursor: pointer;
    }

    .tile:hover {
      background: rgba(255,69,0,0.07);
      border-color: rgba(255,69,0,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(255,69,0,0.10), 0 0 0 1px rgba(255,69,0,0.28);
    }

    .mark {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-size: 26px;
      background: rgba(255,69,0,0.08);
      border: 1px solid rgba(255,69,0,0.15);
    }

    .name {
      font-family: 'Black Ops One', sans-serif;
      font-size: 16px;
      letter-spacing: 0.5px;
      line-height: 1.15;
      color: var(--text);
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 400;
    }

    .actions { margin-top: auto; }

    .btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--hot);
      color: #fff;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    .btn.disabled {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
      cursor: not-allowed;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn.disabled:hover {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.2);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 22px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: #1a0800;
      border-top: 1px solid var(--dim);
      background: #050200;
    }

    /* ── Mobile ── */
    @media (max-width: 980px) {
      .row-primary { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      .row-primary, .row-secondary { grid-template-columns: 1fr; }
      .s-hud { flex-direction: column; gap: 10px; align-items: center; }
      .tab-btn { font-size: 9px; padding: 13px 6px; }
      .s-logo-img { width: 140px; }
    }
  </style>
</head>
<body>

  <nav class="tab-nav">
    <a class="tab-btn active" href="/apps/">⬡ PS STACKD</a>
    <a class="tab-btn" href="https://pocketsteak-recipes.vercel.app/" target="_blank" rel="noopener noreferrer">🔥 PS FORGE</a>
    <a class="tab-btn" href="https://pocket-steak.github.io/secret-vote/#/" target="_blank" rel="noopener noreferrer">⊞ COMPARE</a>
  </nav>

  <section class="s-hero">
    <div class="s-grid"></div>
    <div class="s-glow"></div>
    <div class="s-scan"></div>

    <div class="s-corner tl"></div>
    <div class="s-corner tr"></div>
    <div class="s-corner bl"></div>
    <div class="s-corner br"></div>

    <div class="s-lockup">
      <img class="s-logo-img" src="./pocket_steak_logo.png" alt="Pocket Steak" onerror="this.onerror=null;this.src='../pocket_steak_logo.png';" />
      <div class="s-bar-mark">
        <div class="s-bar"></div>
        <div class="s-bar"></div>
        <div class="s-bar"></div>
      </div>
      <div class="s-studio">Pocket Steak</div>
      <div class="s-wordmark">STACK<span class="hot">D</span></div>
      <div class="s-tagline">Every Tool. One Stack.</div>
    </div>

    <div class="s-hud">
      <span>SYS // ONLINE</span>
      <span>STACK // LOADED</span>
      <span>BUILD // ACTIVE</span>
    </div>
  </section>

  <div class="grid-section">
    <div class="modules-inner">
      <div class="section-label">// STACK MODULES</div>
      <div class="app-layout">
        <div class="grid row-primary" id="primary-grid"></div>
        <div class="row-divider"></div>
        <div class="grid row-secondary" id="secondary-grid"></div>
      </div>
    </div>
  </div>

  <footer>© 2026 POCKET STEAK STACKD &nbsp;·&nbsp; ALL SYSTEMS NOMINAL</footer>

  <script>
    const PRIMARY_APPS = [
      {
        emoji: "🍽️",
        name: "Recipe Extractor",
        desc: "Pull clean recipes from the web.",
        url: "https://pocketsteak-recipes.vercel.app/"
      },
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "Weekly calendar, grocery list, to-do list, and family notes.",
        url: "/family/"
      },
      {
        emoji: "⭐",
        name: "FAVES",
        desc: "Store your top favorite things in ranked lists.",
        url: "https://pocket-faves.vercel.app/"
      },
      {
        emoji: "🃏",
        name: "MTG Tracker",
        desc: "Track MTG social activity and sign-ins.",
        url: "https://mtgsocialtracker.vercel.app/auth/sign-in"
      },
      {
        emoji: "⚾",
        name: "Diamond Edge",
        desc: "Baseball betting picks and edges.",
        url: "https://baseball-betting-app.vercel.app/"
      },
      {
        emoji: "🗓️",
        name: "Schedule Sync",
        desc: "Manage shifts and weekly work schedules.",
        url: "https://shiftsync-peach.vercel.app/"
      }
    ];

    const SECONDARY_APPS = [
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "Live countdown to August 15, 2026.",
        url: "/countdown/"
      },
      {
        emoji: "🧪",
        name: "Command Center TST",
        desc: "Test copy of the family command center for trying changes safely.",
        url: "/family-tst/"
      }
    ];

    const renderTiles = (apps) => apps.map((app) => `
      <article class="tile" data-url="${app.url}" data-wip="${app.underConstruction ? 1 : 0}">
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <div class="actions">
          ${
            app.underConstruction
              ? `<button class="btn disabled">// COMING SOON</button>`
              : `<button class="btn">LAUNCH ></button>`
          }
        </div>
      </article>
    `).join("");

    document.getElementById("primary-grid").innerHTML = renderTiles(PRIMARY_APPS);
    document.getElementById("secondary-grid").innerHTML = renderTiles(SECONDARY_APPS);

    document.addEventListener("click", (e) => {
      const tile = e.target.closest(".tile");
      if (!tile) return;
      if (tile.dataset.wip === "1") return;

      const url = tile.dataset.url;
      if (!url) return;

      if (url.startsWith("/")) {
        window.location.href = url;
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });
  </script>
  <script src="../feedback-widget.js" data-app-name="Apps Hub" data-feedback-endpoint="https://baseball-betting-app.vercel.app/api/send-feedback" defer></script>
</body>
</html>
