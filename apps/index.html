<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak's Apps</title>
  <meta name="description" content="A bold, fun hub for PocketSteak's projects and apps." />
  <style>
    :root {
      --brand: #ff7a18;
      --brand-glow: rgba(255, 122, 24, 0.3);
      --bg-dark: #0a0a0c;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: #a0a0ab;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      background-color: var(--bg-dark);
      /* Dynamic Mesh Gradient Background */
      background-image: 
        radial-gradient(at 0% 0%, rgba(255, 122, 24, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(100, 50, 255, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(255, 122, 24, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px 20px;
    }

    .mast {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .logo {
      width: clamp(80px, 10vw, 120px);
      filter: drop-shadow(0 0 20px var(--brand-glow));
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .mast:hover .logo { transform: scale(1.05) rotate(5deg); }

    .mast-title {
      line-height: 0.9;
      text-align: left;
    }

    .mast-title .line1 { 
      display: block;
      font-weight: 900; 
      font-size: clamp(30px, 5vw, 60px);
      letter-spacing: -0.03em;
      color: #fff;
    }

    .mast-title .line2 { 
      font-weight: 900; 
      font-size: clamp(28px, 4.5vw, 56px);
      background: linear-gradient(135deg, #ffb457, #ff7a18);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .mast-bar {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 30px 0;
    }

    main {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px 60px;
      flex: 1;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }

    .tile {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 24px;
      border-radius: 24px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tile:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 122, 24, 0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .tile:hover::before { opacity: 1; }

    .mark {
      width: 56px; height: 56px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }
    
    .tile:hover .mark { transform: scale(1.1); }

    .name { font-weight: 700; font-size: 20px; margin-bottom: 8px; }
    .desc { color: var(--text-dim); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }

    .actions { margin-top: auto; }

    .btn {
      width: 100%;
      font-weight: 700;
      padding: 12px;
      border-radius: 12px;
      background: var(--brand);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #ff8b33;
      box-shadow: 0 0 15px var(--brand-glow);
    }

    .btn:active { transform: scale(0.97); }

    .btn.disabled {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding-top: 20px; }
      .mast { flex-direction: column; text-align: center; gap: 12px; }
      .mast-title { text-align: center; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
