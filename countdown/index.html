<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown to August 15, 2026</title>

  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
      --text: #eaf2ff;
      --muted: rgba(234,242,255,0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      width: min(900px, 92vw);
      padding: 20px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .tile {
      padding: 18px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }

    .num {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 900;
      line-height: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .label {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Countdown to August 15, 2026</h1>

    <div class="grid">
      <div class="tile">
        <div class="num" id="days">00</div>
        <div class="label">Days</div>
      </div>
      <div class="tile">
        <div class="num" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="tile">
        <div class="num" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="tile">
        <div class="num" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div class="footer">
      Target: August 15, 2026 (local device time)
    </div>
  </div>

  <script>
    // Aug 15, 2026 at 12:00 AM local time
    const target = new Date(2026, 7, 15, 0, 0, 0);

    const dEl = document.getElementById("days");
    const hEl = document.getElementById("hours");
    const mEl = document.getElementById("minutes");
    const sEl = document.getElementById("seconds");

    const pad = n => String(n).padStart(2, "0");

    function tick() {
      let diff = target.getTime() - Date.now();
      if (diff < 0) diff = 0;

      const totalSeconds = Math.floor(diff / 1000);

      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      dEl.textContent = pad(days);
      hEl.textContent = pad(hours);
      mEl.textContent = pad(minutes);
      sEl.textContent = pad(seconds);
    }

    tick();
    setInterval(tick, 250);
  </script>
</body>
</html>
