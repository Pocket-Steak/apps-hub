<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown to August 15, 2026</title>

  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
      --text: #eaf2ff;
      --muted: rgba(234,242,255,0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 900;
    }

    /* ONE-LINE GRID */
    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: center;
    }

    .tile {
      padding: 20px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }

    .num {
      font-size: clamp(42px, 8vw, 96px);
      font-weight: 900;
      line-height: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .label {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    /* Landscape iPhone optimization */
    @media (max-height: 500px) {
      h1 { margin-bottom: 12px; }
      .tile { padding: 14px 8px; }
      .num { font-size: clamp(36px, 7vw, 72px); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Countdown to August 15, 2026</h1>

    <div class="row">
      <div class="tile">
        <div class="num" id="days">00</div>
        <div class="label">Days</div>
      </div>
      <div class="tile">
        <div class="num" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="tile">
        <div class="num" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
    </div>

    <div class="footer">
      Target: August 15, 2026 (local device time)
    </div>
  </div>

  <script>
    // Aug 15, 2026 @ 12:00 AM local time
    const target = new Date(2026, 7, 15, 0, 0, 0);

    const dEl = document.getElementById("days");
    const hEl = document.getElementById("hours");
    const mEl = document.getElementById("minutes");

    const pad = n => String(n).padStart(2, "0");

    function tick() {
      let diff = target.getTime() - Date.now();
      if (diff < 0) diff = 0;

      const totalMinutes = Math.floor(diff / 60000);

      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;

      dEl.textContent = pad(days);
      hEl.textContent = pad(hours);
      mEl.textContent = pad(minutes);
    }

    tick();
    setInterval(tick, 30000); // update every 30s (battery-friendly)
  </script>
</body>
</html>
