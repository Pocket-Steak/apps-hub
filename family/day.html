<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family Day View</title>
  <meta name="description" content="PocketSteak Family Calendar day view." />

  <style>
    :root{
      --panel:#1a1c22;
      --panel-2:#22252d;
      --surface:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.08);
      --border-strong:rgba(255,255,255,.12);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --accent:#ff7a18;
      --accent-2:#ffb26f;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --shadow-soft:0 8px 20px rgba(0,0,0,.22);
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:16px;
    }

    .page{
      max-width:1400px;
      margin:0 auto;
      display:grid;
      gap:14px;
      min-height:calc(100dvh - 32px);
    }

    .topbar,
    .timeline-shell,
    .modal-card,
    .status-pill{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border-strong);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .topbar{
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .top-left{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav-btn,
    .quick-add-btn,
    .save-btn,
    .delete-btn,
    .cancel-btn,
    .top-btn{
      border:none;
      border-radius:16px;
      padding:12px 16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      min-height:48px;
      transition:transform .18s ease, background .18s ease, filter .18s ease;
    }

    .nav-btn,
    .top-btn{
      background:rgba(255,255,255,.08);
      color:var(--text);
    }

    .nav-btn:hover,
    .top-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .top-btn.accent,
    .quick-add-btn,
    .save-btn{
      background:var(--accent);
      color:#fff;
    }

    .top-btn.accent:hover,
    .quick-add-btn:hover,
    .save-btn:hover{
      filter:brightness(1.06);
      transform:translateY(-1px);
    }

    .cancel-btn{
      background:rgba(255,255,255,.08);
      color:var(--text);
    }

    .cancel-btn:hover,
    .delete-btn:hover{
      transform:translateY(-1px);
    }

    .delete-btn{
      background:#b42318;
      color:#fff;
    }

    .day-title{
      font-size:25px;
      font-weight:850;
      line-height:1.08;
      letter-spacing:-.02em;
    }

    .status-pill{
      min-height:48px;
      padding:8px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
      min-width:220px;
    }

    .status-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status-text{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .timeline-shell{
      overflow:hidden;
    }

    .timeline{
      position:relative;
      display:grid;
      grid-template-columns:88px 1fr;
      min-height:1120px;
    }

    .time-col,
    .events-col{
      position:relative;
    }

    .time-slot,
    .event-slot{
      height:36px;
      border-bottom:1px solid var(--border);
    }

    .time-slot{
      padding:0 14px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      font-size:13px;
      font-weight:800;
      color:var(--muted);
    }

    .time-slot.half{
      color:transparent;
    }

    .events-col{
      position:relative;
    }

    .event-slot{
      position:relative;
    }

    .event-block{
      position:absolute;
      left:10px;
      right:10px;
      border-radius:14px;
      padding:8px 10px;
      color:#fff;
      font-weight:800;
      overflow:hidden;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      z-index:2;
    }

    .event-time{
      font-size:12px;
      opacity:.95;
      margin-bottom:4px;
    }

    .event-title{
      font-size:14px;
      line-height:1.2;
    }

    .empty-note{
      padding:14px;
      color:var(--muted);
      font-weight:700;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:50;
    }

    .modal.open{
      display:flex;
    }

    .modal-card{
      width:min(500px, 100%);
      padding:18px;
      display:grid;
      gap:16px;
    }

    .modal-title{
      font-size:20px;
      font-weight:850;
    }

    .form-grid{
      display:grid;
      gap:12px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .time-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .duration-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .duration-btn{
      border:none;
      border-radius:14px;
      padding:10px 12px;
      min-height:44px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease;
    }

    .duration-btn:hover{
      transform:translateY(-1px);
    }

    .duration-btn.active{
      background:var(--accent);
      color:#fff;
    }

    .field label{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
    }

    .field input,
    .field select{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }

    .modal-actions{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .modal-actions-left,
    .modal-actions-right{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .error-text{
      color:#ffb4ab;
      font-size:14px;
      font-weight:700;
      min-height:20px;
    }

    @media (max-width: 1024px){
      body{
        padding:16px;
      }

      .topbar{
        align-items:stretch;
      }

      .top-actions{
        width:100%;
      }

      .top-actions .nav-btn,
      .top-actions .top-btn,
      .top-actions .quick-add-btn{
        flex:1 1 180px;
      }

      .status-pill{
        width:100%;
      }
    }

    @media (max-width: 800px){
      body{
        padding:14px;
      }

      .timeline{
        grid-template-columns:74px 1fr;
      }

      .day-title{
        font-size:22px;
      }

      .event-block{
        left:8px;
        right:8px;
      }

      .topbar{
        align-items:stretch;
      }

      .top-actions{
        width:100%;
      }

      .top-actions .nav-btn,
      .top-actions .top-btn,
      .top-actions .quick-add-btn{
        flex:1 1 0;
      }

      .status-pill{
        width:100%;
      }

      .time-grid{
        grid-template-columns:1fr;
      }
    }

    @media (orientation: landscape) and (max-height: 900px){
      body{
        padding:12px;
      }

      .page{
        gap:12px;
      }

      .topbar{
        padding:14px 16px;
      }

      .day-title{
        font-size:21px;
      }

      .nav-btn,
      .quick-add-btn,
      .save-btn,
      .delete-btn,
      .cancel-btn,
      .top-btn{
        min-height:44px;
        padding:10px 14px;
      }

      .status-pill{
        min-height:44px;
        padding:8px 12px;
      }

      .timeline{
        min-height:940px;
        grid-template-columns:76px 1fr;
      }

      .time-slot,
      .event-slot{
        height:32px;
      }

      .modal{
        padding:12px;
      }

      .modal-card{
        padding:16px;
        gap:12px;
      }
    }

    @media (max-height: 960px){
      body{
        padding:12px;
      }

      .page{
        gap:12px;
        min-height:calc(100dvh - 24px);
      }

      .topbar{
        padding:12px 14px;
      }

      .nav-btn,
      .quick-add-btn,
      .save-btn,
      .delete-btn,
      .cancel-btn,
      .top-btn{
        min-height:44px;
        padding:10px 14px;
        font-size:14px;
      }

      .status-pill{
        min-height:44px;
        padding:7px 12px;
      }

      .day-title{
        font-size:22px;
      }

      .timeline{
        min-height:980px;
        grid-template-columns:80px 1fr;
      }

      .time-slot,
      .event-slot{
        height:34px;
      }
    }

    @media (orientation: landscape) and (max-height: 820px){
      body{
        padding:10px;
      }

      .page{
        gap:10px;
        min-height:calc(100dvh - 20px);
      }

      .topbar{
        padding:10px 12px;
      }

      .day-title{
        font-size:20px;
      }

      .timeline{
        min-height:860px;
        grid-template-columns:74px 1fr;
      }

      .time-slot,
      .event-slot{
        height:30px;
      }

      .time-slot{
        padding:0 10px;
        font-size:12px;
      }

      .event-block{
        left:8px;
        right:8px;
        padding:7px 8px;
      }

      .event-time,
      .event-title{
        font-size:12px;
      }
    }
  </style>

  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div class="page">
    <section class="topbar">
      <div class="top-left">
        <div class="top-actions">
          <img src="/assets/pocket_steak_logo.png" alt="PocketSteak logo" style="width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 6px 14px rgba(0,0,0,.28));" />
          <button class="nav-btn" id="backHomeBtn" type="button">← Back to Home</button>
        </div>
        <div class="day-title" id="dayTitle">Day View</div>
      </div>

      <div class="top-actions">
        <button class="top-btn" type="button" onclick="window.location.href='/settings'">Settings</button>
        <div style="display:none;">
          <div class="status-pill">
            <div class="status-label">Google</div>
            <div class="status-text" id="statusText">Loading…</div>
          </div>
          <button class="top-btn accent" id="authBtn" type="button">Connect</button>
          <button class="top-btn" id="signOutBtn" type="button" style="display:none;">Sign Out</button>
        </div>
        <button class="quick-add-btn" id="quickAddBtn" type="button">Quick Add</button>
      </div>
    </section>

    <section class="timeline-shell">
      <div class="timeline">
        <div class="time-col" id="timeCol"></div>
        <div class="events-col" id="eventsCol"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-card">
      <div class="modal-title" id="modalTitle">Add Event</div>

      <div class="form-grid">
        <div class="field">
          <label for="eventCalendar">Calendar</label>
          <select id="eventCalendar">
            <option value="">Select a calendar</option>
          </select>
        </div>

        <div class="field">
          <label for="eventName">Event Name</label>
          <input id="eventName" type="text" placeholder="Enter event name" />
        </div>

        <div class="field">
          <label for="eventDate">Date</label>
          <input id="eventDate" type="date" />
        </div>

        <div class="time-grid">
          <div class="field">
            <label for="eventStart">Start Time</label>
            <select id="eventStart"></select>
          </div>

          <div class="field">
            <label for="eventEnd">End Time</label>
            <select id="eventEnd"></select>
          </div>
        </div>

        <div class="field">
          <label>Quick Duration</label>
          <div class="duration-row" id="durationRow">
            <button class="duration-btn active" data-duration="30" type="button">30 min</button>
            <button class="duration-btn" data-duration="60" type="button">1 hour</button>
            <button class="duration-btn" data-duration="90" type="button">90 min</button>
            <button class="duration-btn" data-duration="120" type="button">2 hours</button>
          </div>
        </div>
      </div>

      <div class="error-text" id="errorText"></div>

      <div class="modal-actions">
        <div class="modal-actions-left">
          <button class="delete-btn" id="deleteBtn" type="button" style="display:none;">Delete</button>
        </div>

        <div class="modal-actions-right">
          <button class="cancel-btn" id="cancelBtn" type="button">Cancel</button>
          <button class="save-btn" id="saveBtn" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CLIENT_ID = "82204016171-ta1ipuu88gie0tkq69je3di5uifu1kki.apps.googleusercontent.com";
    const API_KEY = "AIzaSyBPZEeYB8IaheJPJA2Y44msGfDwIhJMpGU";
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = [
      "https://www.googleapis.com/auth/calendar",
      "https://www.googleapis.com/auth/spreadsheets",
    ].join(" ");

    const TOKEN_KEY = "pocketsteak_google_access_token";
    const TOKEN_EXP_KEY = "pocketsteak_google_token_exp";

    const START_HOUR = 6;
    const END_HOUR = 22;
    const SLOT_MINUTES = 30;
    const SLOT_HEIGHT = 40;

    let tokenClient = null;
    let gapiInited = false;
    let gisInited = false;

    let selectedDate = getDateFromQuery();
    let calendarsById = new Map();
    let dayEvents = [];
    let editingEvent = null;
    let selectedDuration = 30;

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function saveToken(accessToken, expiresInSeconds = 3600) {
      const expiresAt = Date.now() + (expiresInSeconds * 1000);
      localStorage.setItem(TOKEN_KEY, accessToken);
      localStorage.setItem(TOKEN_EXP_KEY, String(expiresAt));
    }

    function getSavedToken() {
      const token = localStorage.getItem(TOKEN_KEY);
      const exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || "0");
      if (!token || !exp) return null;
      if (Date.now() >= exp) {
        clearSavedToken();
        return null;
      }
      return token;
    }

    function clearSavedToken() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_EXP_KEY);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseDateKey(dateKey) {
      const [year, month, day] = dateKey.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatLongDate(dateKey) {
      const date = parseDateKey(dateKey);
      return date.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function getDateFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const date = params.get("date");
      if (date) return date;
      return formatDateKey(new Date());
    }

    function getCalendarColor(calendarId) {
      const found = calendarsById.get(calendarId);
      return found?.backgroundColor || "#ff7a18";
    }

    function getCalendarOptions() {
      const select = document.getElementById("eventCalendar");
      const calendars = [...calendarsById.values()].filter(cal => cal.selected !== false);

      select.innerHTML = `
        <option value="">Select a calendar</option>
        ${calendars.map(cal => `<option value="${cal.id}">${cal.summary}</option>`).join("")}
      `;
    }

    function minutesToTime(minutes) {
      const safeMinutes = Math.max(START_HOUR * 60, Math.min(minutes, END_HOUR * 60));
      const hour = Math.floor(safeMinutes / 60);
      const minute = safeMinutes % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function populateTimeOptions() {
      const startSelect = document.getElementById("eventStart");
      const endSelect = document.getElementById("eventEnd");
      const options = [];

      for (let minutes = START_HOUR * 60; minutes <= END_HOUR * 60; minutes += SLOT_MINUTES) {
        const value = minutesToTime(minutes);
        options.push(`<option value="${value}">${formatTimeOption(value)}</option>`);
      }

      startSelect.innerHTML = `<option value="">Choose start time</option>${options.join("")}`;
      endSelect.innerHTML = `<option value="">Choose end time</option>${options.join("")}`;
    }

    function formatTimeOption(timeStr) {
      const [hour, minute] = timeStr.split(":").map(Number);
      const date = new Date();
      date.setHours(hour, minute, 0, 0);
      return date.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function setDurationButtonsActive(duration) {
      selectedDuration = duration;
      document.querySelectorAll(".duration-btn").forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.duration) === duration);
      });
    }

    function suggestEndTime(startValue, duration = selectedDuration) {
      if (!startValue) return;
      const startMinutes = timeToMinutes(startValue);
      const endMinutes = Math.min(startMinutes + duration, END_HOUR * 60);
      const endValue = minutesToTime(endMinutes);
      document.getElementById("eventEnd").value = endValue;
    }

    function openAddModalAtTime(startValue = "", duration = 60) {
      openAddModal();

      if (!startValue) {
        setDurationButtonsActive(duration);
        return;
      }

      document.getElementById("eventStart").value = startValue;
      setDurationButtonsActive(duration);
      suggestEndTime(startValue, duration);
    }

    function buildTimelineShell() {
      const timeCol = document.getElementById("timeCol");
      const eventsCol = document.getElementById("eventsCol");

      timeCol.innerHTML = "";
      eventsCol.innerHTML = "";

      for (let hour = START_HOUR; hour < END_HOUR; hour++) {
        for (let half = 0; half < 2; half++) {
          const slotMinutes = (hour * 60) + (half * SLOT_MINUTES);
          const slotTime = minutesToTime(slotMinutes);

          const timeSlot = document.createElement("div");
          timeSlot.className = `time-slot ${half === 1 ? "half" : ""}`;
          timeSlot.textContent = half === 0 ? formatHour(hour) : "";
          timeSlot.dataset.time = slotTime;
          timeSlot.style.cursor = "pointer";
          timeSlot.addEventListener("click", () => openAddModalAtTime(slotTime));
          timeCol.appendChild(timeSlot);

          const eventSlot = document.createElement("div");
          eventSlot.className = "event-slot";
          eventSlot.dataset.time = slotTime;
          eventSlot.addEventListener("click", () => openAddModalAtTime(slotTime));
          eventsCol.appendChild(eventSlot);
        }
      }
    }

    function formatHour(hour24) {
      const suffix = hour24 >= 12 ? "PM" : "AM";
      const hour12 = ((hour24 + 11) % 12) + 1;
      return `${hour12}:00 ${suffix}`;
    }

    function timeToMinutes(timeStr) {
      const [hour, minute] = timeStr.split(":").map(Number);
      return (hour * 60) + minute;
    }

    function formatTimeLabel(dateTimeString) {
      const date = new Date(dateTimeString);
      return date.toLocaleTimeString([], {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function renderHeader() {
      document.getElementById("dayTitle").textContent = formatLongDate(selectedDate);
    }

    function renderEvents() {
      const eventsCol = document.getElementById("eventsCol");
      const existingBlocks = eventsCol.querySelectorAll(".event-block, .empty-note");
      existingBlocks.forEach(block => block.remove());

      const timedEvents = dayEvents.filter(event => !!event.start?.dateTime && !!event.end?.dateTime);

      if (timedEvents.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = "No timed events for this day.";
        eventsCol.appendChild(empty);
        return;
      }

      timedEvents.forEach(event => {
        const startDate = new Date(event.start.dateTime);
        const endDate = new Date(event.end.dateTime);

        const startMinutes = (startDate.getHours() * 60) + startDate.getMinutes();
        const endMinutes = (endDate.getHours() * 60) + endDate.getMinutes();
        const baseMinutes = START_HOUR * 60;

        const top = ((startMinutes - baseMinutes) / SLOT_MINUTES) * SLOT_HEIGHT;
        const height = Math.max(((endMinutes - startMinutes) / SLOT_MINUTES) * SLOT_HEIGHT, SLOT_HEIGHT);

        const block = document.createElement("div");
        block.className = "event-block";
        block.style.top = `${top}px`;
        block.style.height = `${height - 4}px`;
        block.style.background = getCalendarColor(event.calendarId);

        block.innerHTML = `
          <div class="event-time">${formatTimeLabel(event.start.dateTime)} - ${formatTimeLabel(event.end.dateTime)}</div>
          <div class="event-title">${event.summary || "(Untitled event)"}</div>
        `;

        block.addEventListener("click", () => openEditModal(event));
        eventsCol.appendChild(block);
      });
    }

    async function loadGoogleDayData() {
      try {
        setStatus("Loading day…");

        const calendarResp = await gapi.client.calendar.calendarList.list();
        const calendars = calendarResp.result.items || [];
        const visibleCalendars = calendars.filter(cal => cal.selected !== false);

        calendarsById = new Map(visibleCalendars.map(cal => [cal.id, cal]));
        getCalendarOptions();

        const dayStart = new Date(`${selectedDate}T00:00:00`);
        const dayEnd = new Date(`${selectedDate}T23:59:59`);

        const responses = await Promise.all(
          visibleCalendars.map(cal =>
            gapi.client.calendar.events.list({
              calendarId: cal.id,
              timeMin: dayStart.toISOString(),
              timeMax: dayEnd.toISOString(),
              showDeleted: false,
              singleEvents: true,
              orderBy: "startTime",
              maxResults: 250,
            }).then(resp => {
              const items = resp.result.items || [];
              return items.map(event => ({
                ...event,
                calendarId: cal.id,
              }));
            })
          )
        );

        dayEvents = responses
          .flat()
          .sort((a, b) => {
            const aStart = a.start.dateTime || `${a.start.date}T00:00:00`;
            const bStart = b.start.dateTime || `${b.start.date}T00:00:00`;
            return aStart.localeCompare(bStart);
          });

        renderAll();
        setStatus(`Loaded ${dayEvents.length} events`);
      } catch (err) {
        console.error(err);
        setStatus("Load failed");
      }
    }

    async function gapiLoaded() {
      await new Promise((resolve) => gapi.load("client", resolve));
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });
      gapiInited = true;
      maybeReady();
    }

    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.error(resp);
            setStatus("Connection failed");
            return;
          }

          const token = gapi.client.getToken();
          if (token?.access_token) {
            saveToken(token.access_token, resp.expires_in || 3600);
          }

          document.getElementById("authBtn").textContent = "Refresh";
          document.getElementById("signOutBtn").style.display = "inline-flex";

          await loadGoogleDayData();
        },
      });

      gisInited = true;
      maybeReady();
    }

    async function maybeReady() {
      if (!gapiInited || !gisInited) return;

      document.getElementById("authBtn").disabled = false;

      const savedToken = getSavedToken();
      if (savedToken) {
        gapi.client.setToken({ access_token: savedToken });
        document.getElementById("authBtn").textContent = "Refresh";
        document.getElementById("signOutBtn").style.display = "inline-flex";
        setStatus("Restoring connection…");
        await loadGoogleDayData();
      } else {
        setStatus("Not connected");
      }
    }

    async function handleAuthClick() {
      if (!tokenClient) return;
      setStatus("Connecting…");
      tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function handleSignoutClick() {
      const token = gapi.client.getToken();
      if (token?.access_token) {
        google.accounts.oauth2.revoke(token.access_token);
      }

      gapi.client.setToken("");
      clearSavedToken();
      calendarsById = new Map();
      dayEvents = [];
      document.getElementById("authBtn").textContent = "Connect";
      document.getElementById("signOutBtn").style.display = "none";
      setStatus("Not connected");
      renderAll();
    }

    function openAddModal() {
      if (calendarsById.size === 0) {
        alert("Connect Google Calendar first.");
        return;
      }

      editingEvent = null;
      document.getElementById("modalTitle").textContent = "Add Event";
      document.getElementById("deleteBtn").style.display = "none";
      document.getElementById("errorText").textContent = "";

      getCalendarOptions();
      document.getElementById("eventCalendar").value = "";
      document.getElementById("eventName").value = "";
      document.getElementById("eventDate").value = selectedDate;
      document.getElementById("eventStart").value = "";
      document.getElementById("eventEnd").value = "";
      setDurationButtonsActive(30);

      document.getElementById("eventModal").classList.add("open");
    }

    function openEditModal(event) {
      editingEvent = event;
      document.getElementById("modalTitle").textContent = "Edit Event";
      document.getElementById("deleteBtn").style.display = "inline-block";
      document.getElementById("errorText").textContent = "";

      getCalendarOptions();
      document.getElementById("eventCalendar").value = event.calendarId || "";
      document.getElementById("eventName").value = event.summary || "";
      document.getElementById("eventDate").value = selectedDate;

      if (event.start?.dateTime) {
        const start = new Date(event.start.dateTime);
        document.getElementById("eventStart").value = `${String(start.getHours()).padStart(2, "0")}:${String(start.getMinutes()).padStart(2, "0")}`;
      } else {
        document.getElementById("eventStart").value = "";
      }

      if (event.end?.dateTime) {
        const end = new Date(event.end.dateTime);
        document.getElementById("eventEnd").value = `${String(end.getHours()).padStart(2, "0")}:${String(end.getMinutes()).padStart(2, "0")}`;
      } else {
        document.getElementById("eventEnd").value = "";
      }

      if (event.start?.dateTime && event.end?.dateTime) {
        const start = new Date(event.start.dateTime);
        const end = new Date(event.end.dateTime);
        const duration = Math.max(SLOT_MINUTES, (end.getTime() - start.getTime()) / 60000);
        const rounded = [30, 60, 90, 120].includes(duration) ? duration : 60;
        setDurationButtonsActive(rounded);
      } else {
        setDurationButtonsActive(60);
      }

      document.getElementById("eventModal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("eventModal").classList.remove("open");
    }

    function validateForm() {
      const calendarId = document.getElementById("eventCalendar").value.trim();
      const title = document.getElementById("eventName").value.trim();
      const date = document.getElementById("eventDate").value;
      const start = document.getElementById("eventStart").value;
      const end = document.getElementById("eventEnd").value;

      if (!calendarId) return "Choose a calendar.";
      if (!title) return "Enter an event name.";
      if (!date) return "Choose a date.";
      if (!start) return "Choose a start time.";
      if (!end) return "Choose an end time.";
      if (start >= end) return "End time must be after start time.";

      const minTime = "06:00";
      const maxTime = "22:00";
      if (start < minTime || end > maxTime) {
        return "Events must stay between 6:00 AM and 10:00 PM.";
      }

      return "";
    }

    function buildDateTime(dateStr, timeStr) {
      return new Date(`${dateStr}T${timeStr}:00`);
    }

    async function saveForm() {
      const error = validateForm();
      document.getElementById("errorText").textContent = error;
      if (error) return;

      const calendarId = document.getElementById("eventCalendar").value.trim();
      const title = document.getElementById("eventName").value.trim();
      const date = document.getElementById("eventDate").value;
      const start = document.getElementById("eventStart").value;
      const end = document.getElementById("eventEnd").value;

      const startDateTime = buildDateTime(date, start).toISOString();
      const endDateTime = buildDateTime(date, end).toISOString();

      const resource = {
        summary: title,
        start: { dateTime: startDateTime },
        end: { dateTime: endDateTime }
      };

      try {
        document.getElementById("saveBtn").disabled = true;

        if (!editingEvent) {
          await gapi.client.calendar.events.insert({
            calendarId,
            resource
          });
        } else {
          const originalCalendarId = editingEvent.calendarId;

          if (originalCalendarId === calendarId) {
            await gapi.client.calendar.events.update({
              calendarId,
              eventId: editingEvent.id,
              resource: {
                ...editingEvent,
                ...resource
              }
            });
          } else {
            await gapi.client.calendar.events.insert({
              calendarId,
              resource
            });

            await gapi.client.calendar.events.delete({
              calendarId: originalCalendarId,
              eventId: editingEvent.id
            });
          }
        }

        selectedDate = date;
        history.replaceState({}, "", `/family/day.html?date=${date}`);
        closeModal();
        await loadGoogleDayData();
      } catch (err) {
        console.error(err);
        document.getElementById("errorText").textContent = "Could not save the event.";
      } finally {
        document.getElementById("saveBtn").disabled = false;
      }
    }

    async function deleteEvent() {
      if (!editingEvent) return;

      const confirmed = window.confirm("Delete this event?");
      if (!confirmed) return;

      try {
        document.getElementById("deleteBtn").disabled = true;

        await gapi.client.calendar.events.delete({
          calendarId: editingEvent.calendarId,
          eventId: editingEvent.id
        });

        closeModal();
        await loadGoogleDayData();
      } catch (err) {
        console.error(err);
        document.getElementById("errorText").textContent = "Could not delete the event.";
      } finally {
        document.getElementById("deleteBtn").disabled = false;
      }
    }

    function renderAll() {
      renderHeader();
      buildTimelineShell();
      renderEvents();
    }

    document.getElementById("backHomeBtn").addEventListener("click", () => {
      window.location.href = "/family/";
    });

    if (new URLSearchParams(window.location.search).has("overlay")) {
      const backBtn = document.getElementById("backHomeBtn");
      backBtn.textContent = "Close";
      backBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopImmediatePropagation();
        window.parent.postMessage({ type: "family-overlay-close" }, "*");
      }, { capture: true });
    }

    document.getElementById("authBtn").addEventListener("click", handleAuthClick);
    document.getElementById("signOutBtn").addEventListener("click", handleSignoutClick);
    document.getElementById("quickAddBtn").addEventListener("click", openAddModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("saveBtn").addEventListener("click", saveForm);
    document.getElementById("deleteBtn").addEventListener("click", deleteEvent);
    document.getElementById("eventStart").addEventListener("change", () => {
      const startValue = document.getElementById("eventStart").value;
      const endValue = document.getElementById("eventEnd").value;

      if (!startValue) return;
      if (!endValue || endValue <= startValue) {
        suggestEndTime(startValue);
      }
    });

    document.querySelectorAll(".duration-btn").forEach((button) => {
      button.addEventListener("click", () => {
        const duration = Number(button.dataset.duration);
        setDurationButtonsActive(duration);

        const startValue = document.getElementById("eventStart").value;
        if (startValue) {
          suggestEndTime(startValue, duration);
        }
      });
    });

    document.getElementById("eventModal").addEventListener("click", (e) => {
      if (e.target.id === "eventModal") {
        closeModal();
      }
    });

    renderAll();
    populateTimeOptions();
    setDurationButtonsActive(30);
    document.getElementById("authBtn").disabled = true;

    window.addEventListener("load", async () => {
      try {
        await gapiLoaded();
        gisLoaded();

        const params = new URLSearchParams(window.location.search);
        if (params.get("add") === "1" && getSavedToken()) {
          setTimeout(openAddModal, 300);
        }
      } catch (err) {
        console.error(err);
        setStatus("Setup failed");
      }
    });
  </script>
</body>
</html>
