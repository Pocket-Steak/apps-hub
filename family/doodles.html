<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>PocketSteak Family - Doodles</title>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #1a1c22;
      --panel-2: #22252d;
      --border: rgba(255,255,255,.08);
      --border-strong: rgba(255,255,255,.14);
      --text: #f5f7fb;
      --muted: #b7bfd3;
      --accent: #ff8a1f;
      --accent-hover: #e97812;
      --danger: #dc2626;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 14px;
      --shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg,#0d0e11 0%,#12141a 35%,#171922 100%);
      overscroll-behavior: none;
    }
    body { padding: 16px; min-height: 100dvh; }
    .app { max-width: 1600px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: linear-gradient(180deg,var(--panel),var(--panel-2));
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border-strong); background: var(--panel-2);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius-md);
      font-weight: 700; cursor: pointer; min-height: 44px; font-size: 14px;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: #2a2d36; }
    .btn-accent { background: var(--accent); color: #1a1a1a; border-color: transparent; }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; border-color: transparent; }
    .status-pill {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 6px 10px; border-radius: 999px; font-size: 11px;
      border: 1px solid var(--border-strong); line-height: 1.1;
    }
    .status-pill.ok { background: rgba(34,197,94,.15); color: #86efac; border-color: rgba(34,197,94,.35); }
    .status-pill.bad { background: rgba(220,38,38,.15); color: #fca5a5; border-color: rgba(220,38,38,.35); }
    .status-label { font-size: 9px; opacity: .7; letter-spacing: .04em; }
    h1 { margin: 12px 0 0; font-size: 28px; }
    .message {
      margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-md); font-size: 13px; display: none;
    }
    .message.error { display: block; background: rgba(220,38,38,.15); color: #fca5a5; }
    .message.success { display: block; background: rgba(34,197,94,.15); color: #86efac; }

    .gallery {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }
    .doodle-card {
      position: relative; aspect-ratio: 1 / 1; border-radius: var(--radius-md);
      overflow: hidden; background: #fff; border: 1px solid var(--border-strong);
      cursor: pointer;
    }
    .doodle-card img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .doodle-card .doodle-time {
      position: absolute; bottom: 6px; left: 6px;
      background: rgba(0,0,0,.7); color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 999px;
    }
    .doodle-card .doodle-delete {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.7); color: #fff; border: none; width: 30px; height: 30px;
      border-radius: 50%; cursor: pointer; font-size: 16px; font-weight: 700; line-height: 1;
      display: none;
    }
    .doodle-card:hover .doodle-delete { display: block; }
    .empty {
      padding: 32px; text-align: center; color: var(--muted);
      border: 1px dashed var(--border-strong); border-radius: var(--radius-md);
    }

    /* Drawing overlay */
    .draw-backdrop {
      position: fixed; inset: 0; background: rgba(5,7,11,.96);
      display: none; flex-direction: column; z-index: 1000; padding: 12px; gap: 10px;
    }
    .draw-backdrop.open { display: flex; }
    .draw-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .draw-title { font-weight: 800; font-size: 18px; }
    .draw-stage {
      flex: 1 1 0; min-height: 0; min-width: 0; display: flex; align-items: center; justify-content: center;
      background: #111319; border-radius: var(--radius-md); padding: 6px; overflow: hidden;
    }
    .draw-canvas-wrap {
      aspect-ratio: 1 / 1; max-width: 100%; max-height: 100%;
      background: #fff; border-radius: 8px; box-shadow: 0 0 0 1px rgba(255,255,255,.1);
      position: relative; touch-action: none;
    }
    canvas { display: block; width: 100%; height: 100%; border-radius: 8px; cursor: crosshair; }

    .draw-tools {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
      padding: 8px; background: var(--panel); border-radius: var(--radius-md);
      border: 1px solid var(--border-strong); flex-shrink: 0;
    }
    .tool-group { display: flex; gap: 6px; align-items: center; }
    .tool-group + .tool-group {
      padding-left: 10px; margin-left: 4px; border-left: 1px solid var(--border-strong);
    }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 2px solid rgba(255,255,255,.18); padding: 0;
    }
    .color-swatch.active { border-color: var(--accent); transform: scale(1.12); box-shadow: 0 0 0 2px rgba(255,138,31,.3); }
    .size-btn {
      width: 40px; height: 36px; border-radius: 10px; cursor: pointer;
      border: 1px solid var(--border-strong); background: var(--panel-2);
      display: flex; align-items: center; justify-content: center;
    }
    .size-btn.active { border-color: var(--accent); background: rgba(255,138,31,.15); }
    .size-dot { background: var(--text); border-radius: 50%; }
    .tool-btn {
      padding: 8px 12px; border-radius: 10px; cursor: pointer;
      border: 1px solid var(--border-strong); background: var(--panel-2);
      color: var(--text); font-weight: 700; font-size: 13px; min-height: 36px;
    }
    .tool-btn.active { border-color: var(--accent); background: rgba(255,138,31,.15); color: var(--accent); }
    .tool-btn:disabled { opacity: .35; cursor: not-allowed; }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      h1 { font-size: 22px; }
      .draw-tools { padding: 6px; gap: 6px; }
      .color-swatch { width: 28px; height: 28px; }
      .tool-btn { padding: 6px 10px; font-size: 12px; min-height: 32px; }
      .draw-canvas-wrap { max-width: 100%; max-height: 100%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/family-supabase.js?v=20260421"></script>
  <script>
    (function ensurePocketSteakSupabaseFallback() {
      if (window.PocketSteakSupabase) return;
      const DEFAULT_URL = "https://vmmdskviwqddgalccoyc.supabase.co";
      const DEFAULT_ANON_KEY = "sb_publishable_Y95c2qYSmD8YKdaIeOZYWA_6GmC2OHM";
      window.PocketSteakSupabase = {
        getConfig: () => ({ url: DEFAULT_URL, anonKey: DEFAULT_ANON_KEY, configured: true }),
        createClient: () => window.supabase.createClient(DEFAULT_URL, DEFAULT_ANON_KEY,
          { auth: { persistSession: false, autoRefreshToken: false } }),
      };
    })();
  </script>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="topbar">
        <div class="toolbar-group">
          <a class="btn" href="/family/">← Back to Menu</a>
        </div>
        <div class="toolbar-group">
          <div id="statusPill" class="status-pill bad">
            <div class="status-label">SUPABASE</div>
            <div id="statusText">Loading…</div>
          </div>
          <button class="btn btn-accent" id="newBtn" type="button">+ New Doodle</button>
        </div>
      </div>
      <h1>Doodles</h1>
      <div id="message" class="message"></div>
    </section>

    <section class="card">
      <div id="gallery" class="gallery"></div>
      <div id="emptyState" class="empty" style="display:none">No doodles yet. Tap "+ New Doodle" to make one.</div>
    </section>
  </main>

  <div id="drawBackdrop" class="draw-backdrop" role="dialog" aria-modal="true" aria-labelledby="drawTitle">
    <div class="draw-header">
      <div class="draw-title" id="drawTitle">New Doodle</div>
      <div class="toolbar-group">
        <button class="btn" id="cancelBtn" type="button">Cancel</button>
        <button class="btn btn-accent" id="saveBtn" type="button">Save</button>
      </div>
    </div>

    <div class="draw-tools">
      <div class="tool-group" id="colorPalette"></div>
      <div class="tool-group" id="sizePalette"></div>
      <div class="tool-group">
        <button class="tool-btn" id="eraserBtn" type="button">Eraser</button>
        <button class="tool-btn" id="bgBtn" type="button" title="Cycle background color">
          <span id="bgSwatch" style="display:inline-block;width:14px;height:14px;border-radius:4px;border:1px solid rgba(255,255,255,.3);margin-right:6px;vertical-align:middle;background:#fff;"></span>BG
        </button>
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" type="button">Undo</button>
        <button class="tool-btn" id="redoBtn" type="button">Redo</button>
        <button class="tool-btn" id="clearBtn" type="button">Clear</button>
      </div>
    </div>

    <div class="draw-stage">
      <div class="draw-canvas-wrap">
        <canvas id="drawCanvas" width="1024" height="1024"></canvas>
      </div>
    </div>
  </div>

  <script>
    const TABLE = "family_doodles";
    const CANVAS_SIZE = 1024;
    const COLORS = ["#0a0a0a","#dc2626","#f59e0b","#22c55e","#2563eb","#a855f7","#ec4899","#ffffff"];
    const BG_COLORS = ["#ffffff","#fef3c7","#dbeafe","#fce7f3","#dcfce7","#fef9c3","#f3f4f6","#0a0a0a"];
    const SIZES  = [4, 10, 22];
    const SYNC_INTERVAL_MS = 60000;

    let supabaseClient = null;
    let doodles = [];

    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");
    const messageEl = document.getElementById("message");
    const galleryEl = document.getElementById("gallery");
    const emptyEl = document.getElementById("emptyState");
    const newBtn = document.getElementById("newBtn");
    const drawBackdrop = document.getElementById("drawBackdrop");
    const cancelBtn = document.getElementById("cancelBtn");
    const saveBtn = document.getElementById("saveBtn");
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");
    const colorPalette = document.getElementById("colorPalette");
    const sizePalette = document.getElementById("sizePalette");
    const eraserBtn = document.getElementById("eraserBtn");
    const bgBtn = document.getElementById("bgBtn");
    const bgSwatch = document.getElementById("bgSwatch");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const clearBtn = document.getElementById("clearBtn");

    let currentColor = COLORS[0];
    let currentSize = SIZES[1];
    let eraserMode = false;
    let bgColor = BG_COLORS[0];
    // Strokes shape: {color, size, points, eraser?: true}
    // Eraser strokes render using current bgColor, so changing bg after
    // erasing won't leave white smears.
    let strokes = [];
    let redoStack = [];
    let activeStroke = null;

    function setStatus(text, ok=false) {
      statusText.textContent = text;
      statusPill.classList.toggle("ok", ok);
      statusPill.classList.toggle("bad", !ok);
    }
    function showMessage(text="", type="") {
      messageEl.textContent = text; messageEl.className = "message";
      if (type) messageEl.classList.add(type);
      if (text) setTimeout(() => { if (messageEl.textContent === text) showMessage(); }, 4000);
    }
    function ensureClient() {
      if (!supabaseClient) supabaseClient = window.PocketSteakSupabase.createClient();
      return supabaseClient;
    }
    function escapeHtml(v) {
      return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function formatRelative(iso) {
      const then = new Date(iso).getTime();
      const diff = Date.now() - then;
      const m = Math.floor(diff / 60000);
      if (m < 1) return "just now";
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 7) return `${d}d ago`;
      return new Date(iso).toLocaleDateString(undefined, { month:"short", day:"numeric" });
    }

    async function loadDoodles({ silent=false } = {}) {
      try {
        if (!silent) setStatus("Loading…", false);
        const client = ensureClient();
        const { data, error } = await client.from(TABLE)
          .select("id,image_data,width,height,created_at")
          .order("created_at", { ascending: false })
          .limit(200);
        if (error) throw error;
        doodles = data || [];
        setStatus("Connected", true);
        renderGallery();
      } catch (err) {
        console.error(err);
        setStatus("Error", false);
        if (!silent) showMessage(err?.message || "Failed to load doodles.", "error");
      }
    }

    function renderGallery() {
      galleryEl.innerHTML = "";
      emptyEl.style.display = doodles.length ? "none" : "block";
      for (const d of doodles) {
        const card = document.createElement("div");
        card.className = "doodle-card";
        card.innerHTML = `
          <img src="${escapeHtml(d.image_data)}" alt="Doodle" />
          <span class="doodle-time">${escapeHtml(formatRelative(d.created_at))}</span>
          <button class="doodle-delete" type="button" title="Delete">×</button>
        `;
        card.querySelector(".doodle-delete").addEventListener("click", (e) => {
          e.stopPropagation();
          deleteDoodle(d.id);
        });
        galleryEl.appendChild(card);
      }
    }

    async function deleteDoodle(id) {
      if (!confirm("Delete this doodle?")) return;
      try {
        const client = ensureClient();
        const { error } = await client.from(TABLE).delete().eq("id", id);
        if (error) throw error;
        await loadDoodles({ silent: true });
        showMessage("Doodle deleted.", "success");
      } catch (err) {
        console.error(err);
        showMessage(err?.message || "Failed to delete.", "error");
      }
    }

    // === Drawing ===
    function buildPalette() {
      colorPalette.innerHTML = "";
      COLORS.forEach(c => {
        const b = document.createElement("button");
        b.type = "button"; b.className = "color-swatch";
        b.style.background = c;
        b.dataset.color = c;
        if (c === currentColor) b.classList.add("active");
        b.addEventListener("click", () => {
          currentColor = c; eraserMode = false;
          updateActiveTools();
        });
        colorPalette.appendChild(b);
      });
      sizePalette.innerHTML = "";
      SIZES.forEach(s => {
        const b = document.createElement("button");
        b.type = "button"; b.className = "size-btn";
        if (s === currentSize) b.classList.add("active");
        b.dataset.size = String(s);
        const dot = document.createElement("span");
        dot.className = "size-dot";
        const px = Math.max(4, Math.min(20, s));
        dot.style.width = px + "px"; dot.style.height = px + "px";
        b.appendChild(dot);
        b.addEventListener("click", () => { currentSize = s; updateActiveTools(); });
        sizePalette.appendChild(b);
      });
    }
    function updateActiveTools() {
      colorPalette.querySelectorAll(".color-swatch").forEach(el => {
        el.classList.toggle("active", el.dataset.color === currentColor && !eraserMode);
      });
      sizePalette.querySelectorAll(".size-btn").forEach(el => {
        el.classList.toggle("active", Number(el.dataset.size) === currentSize);
      });
      eraserBtn.classList.toggle("active", eraserMode);
      bgSwatch.style.background = bgColor;
      undoBtn.disabled = strokes.length === 0;
      redoBtn.disabled = redoStack.length === 0;
    }
    function clearCanvas() {
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    }
    function redrawAll() {
      clearCanvas();
      for (const stroke of strokes) drawStroke(stroke);
    }
    function drawStroke(stroke) {
      if (!stroke.points.length) return;
      ctx.strokeStyle = stroke.eraser ? bgColor : stroke.color;
      ctx.lineWidth = stroke.size;
      ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i = 1; i < stroke.points.length; i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      // Single-point dot
      if (stroke.points.length === 1) {
        ctx.fillStyle = stroke.eraser ? bgColor : stroke.color;
        ctx.beginPath();
        ctx.arc(stroke.points[0].x, stroke.points[0].y, stroke.size / 2, 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      ctx.stroke();
    }
    function canvasPoint(evt) {
      const rect = canvas.getBoundingClientRect();
      const x = (evt.clientX - rect.left) * (canvas.width  / rect.width);
      const y = (evt.clientY - rect.top)  * (canvas.height / rect.height);
      return { x, y };
    }
    function pointerDown(evt) {
      evt.preventDefault();
      canvas.setPointerCapture(evt.pointerId);
      const p = canvasPoint(evt);
      activeStroke = {
        color: currentColor,
        size: eraserMode ? Math.max(currentSize * 2, 16) : currentSize,
        eraser: eraserMode,
        points: [p],
      };
      strokes.push(activeStroke);
      redoStack = [];
      drawStroke(activeStroke);
      updateActiveTools();
    }
    function pointerMove(evt) {
      if (!activeStroke) return;
      evt.preventDefault();
      const p = canvasPoint(evt);
      const last = activeStroke.points[activeStroke.points.length - 1];
      const dx = p.x - last.x, dy = p.y - last.y;
      if (dx*dx + dy*dy < 2) return; // skip tiny
      activeStroke.points.push(p);
      ctx.strokeStyle = activeStroke.eraser ? bgColor : activeStroke.color;
      ctx.lineWidth = activeStroke.size;
      ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
    function pointerUp(evt) {
      if (!activeStroke) return;
      evt.preventDefault();
      activeStroke = null;
    }
    canvas.addEventListener("pointerdown", pointerDown);
    canvas.addEventListener("pointermove", pointerMove);
    canvas.addEventListener("pointerup", pointerUp);
    canvas.addEventListener("pointercancel", pointerUp);
    canvas.addEventListener("pointerleave", pointerUp);

    eraserBtn.addEventListener("click", () => { eraserMode = !eraserMode; updateActiveTools(); });
    bgBtn.addEventListener("click", () => {
      const idx = BG_COLORS.indexOf(bgColor);
      bgColor = BG_COLORS[(idx + 1) % BG_COLORS.length];
      redrawAll(); updateActiveTools();
    });
    undoBtn.addEventListener("click", () => {
      if (!strokes.length) return;
      redoStack.push(strokes.pop());
      redrawAll(); updateActiveTools();
    });
    redoBtn.addEventListener("click", () => {
      if (!redoStack.length) return;
      strokes.push(redoStack.pop());
      redrawAll(); updateActiveTools();
    });
    clearBtn.addEventListener("click", () => {
      if (!strokes.length) return;
      if (!confirm("Clear the whole canvas?")) return;
      strokes = []; redoStack = []; redrawAll(); updateActiveTools();
    });

    function openDraw() {
      strokes = []; redoStack = []; activeStroke = null;
      eraserMode = false; currentColor = COLORS[0]; currentSize = SIZES[1];
      bgColor = BG_COLORS[0];
      buildPalette(); updateActiveTools(); clearCanvas();
      drawBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function closeDraw() {
      drawBackdrop.classList.remove("open");
      document.body.style.overflow = "";
      // Clear ?new param so reopen doesn't fire again
      try { const u = new URL(window.location); u.searchParams.delete("new"); history.replaceState(null,"",u); } catch(_) {}
    }
    newBtn.addEventListener("click", openDraw);
    cancelBtn.addEventListener("click", () => {
      if (strokes.length && !confirm("Discard this doodle?")) return;
      closeDraw();
    });

    saveBtn.addEventListener("click", async () => {
      if (!strokes.length) { showMessage("Draw something first.", "error"); return; }
      saveBtn.disabled = true; saveBtn.textContent = "Saving…";
      try {
        const dataUrl = canvas.toDataURL("image/png");
        const client = ensureClient();
        const { error } = await client.from(TABLE).insert({
          image_data: dataUrl,
          width: CANVAS_SIZE,
          height: CANVAS_SIZE,
        });
        if (error) throw error;
        closeDraw();
        showMessage("Saved!", "success");
        await loadDoodles({ silent: true });
      } catch (err) {
        console.error(err);
        showMessage(err?.message || "Failed to save.", "error");
      } finally {
        saveBtn.disabled = false; saveBtn.textContent = "Save";
      }
    });

    function syncIfVisible() { if (document.visibilityState !== "hidden") loadDoodles({ silent: true }); }
    window.addEventListener("focus", syncIfVisible);
    document.addEventListener("visibilitychange", syncIfVisible);
    setInterval(syncIfVisible, SYNC_INTERVAL_MS);

    setStatus("Loading…", false);
    loadDoodles().then(() => {
      try {
        const u = new URL(window.location);
        if (u.searchParams.get("new") === "1") openDraw();
      } catch (_) {}
    });
  </script>
</body>
</html>
