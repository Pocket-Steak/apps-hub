<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>PocketSteak Family - Grocery List</title>

  <style>
    :root {
      --bg: #0b0f1a;
      --panel: rgba(21, 28, 47, 0.92);
      --panel-2: rgba(31, 39, 63, 0.9);
      --border: rgba(255, 255, 255, 0.09);
      --text: #f5f7fb;
      --muted: #b7bfd3;
      --danger: #d93025;
      --danger-hover: #b3261e;
      --accent: #ff8a1f;
      --accent-hover: #e97812;
      --success: #16a34a;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --tap: 72px;
      --maxw: 1800px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(44, 73, 160, 0.22), transparent 35%),
        linear-gradient(180deg, #060913 0%, #0b1120 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    body {
      padding: 22px;
    }

    .app {
      max-width: var(--maxw);
      margin: 0 auto;
      display: grid;
      gap: 22px;
    }

    .card {
      background: linear-gradient(90deg, rgba(24, 30, 49, 0.96), rgba(31, 39, 63, 0.92));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .spacer {
      min-width: 8px;
    }

    .btn {
      min-height: var(--tap);
      border: none;
      border-radius: 20px;
      padding: 0 24px;
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-accent {
      background: var(--accent);
    }

    .btn-accent:hover {
      background: var(--accent-hover);
    }

    .connect-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-pill {
      min-height: 70px;
      min-width: 320px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(10, 14, 24, 0.55);
      padding: 12px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
    }

    .status-label {
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      font-weight: 900;
      color: var(--muted);
    }

    .status-text {
      margin-top: 6px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }

    .status-ok .status-text {
      color: #b9f8c8;
    }

    .status-bad .status-text {
      color: #ffb4ab;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .item-input {
      width: 100%;
      min-height: 82px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: clamp(1.5rem, 2.3vw, 2rem);
      font-weight: 700;
      padding: 0 24px;
      outline: none;
    }

    .item-input::placeholder {
      color: rgba(255, 255, 255, 0.48);
      font-weight: 700;
    }

    .item-input:focus {
      border-color: rgba(255, 138, 31, 0.6);
      box-shadow: 0 0 0 4px rgba(255, 138, 31, 0.14);
    }

    .helper {
      margin-top: 18px;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
    }

    .message {
      margin-top: 10px;
      min-height: 28px;
      font-size: 1rem;
      font-weight: 800;
    }

    .message.error {
      color: #ffb4ab;
    }

    .message.success {
      color: #b9f8c8;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: clamp(1.8rem, 2.6vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .tile {
      min-height: 110px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      color: var(--text);
      padding: 18px 20px;
      text-align: left;
      font-size: 1.65rem;
      font-weight: 850;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      word-break: break-word;
    }

    .tile:active {
      transform: scale(0.985);
    }

    .tile:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
    }

    .tile.bought {
      opacity: 0.7;
      text-decoration: line-through;
    }

    .empty {
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: 800;
      padding-top: 12px;
    }

    .subtle {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 12px;
      font-weight: 700;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "back clear"
          "title title"
          "status connect";
      }

      .topbar > .btn-back { grid-area: back; }
      .topbar > .btn-danger { grid-area: clear; }
      .topbar > h1 { grid-area: title; }
      .topbar > .spacer { display: none; }
      .topbar > .connect-wrap { grid-area: status / status / connect / connect; }

      .connect-wrap {
        flex-direction: column;
        align-items: stretch;
      }

      .status-pill {
        min-width: 0;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .btn,
      .item-input {
        font-size: 1.35rem;
      }
    }
  </style>

  <!-- Google APIs -->
  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="topbar">
        <a class="btn btn-back" href="./index.html">← Back to Home</a>
        <button id="clearAllBtn" class="btn btn-danger" type="button">Clear All Items</button>
        <div class="spacer"></div>
        <div id="statusPill" class="status-pill status-bad">
          <div class="status-label">GOOGLE</div>
          <div id="statusText" class="status-text">Not connected</div>
        </div>
        <div class="connect-wrap">
          <button id="connectBtn" class="btn btn-accent" type="button">Connect</button>
        </div>
      </div>

      <div style="margin-top: 20px;">
        <h1>Grocery List</h1>
      </div>
    </section>

    <section id="inputCard" class="card">
      <div class="input-row">
        <input
          id="itemInput"
          class="item-input"
          type="text"
          inputmode="text"
          enterkeyhint="done"
          autocomplete="off"
          autocapitalize="words"
          spellcheck="false"
          placeholder="Add grocery item"
        />
        <button id="addBtn" class="btn btn-accent" type="button">Add Item</button>
      </div>

      <div class="helper">Tap a grocery tile to mark it bought.</div>
      <div id="message" class="message"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Active Items</h2>
      <div id="activeList" class="tile-grid"></div>
      <div id="activeEmpty" class="empty">No grocery items right now.</div>
    </section>

    <section class="card">
      <h2 class="section-title">Bought Items</h2>
      <div id="boughtList" class="tile-grid"></div>
      <div id="boughtEmpty" class="empty">No bought items yet.</div>
      <div class="subtle">Bought items stay here until you clear the list.</div>
    </section>
  </main>

  <script>
    // =========================
    // REQUIRED CONFIG
    // =========================
    const GOOGLE_API_KEY = "AIzaSyBPZEeYB8IaheJPJA2Y44msGfDwIhJMpGU";
    const GOOGLE_CLIENT_ID = "82204016171-ta1ipuu88gie0tkq69je3di5uifu1kki.apps.googleusercontent.com";

    const SPREADSHEET_ID = "1ccfVTfNqrrzMLkD4uK8fkWs3wRJENs5XQJHJfjkWmmY";
    const SHEET_NAME = "Groceries";

    // Session storage key for this page
    const SESSION_TOKEN_KEY = "pocketsteak_family_google_token";

    const DISCOVERY_DOC = "https://sheets.googleapis.com/$discovery/rest?version=v4";
    const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

    // =========================
    // STATE
    // =========================
    let tokenClient = null;
    let gapiReady = false;
    let gisReady = false;
    let appReady = false;
    let isConnected = false;
    let groceryRows = [];
    let isBusy = false;

    // =========================
    // DOM
    // =========================
    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");
    const connectBtn = document.getElementById("connectBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const addBtn = document.getElementById("addBtn");
    const itemInput = document.getElementById("itemInput");
    const messageEl = document.getElementById("message");
    const activeListEl = document.getElementById("activeList");
    const activeEmptyEl = document.getElementById("activeEmpty");
    const boughtListEl = document.getElementById("boughtList");
    const boughtEmptyEl = document.getElementById("boughtEmpty");
    const inputCard = document.getElementById("inputCard");

    // =========================
    // HELPERS
    // =========================
    function setBusy(value) {
      isBusy = value;
      addBtn.disabled = value || !isConnected;
      clearAllBtn.disabled = value || !isConnected;
      connectBtn.disabled = value && appReady;
      itemInput.disabled = value || !isConnected;
      inputCard.classList.toggle("loading", value);
    }

    function setStatus(text, ok = false) {
      statusText.textContent = text;
      statusPill.classList.toggle("status-ok", ok);
      statusPill.classList.toggle("status-bad", !ok);
    }

    function showMessage(text = "", type = "") {
      messageEl.textContent = text;
      messageEl.className = "message";
      if (type) {
        messageEl.classList.add(type);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeBool(value) {
      const str = String(value || "").trim().toLowerCase();
      return str === "true" || str === "yes" || str === "1" || str === "y";
    }

    function isLikelyHeaderRow(row) {
      const first = String(row?.[0] || "").trim().toLowerCase();
      const second = String(row?.[1] || "").trim().toLowerCase();
      const third = String(row?.[2] || "").trim().toLowerCase();

      return (
        ["item", "items", "grocery", "groceries", "name"].includes(first) ||
        ["bought", "done", "status", "checked"].includes(second) ||
        ["created", "createdat", "timestamp", "date"].includes(third)
      );
    }

    function getAccessTokenFromSession() {
      return localStorage.getItem(SESSION_TOKEN_KEY);
    }

    function saveAccessTokenToSession(token) {
      if (token) {
        localStorage.setItem(SESSION_TOKEN_KEY, token);
      }
    }

    function clearAccessTokenFromSession() {
      localStorage.removeItem(SESSION_TOKEN_KEY);
    }

    function ensureAppInitialized() {
      if (appReady) return;
      if (!gapiReady || !gisReady) return;

      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: SCOPES,
        callback: async (response) => {
          if (response.error) {
            console.error("OAuth token error:", response);
            setStatus("Setup failed", false);
            showMessage(getReadableError(response), "error");
            return;
          }

          const token = gapi.client.getToken()?.access_token;
          if (token) {
            saveAccessTokenToSession(token);
          }

          isConnected = true;
          setStatus("Connected", true);
          connectBtn.textContent = "Reconnect";

          try {
            await loadGroceries();
            showMessage("", "");
          } catch (error) {
            console.error(error);
            setStatus("Setup failed", false);
            showMessage(getReadableError(error), "error");
          } finally {
            setBusy(false);
          }
        },
      });

      appReady = true;
      restoreSessionIfPossible();
    }

    function getReadableError(error) {
      const message =
        error?.result?.error?.message ||
        error?.details ||
        error?.message ||
        error?.error ||
        "Something went wrong with Google Sheets.";

      const code = error?.code || error?.result?.error?.code;
      const status = error?.status || error?.result?.error?.status;
      const suffix = [code, status].filter(Boolean).join(" / ");

      return suffix ? `${message} (${suffix})` : message;
    }

    // =========================
    // GOOGLE INIT
    // =========================
    function initGapi() {
      const startedAt = Date.now();

      const waitForGapi = () => {
        if (window.gapi && typeof window.gapi.load === "function") {
          window.gapi.load("client", async () => {
            try {
              await window.gapi.client.init({
                apiKey: GOOGLE_API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
              });
              gapiReady = true;
              ensureAppInitialized();
            } catch (error) {
              console.error("gapi init error:", error);
              setStatus("Setup failed", false);
              showMessage(getReadableError(error), "error");
            }
          });
          return;
        }

        if (Date.now() - startedAt > 10000) {
          setStatus("Google failed to load", false);
          showMessage(
            "The Google API script did not finish loading. Check your internet connection and browser extensions, then refresh.",
            "error"
          );
          return;
        }

        window.setTimeout(waitForGapi, 100);
      };

      waitForGapi();
    }

    function initGisReadyCheck() {
      const startedAt = Date.now();

      const waitForGoogle = () => {
        if (window.google && google.accounts && google.accounts.oauth2) {
          gisReady = true;
          ensureAppInitialized();
          return;
        }

        if (Date.now() - startedAt > 10000) {
          setStatus("Google failed to load", false);
          showMessage(
            "The Google sign-in script did not finish loading. Check your internet connection and browser extensions, then refresh.",
            "error"
          );
          return;
        }

        window.setTimeout(waitForGoogle, 100);
      };

      waitForGoogle();
    }

    async function restoreSessionIfPossible() {
      const savedToken = getAccessTokenFromSession();

      if (!savedToken) {
        setStatus("Not connected", false);
        setBusy(false);
        return;
      }

      try {
        gapi.client.setToken({ access_token: savedToken });
        await testSheetsAccess();
        isConnected = true;
        setStatus("Connected", true);
        connectBtn.textContent = "Reconnect";
        await loadGroceries();
        setBusy(false);
      } catch (error) {
        console.warn("Saved token no longer valid:", error);
        gapi.client.setToken(null);
        clearAccessTokenFromSession();
        isConnected = false;
        setStatus("Not connected", false);
        connectBtn.textContent = "Connect";
        setBusy(false);
      }
    }

    async function connectGoogle(forceConsent = false) {
      if (!appReady || !tokenClient) {
        showMessage("Google is still loading. Try again in a second.", "error");
        return;
      }

      setBusy(true);
      showMessage("", "");

      try {
        const existingToken = gapi.client.getToken();

        tokenClient.callback = async (response) => {
          if (response.error) {
            console.error("OAuth token error:", response);
            setStatus("Setup failed", false);
            showMessage(getReadableError(response), "error");
            setBusy(false);
            return;
          }

          const token = gapi.client.getToken()?.access_token;
          if (token) {
            saveAccessTokenToSession(token);
          }

          isConnected = true;
          setStatus("Connected", true);
          connectBtn.textContent = "Reconnect";

          try {
            await loadGroceries();
          } catch (error) {
            console.error(error);
            setStatus("Setup failed", false);
            showMessage(getReadableError(error), "error");
          } finally {
            setBusy(false);
          }
        };

        tokenClient.requestAccessToken({
          prompt: forceConsent || !existingToken ? "consent" : "",
        });
      } catch (error) {
        console.error(error);
        setStatus("Setup failed", false);
        showMessage(getReadableError(error), "error");
        setBusy(false);
      }
    }

    async function testSheetsAccess() {
      await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: `${SHEET_NAME}!A:C`,
      });
    }

    // =========================
    // SHEETS
    // =========================
    async function loadGroceries() {
      setBusy(true);
      showMessage("", "");

      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: `${SHEET_NAME}!A:C`,
      });

      const values = response.result.values || [];

      let startIndex = 0;
      if (values.length > 0 && isLikelyHeaderRow(values[0])) {
        startIndex = 1;
      }

      groceryRows = values.slice(startIndex).map((row, index) => {
        const actualRowNumber = startIndex + index + 1;
        return {
          rowNumber: actualRowNumber,
          item: String(row[0] || "").trim(),
          bought: normalizeBool(row[1]),
          createdAt: String(row[2] || "").trim(),
        };
      }).filter(row => row.item);

      renderGroceries();
      setBusy(false);
    }

    async function addItem() {
      const item = itemInput.value.trim();

      if (!isConnected) {
        showMessage("Connect Google first.", "error");
        return;
      }

      if (!item) {
        showMessage("Enter an item first.", "error");
        itemInput.focus();
        return;
      }

      setBusy(true);
      showMessage("", "");

      try {
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId: SPREADSHEET_ID,
          range: `${SHEET_NAME}!A:C`,
          valueInputOption: "USER_ENTERED",
          insertDataOption: "INSERT_ROWS",
          resource: {
            values: [[item, "FALSE", new Date().toISOString()]],
          },
        });

        itemInput.value = "";
        await loadGroceries();
        showMessage("Item added.", "success");
        itemInput.focus();
      } catch (error) {
        console.error(error);
        showMessage(getReadableError(error), "error");
        setBusy(false);
      }
    }

    async function findSheetRowNumber(targetRow) {
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: `${SHEET_NAME}!A:C`,
      });

      const values = response.result.values || [];
      const startIndex = values.length > 0 && isLikelyHeaderRow(values[0]) ? 1 : 0;

      for (let index = startIndex; index < values.length; index += 1) {
        const row = values[index] || [];
        const item = String(row[0] || "").trim();
        const createdAt = String(row[2] || "").trim();

        if (item === targetRow.item && createdAt === targetRow.createdAt) {
          return index + 1;
        }
      }

      return targetRow.rowNumber;
    }

    async function toggleBought(targetRow) {
      if (!isConnected) {
        showMessage("Connect Google first.", "error");
        return;
      }

      setBusy(true);
      showMessage("", "");

      try {
        const rowNumber = await findSheetRowNumber(targetRow);

        await gapi.client.sheets.spreadsheets.values.update({
          spreadsheetId: SPREADSHEET_ID,
          range: `${SHEET_NAME}!B${rowNumber}`,
          valueInputOption: "USER_ENTERED",
          resource: {
            values: [[targetRow.bought ? "FALSE" : "TRUE"]],
          },
        });

        await loadGroceries();
        showMessage(targetRow.bought ? "Item marked active." : "Item marked bought.", "success");
      } catch (error) {
        console.error(error);
        showMessage(getReadableError(error), "error");
        setBusy(false);
      }
    }

    async function clearAllItems() {
      if (!isConnected) {
        showMessage("Connect Google first.", "error");
        return;
      }

      if (!groceryRows.length) {
        showMessage("There is nothing to clear.", "error");
        return;
      }

      const confirmed = window.confirm("Clear all grocery items?");
      if (!confirmed) return;

      setBusy(true);
      showMessage("", "");

      try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SPREADSHEET_ID,
          range: `${SHEET_NAME}!A:C`,
        });

        const values = response.result.values || [];
        const hasHeader = values.length > 0 && isLikelyHeaderRow(values[0]);

        const startRow = hasHeader ? 2 : 1;

        await gapi.client.sheets.spreadsheets.values.clear({
          spreadsheetId: SPREADSHEET_ID,
          range: `${SHEET_NAME}!A${startRow}:C`,
        });

        await loadGroceries();
        showMessage("All items cleared.", "success");
      } catch (error) {
        console.error(error);
        showMessage(getReadableError(error), "error");
        setBusy(false);
      }
    }

    // =========================
    // RENDER
    // =========================
    function renderGroceries() {
      activeListEl.innerHTML = "";
      boughtListEl.innerHTML = "";

      const activeItems = groceryRows.filter(row => !row.bought);
      const boughtItems = groceryRows.filter(row => row.bought);

      activeEmptyEl.style.display = activeItems.length ? "none" : "block";
      boughtEmptyEl.style.display = boughtItems.length ? "none" : "block";

      for (const row of activeItems) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tile";
        button.innerHTML = escapeHtml(row.item);
        button.addEventListener("click", () => toggleBought(row));
        activeListEl.appendChild(button);
      }

      for (const row of boughtItems) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tile bought";
        button.innerHTML = escapeHtml(row.item);
        button.addEventListener("click", () => toggleBought(row));
        boughtListEl.appendChild(button);
      }
    }

    // =========================
    // EVENTS
    // =========================
    connectBtn.addEventListener("click", () => {
      if (!appReady) {
        setStatus("Retrying Google...", false);
        showMessage("Trying to load Google services again...", "");
        initGapi();
        initGisReadyCheck();
        return;
      }

      connectGoogle(true);
    });
    addBtn.addEventListener("click", addItem);
    clearAllBtn.addEventListener("click", clearAllItems);

    itemInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addItem();
      }
    });

    // =========================
    // START
    // =========================
    setBusy(true);
    setStatus("Loading Google...", false);

    if (window.location.protocol === "file:") {
      setBusy(false);
      setStatus("Serve from localhost", false);
      showMessage(
        "Google sign-in will not work from a file:// page. Open this through a local server like http://localhost:5500 or your hosted site.",
        "error"
      );
    } else {
      initGapi();
      initGisReadyCheck();
    }
  </script>
</body>
</html>
