<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak Family Command Center</title>
  <meta name="description" content="PocketSteak Family Command Center home page." />

  <style>
    :root{
      --bg:#0e0f12;
      --panel:#1a1c22;
      --panel-2:#22252d;
      --border:rgba(255,255,255,.08);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --accent:#ff7a18;
      --accent-2:#ff9c4d;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:20px;
    }

    .page{
      max-width:1600px;
      margin:0 auto;
      display:grid;
      gap:20px;
    }

    .weather-banner,
    .today-card,
    .preview-card,
    .day-card,
    .nav-btn,
    .top-btn,
    .status-pill{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .top-right{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .top-btn{
      border:none;
      color:var(--text);
      min-height:54px;
      padding:14px 18px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .top-btn:hover{
      background:linear-gradient(180deg,#24272f,#2c3039);
    }

    .top-btn.accent{
      background:var(--accent);
      border-color:transparent;
    }

    .top-btn.accent:hover{
      filter:brightness(1.06);
    }

    .status-pill{
      min-height:54px;
      padding:10px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
      min-width:260px;
    }

    .status-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status-text{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .weather-banner{
      min-height:110px;
      padding:14px 16px;
      display:grid;
      grid-template-columns:1.8fr repeat(6, 1fr);
      gap:12px;
      align-items:stretch;
      user-select:none;
    }

    .weather-today,
    .weather-day{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.04);
      border-radius:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    .weather-today{
      padding:14px 16px;
      gap:6px;
    }

    .weather-day{
      padding:10px 8px;
      align-items:center;
      text-align:center;
      gap:4px;
    }

    .weather-location{
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .weather-today-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .weather-today-left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .weather-today-label{
      font-size:16px;
      font-weight:900;
      color:var(--text);
    }

    .weather-today-temp{
      font-size:34px;
      line-height:1;
      font-weight:900;
    }

    .weather-today-details{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .weather-icon{
      font-size:28px;
      line-height:1;
      flex:0 0 auto;
    }

    .weather-day-name{
      font-size:13px;
      font-weight:900;
      color:var(--text);
      white-space:nowrap;
    }

    .weather-day-icon{
      font-size:24px;
      line-height:1;
    }

    .weather-day-temps{
      font-size:13px;
      font-weight:800;
      color:var(--text);
      white-space:nowrap;
    }

    .weather-day-condition{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      line-height:1.15;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .home-layout{
      display:grid;
      grid-template-columns:minmax(360px, .92fr) minmax(560px, 1.45fr);
      grid-template-areas:
        "previews today"
        "previews days";
      gap:16px;
      align-items:stretch;
    }

    .today-card{
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
      min-height:0;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease;
    }

    .today-card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,122,24,.45);
    }

    #todayCard{
      grid-area:today;
    }

    .today-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
    }

    .today-heading{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .today-label{
      font-size:15px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-2);
    }

    .today-date{
      font-size:44px;
      line-height:1;
      font-weight:900;
    }

    .today-full-date{
      font-size:18px;
      color:var(--muted);
      font-weight:700;
    }

    .quick-add-btn{
      border:none;
      background:var(--accent);
      color:#fff;
      padding:14px 18px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      min-width:120px;
    }

    .quick-add-btn:hover{
      filter:brightness(1.06);
    }

    .today-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .month-btn{
      border:none;
      background:rgba(255,255,255,.08);
      color:var(--text);
      padding:14px 18px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      min-width:132px;
    }

    .month-btn:hover{
      background:rgba(255,255,255,.14);
    }

    .time-blocks{
      display:grid;
      gap:14px;
      margin-top:4px;
    }

    .time-block{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.05);
      border-left:6px solid var(--accent);
      border-radius:20px;
      padding:18px 18px 16px;
      min-height:90px;
      display:grid;
      gap:8px;
    }

    .time-range{
      font-size:14px;
      font-weight:900;
      color:var(--accent-2);
      letter-spacing:.02em;
    }

    .time-title{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
    }

    .empty-state{
      color:var(--muted);
      font-weight:700;
      padding:8px 2px;
    }

    .days-grid{
      grid-area:days;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      align-content:stretch;
    }

    .day-card{
      min-height:180px;
      padding:14px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:transform .15s ease;
    }

    .day-card:hover{
      transform:translateY(-3px);
    }

    .day-name{
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .day-date{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .day-events{
      display:grid;
      gap:10px;
      margin-top:6px;
    }

    .mini-event{
      background:rgba(255,255,255,.05);
      border-radius:14px;
      border-left:5px solid var(--accent);
      padding:10px 12px;
      display:grid;
      gap:4px;
    }

    .mini-time{
      font-size:12px;
      color:var(--accent-2);
      font-weight:900;
    }

    .mini-title{
      font-size:14px;
      font-weight:800;
      line-height:1.2;
    }

    .nav-row{
      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:16px;
    }

    .preview-grid{
      grid-area:previews;
      display:grid;
      grid-template-columns:1fr;
      grid-template-rows:repeat(2, minmax(0, 1fr));
      gap:12px;
      min-height:0;
    }

    .preview-card{
      min-height:0;
      padding:18px;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
      gap:14px;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease;
    }

    .preview-card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,122,24,.45);
    }

    .preview-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .preview-heading{
      display:grid;
      gap:6px;
    }

    .preview-label{
      font-size:14px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-2);
    }

    .preview-title{
      font-size:24px;
      line-height:1;
      font-weight:900;
    }

    .preview-meta{
      font-size:14px;
      font-weight:800;
      color:var(--muted);
    }

    .preview-open{
      border:none;
      background:rgba(255,122,24,.16);
      color:var(--accent-2);
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:900;
      min-width:118px;
      cursor:pointer;
    }

    .preview-list{
      display:grid;
      gap:12px;
      align-content:start;
      min-height:0;
      overflow:auto;
      padding-right:4px;
    }

    .preview-item{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.05);
      border-left:5px solid var(--accent);
      border-radius:16px;
      padding:12px 14px;
      display:grid;
      gap:4px;
    }

    .preview-item.done{
      opacity:.72;
      border-left-color:rgba(255,255,255,.18);
    }

    .preview-item-title{
      font-size:16px;
      font-weight:850;
      line-height:1.2;
      word-break:break-word;
    }

    .preview-item-meta{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
    }

    .preview-empty{
      color:var(--muted);
      font-weight:700;
      padding:6px 2px;
    }

    .nav-btn{
      border:none;
      color:var(--text);
      min-height:96px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease;
    }

    .nav-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(255,122,24,.45);
    }

    @media (max-width: 1400px){
      .weather-banner{
        grid-template-columns:1.5fr repeat(4, minmax(0, .82fr));
        gap:10px;
      }

      .weather-day{
        padding:8px 6px;
      }

      .weather-icon{
        font-size:22px;
      }

      .weather-day-icon{
        font-size:18px;
      }

      .weather-day-name,
      .weather-day-temps{
        font-size:12px;
      }

      .weather-day-condition{
        font-size:10px;
      }

      .weather-day:nth-child(n+6){
        display:none;
      }
    }

    @media (max-width: 1200px){
      .home-layout{
        grid-template-columns:1fr;
        grid-template-areas:
          "today"
          "days"
          "previews";
      }

      .days-grid{
        grid-template-columns:repeat(3, 1fr);
      }

      .preview-grid{
        grid-template-columns:1fr 1fr;
        grid-template-rows:none;
      }

      .nav-row{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width: 1024px){
      body{
        padding:16px;
      }

      .topbar{
        align-items:stretch;
      }

      .top-actions,
      .top-right{
        width:100%;
      }

      .top-btn{
        flex:1 1 180px;
      }

      .status-pill{
        flex:1 1 260px;
      }
    }

    @media (max-width: 1000px){
      .weather-banner{
        grid-template-columns:1.45fr repeat(4, minmax(0, .75fr));
        gap:10px;
        padding:12px;
      }

      .weather-day{
        min-height:88px;
        padding:8px 6px;
      }

      .weather-today{
        grid-column:auto;
        padding:12px 14px;
      }

      .weather-location{
        font-size:11px;
      }

      .weather-today-label{
        font-size:14px;
      }

      .weather-today-temp{
        font-size:28px;
      }

      .weather-today-details{
        font-size:12px;
      }

      .weather-icon{
        font-size:22px;
      }

      .weather-day-name,
      .weather-day-temps{
        font-size:12px;
      }

      .weather-day-icon{
        font-size:18px;
      }

      .weather-day-condition{
        font-size:10px;
      }

      .weather-day:nth-child(n+6){
        display:none;
      }
    }

    @media (max-width: 820px){
      body{
        padding:14px;
      }

      .today-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .today-actions{
        width:100%;
      }

      .days-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .nav-row{
        grid-template-columns:repeat(2, 1fr);
      }

      .preview-title{
        font-size:28px;
      }

      .preview-grid{
        grid-template-columns:1fr;
        grid-template-rows:none;
      }

      .today-date{
        font-size:36px;
      }

      .top-right,
      .top-actions{
        width:100%;
      }

      .top-btn{
        flex:1 1 0;
      }

      .status-pill{
        width:100%;
      }

      .weather-banner{
        grid-template-columns:1.35fr repeat(3, minmax(0, .74fr));
        gap:8px;
      }

      .weather-today{
        padding:10px 12px;
      }

      .weather-today-temp{
        font-size:24px;
      }

      .weather-icon{
        font-size:20px;
      }

      .weather-day{
        min-height:82px;
      }

      .weather-day:nth-child(n+5){
        display:none;
      }
    }

    @media (max-width: 560px){
      .days-grid,
      .nav-row{
        grid-template-columns:1fr;
      }

      .preview-card{
        min-height:auto;
        padding:18px;
      }

      .today-actions{
        width:100%;
      }

      .preview-head{
        flex-direction:column;
        align-items:stretch;
      }

      .month-btn,
      .quick-add-btn,
      .preview-open{
        width:100%;
      }

      .weather-banner{
        grid-template-columns:1fr;
        padding:12px;
      }

      .weather-day{
        display:none;
      }

      .weather-today{
        grid-column:auto;
      }
    }
  </style>

  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-actions">

          <div class="weather-icon">⛅</div>

    <section class="home-layout">

          <div class="today-actions">
            <button class="month-btn" id="monthBtn" type="button">Open Month</button>

        <div class="time-blocks" id="todayTimeBlocks"></div>

      <section class="days-grid" id="daysGrid"></section>

          <div class="preview-heading">
            <div class="preview-label">Family Hub</div>
            <div class="preview-title">Grocery List</div>
            <div class="preview-meta" id="groceryPreviewMeta">Connect Google to load grocery items.</div>
          </div>
          <button class="preview-open" id="groceryPreviewBtn" type="button">Open List</button>
        </div>
        <div class="preview-list" id="groceryPreviewList">
          <div class="preview-empty">Waiting for Google Sheets…</div>
        </div>
        </article>

        <article class="preview-card" id="todoPreviewCard">
        <div class="preview-head">
          <div class="preview-heading">
            <div class="preview-label">Family Hub</div>
            <div class="preview-title">To-Do List</div>
            <div class="preview-meta" id="todoPreviewMeta">Connect Google to load to-do items.</div>
          </div>
          <button class="preview-open" id="todoPreviewBtn" type="button">Open List</button>
        </div>
        <div class="preview-list" id="todoPreviewList">
          <div class="preview-empty">Waiting for Google Sheets…</div>
        </div>
        </article>
      </section>
    </section>
  </div>

  <script>
    const CLIENT_ID = "82204016171-ta1ipuu88gie0tkq69je3di5uifu1kki.apps.googleusercontent.com";
    const API_KEY = "AIzaSyBPZEeYB8IaheJPJA2Y44msGfDwIhJMpGU";
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SHEETS_DISCOVERY_DOC = "https://sheets.googleapis.com/$discovery/rest?version=v4";
    const SPREADSHEET_ID = "1ccfVTfNqrrzMLkD4uK8fkWs3wRJENs5XQJHJfjkWmmY";
    const GROCERY_SHEET_NAME = "Groceries";
    const TODO_SHEET_NAME = "ToDo";
    const SCOPES = [
      "https://www.googleapis.com/auth/calendar",
      "https://www.googleapis.com/auth/spreadsheets.readonly",
    ].join(" ");

    const TOKEN_KEY = "pocketsteak_google_access_token";
    const TOKEN_EXP_KEY = "pocketsteak_google_token_exp";

    const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=41.582011&longitude=-81.203217&current=temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=7";

    let tokenClient = null;
    let gapiInited = false;
    let gisInited = false;
    let calendarsById = new Map();
    let weekEvents = [];
    let groceryPreviewRows = [];
    let todoPreviewRows = [];

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function saveToken(accessToken, expiresInSeconds = 3600) {
      const expiresAt = Date.now() + (expiresInSeconds * 1000);
      localStorage.setItem(TOKEN_KEY, accessToken);
      localStorage.setItem(TOKEN_EXP_KEY, String(expiresAt));
    }

    function getSavedToken() {
      const token = localStorage.getItem(TOKEN_KEY);
      const exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || "0");
      if (!token || !exp) return null;
      if (Date.now() >= exp) {
        clearSavedToken();
        return null;
      }
      return token;
    }

    function clearSavedToken() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_EXP_KEY);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatMonthDay(date) {
      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });
    }

    function formatTodayBig(date) {
      return date.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function formatTodayFull(date) {
      return date.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function getShortDayName(date) {
      return date.toLocaleDateString(undefined, { weekday: "short" });
    }

    function isAllDayEvent(event) {
      return !!event.start.date;
    }

    function getEventDateKey(event) {
      if (event.start.date) return event.start.date;
      return formatDateKey(new Date(event.start.dateTime));
    }

    function getEventTimeLabel(event) {
      if (isAllDayEvent(event)) return "All day";

      const start = new Date(event.start.dateTime);
      const end = new Date(event.end.dateTime);

      const startLabel = start.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      const endLabel = end.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });

      return `${startLabel} - ${endLabel}`;
    }

    function getCalendarColor(calendarId) {
      const cal = calendarsById.get(calendarId);
      return cal?.backgroundColor || "#ff7a18";
    }

    function getEventsForDate(dateKey) {
      return weekEvents
        .filter(event => getEventDateKey(event) === dateKey)
        .sort((a, b) => {
          const aStart = a.start.dateTime || `${a.start.date}T00:00:00`;
          const bStart = b.start.dateTime || `${b.start.date}T00:00:00`;
          return aStart.localeCompare(bStart);
        });
    }

    function normalizeBool(value) {
      const str = String(value || "").trim().toLowerCase();
      return str === "true" || str === "yes" || str === "1" || str === "y";
    }

    function isLikelyHeaderRow(row) {
      const first = String(row?.[0] || "").trim().toLowerCase();
      const second = String(row?.[1] || "").trim().toLowerCase();
      const third = String(row?.[2] || "").trim().toLowerCase();

      return (
        ["item", "items", "task", "tasks", "todo", "to-do", "grocery", "groceries", "name"].includes(first) ||
        ["bought", "done", "status", "checked", "complete", "completed"].includes(second) ||
        ["created", "createdat", "timestamp", "date"].includes(third)
      );
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderToday() {
      const today = new Date();
      const todayKey = formatDateKey(today);
      const todayEvents = getEventsForDate(todayKey);

      document.getElementById("todayDate").textContent = formatTodayBig(today);
      document.getElementById("todayFullDate").textContent = formatTodayFull(today);

      const container = document.getElementById("todayTimeBlocks");
      container.innerHTML = "";

      if (todayEvents.length === 0) {
        container.innerHTML = `<div class="empty-state">No events today.</div>`;
        return;
      }

      todayEvents.forEach(event => {
        const block = document.createElement("div");
        block.className = "time-block";
        block.style.borderLeftColor = getCalendarColor(event.calendarId);
        block.innerHTML = `
          <div class="time-range">${getEventTimeLabel(event)}</div>
          <div class="time-title">${event.summary || "(Untitled event)"}</div>
        `;
        container.appendChild(block);
      });
    }

    function renderNextSixDays() {
      const grid = document.getElementById("daysGrid");
      grid.innerHTML = "";

      for (let i = 1; i <= 6; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);

        const key = formatDateKey(date);
        const events = getEventsForDate(key);

        const card = document.createElement("article");
        card.className = "day-card";

        let eventsHtml = "";
        if (events.length > 0) {
          eventsHtml = events.map(event => `
            <div class="mini-event" style="border-left-color:${getCalendarColor(event.calendarId)}">
              <div class="mini-time">${getEventTimeLabel(event)}</div>
              <div class="mini-title">${event.summary || "(Untitled event)"}</div>
            </div>
          `).join("");
        }

        card.innerHTML = `
          <div>
            <div class="day-name">${getShortDayName(date)}</div>
            <div class="day-date">${formatMonthDay(date)}</div>
          </div>
          <div class="day-events">${eventsHtml}</div>
        `;

        card.addEventListener("click", () => {
          window.location.href = `./day.html?date=${key}`;
        });

        grid.appendChild(card);
      }
    }

    function renderAll() {
      renderToday();
      renderNextSixDays();
      renderPreviewCard({
        rows: groceryPreviewRows,
        listId: "groceryPreviewList",
        metaId: "groceryPreviewMeta",
        emptyText: "No grocery items right now.",
        activeLabel: "items to grab",
        doneLabel: "bought",
      });
      renderPreviewCard({
        rows: todoPreviewRows,
        listId: "todoPreviewList",
        metaId: "todoPreviewMeta",
        emptyText: "No to-do items right now.",
        activeLabel: "active tasks",
        doneLabel: "done",
      });
    }

    function renderPreviewCard({ rows, listId, metaId, emptyText, activeLabel, doneLabel }) {
      const listEl = document.getElementById(listId);
      const metaEl = document.getElementById(metaId);

      const activeRows = rows.filter(row => !row.done);
      const doneRows = rows.filter(row => row.done);
      const previewRows = activeRows.slice(0, 4);

      if (rows.length === 0) {
        metaEl.textContent = emptyText;
        listEl.innerHTML = `<div class="preview-empty">${emptyText}</div>`;
        return;
      }

      metaEl.textContent = `${activeRows.length} ${activeLabel} • ${doneRows.length} ${doneLabel}`;
      listEl.innerHTML = previewRows.length
        ? previewRows.map(row => `
            <div class="preview-item${row.done ? " done" : ""}">
              <div class="preview-item-title">${escapeHtml(row.title)}</div>
              <div class="preview-item-meta">${row.done ? "Completed" : "Ready for action"}</div>
            </div>
          `).join("")
        : `<div class="preview-empty">Everything here is completed.</div>`;
    }

    async function loadSheetPreview(sheetName) {
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: `${sheetName}!A:C`,
      });

      const values = response.result.values || [];
      const startIndex = values.length > 0 && isLikelyHeaderRow(values[0]) ? 1 : 0;

      return values.slice(startIndex)
        .map((row) => ({
          title: String(row[0] || "").trim(),
          done: normalizeBool(row[1]),
          createdAt: String(row[2] || "").trim(),
        }))
        .filter((row) => row.title);
    }

    async function loadDashboardLists() {
      try {
        const [groceryRows, todoRows] = await Promise.all([
          loadSheetPreview(GROCERY_SHEET_NAME),
          loadSheetPreview(TODO_SHEET_NAME),
        ]);

        groceryPreviewRows = groceryRows;
        todoPreviewRows = todoRows;
      } catch (err) {
        console.error(err);
        groceryPreviewRows = [];
        todoPreviewRows = [];
        document.getElementById("groceryPreviewMeta").textContent = "Could not load grocery preview.";
        document.getElementById("todoPreviewMeta").textContent = "Could not load to-do preview.";
        document.getElementById("groceryPreviewList").innerHTML = `<div class="preview-empty">Refresh Google access to load this list.</div>`;
        document.getElementById("todoPreviewList").innerHTML = `<div class="preview-empty">Refresh Google access to load this list.</div>`;
        return;
      }

      renderAll();
    }

    function getWeatherMeta(code) {
      const map = {
        0: { icon: "☀️", text: "Clear" },
        1: { icon: "🌤️", text: "Mostly clear" },
        2: { icon: "⛅", text: "Partly cloudy" },
        3: { icon: "☁️", text: "Cloudy" },
        45: { icon: "🌫️", text: "Fog" },
        48: { icon: "🌫️", text: "Rime fog" },
        51: { icon: "🌦️", text: "Light drizzle" },
        53: { icon: "🌦️", text: "Drizzle" },
        55: { icon: "🌧️", text: "Heavy drizzle" },
        56: { icon: "🌧️", text: "Freezing drizzle" },
        57: { icon: "🌧️", text: "Heavy freezing drizzle" },
        61: { icon: "🌦️", text: "Light rain" },
        63: { icon: "🌧️", text: "Rain" },
        65: { icon: "🌧️", text: "Heavy rain" },
        66: { icon: "🌧️", text: "Freezing rain" },
        67: { icon: "🌧️", text: "Heavy freezing rain" },
        71: { icon: "🌨️", text: "Light snow" },
        73: { icon: "❄️", text: "Snow" },
        75: { icon: "❄️", text: "Heavy snow" },
        77: { icon: "🌨️", text: "Snow grains" },
        80: { icon: "🌦️", text: "Rain showers" },
        81: { icon: "🌧️", text: "Heavy showers" },
        82: { icon: "⛈️", text: "Violent showers" },
        85: { icon: "🌨️", text: "Snow showers" },
        86: { icon: "❄️", text: "Heavy snow showers" },
        95: { icon: "⛈️", text: "Thunderstorm" },
        96: { icon: "⛈️", text: "Storm with hail" },
        99: { icon: "⛈️", text: "Heavy storm with hail" }
      };
      return map[code] || { icon: "🌤️", text: "Weather" };
    }

    function renderWeather(data) {
      const banner = document.getElementById("weatherBanner");
      const daily = data.daily;
      const current = data.current;

      const todayMeta = getWeatherMeta(current.weather_code);
      const todayMax = Math.round(daily.temperature_2m_max[0]);
      const todayMin = Math.round(daily.temperature_2m_min[0]);
      const currentTemp = Math.round(current.temperature_2m);
      const wind = Math.round(current.wind_speed_10m);

      const todayHtml = `
        <div class="weather-today" id="weatherToday">
          <div class="weather-location">Chardon, Ohio</div>
          <div class="weather-today-row">
            <div class="weather-today-left">
              <div class="weather-today-label">Today</div>
              <div class="weather-today-temp">${currentTemp}°</div>
              <div class="weather-today-details">${todayMeta.text} • H ${todayMax}° / L ${todayMin}° • Wind ${wind} mph</div>
            </div>
            <div class="weather-icon">${todayMeta.icon}</div>
          </div>
        </div>
      `;

      const nextDaysHtml = daily.time.slice(1, 7).map((dateStr, idx) => {
        const dayIndex = idx + 1;
        const meta = getWeatherMeta(daily.weather_code[dayIndex]);
        const date = new Date(`${dateStr}T12:00:00`);
        const label = idx === 0 ? "Tomorrow" : date.toLocaleDateString(undefined, { weekday: "short" });
        const high = Math.round(daily.temperature_2m_max[dayIndex]);
        const low = Math.round(daily.temperature_2m_min[dayIndex]);

        return `
          <div class="weather-day">
            <div class="weather-day-name">${label}</div>
            <div class="weather-day-icon">${meta.icon}</div>
            <div class="weather-day-temps">${high}° / ${low}°</div>
            <div class="weather-day-condition">${meta.text}</div>
          </div>
        `;
      }).join("");

      banner.innerHTML = todayHtml + nextDaysHtml;
    }

    async function loadWeather() {
      try {
        const resp = await fetch(WEATHER_URL);
        if (!resp.ok) throw new Error("Weather request failed");
        const data = await resp.json();
        renderWeather(data);
      } catch (err) {
        console.error(err);
        document.getElementById("weatherBanner").innerHTML = `
          <div class="weather-today">
            <div class="weather-location">Chardon, Ohio</div>
            <div class="weather-today-row">
              <div class="weather-today-left">
                <div class="weather-today-label">Weather</div>
                <div class="weather-today-temp">--</div>
                <div class="weather-today-details">Could not load weather right now.</div>
              </div>
              <div class="weather-icon">🌤️</div>
            </div>
          </div>
        `;
      }
    }

    async function gapiLoaded() {
      await new Promise((resolve) => gapi.load("client", resolve));
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC, SHEETS_DISCOVERY_DOC],
      });
      gapiInited = true;
      maybeReady();
    }

    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.error(resp);
            setStatus("Connection failed");
            return;
          }

          const token = gapi.client.getToken();
          if (token?.access_token) {
            saveToken(token.access_token, resp.expires_in || 3600);
          }

          document.getElementById("authBtn").textContent = "Refresh";
          document.getElementById("signOutBtn").style.display = "inline-flex";

          await loadGoogleCalendarData();
        },
      });

      gisInited = true;
      maybeReady();
    }

    async function maybeReady() {
      if (!gapiInited || !gisInited) return;

      document.getElementById("authBtn").disabled = false;

      const savedToken = getSavedToken();
      if (savedToken) {
        gapi.client.setToken({ access_token: savedToken });
        document.getElementById("authBtn").textContent = "Refresh";
        document.getElementById("signOutBtn").style.display = "inline-flex";
        setStatus("Restoring connection…");
        await loadGoogleCalendarData();
      } else {
        setStatus("Not connected");
      }
    }

    async function handleAuthClick() {
      if (!tokenClient) return;
      setStatus("Connecting…");
      tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function handleSignoutClick() {
      const token = gapi.client.getToken();
      if (token?.access_token) {
        google.accounts.oauth2.revoke(token.access_token);
      }

      gapi.client.setToken("");
      clearSavedToken();
      calendarsById = new Map();
      weekEvents = [];
      groceryPreviewRows = [];
      todoPreviewRows = [];
      document.getElementById("authBtn").textContent = "Connect";
      document.getElementById("signOutBtn").style.display = "none";
      setStatus("Not connected");
      renderAll();
    }

    async function loadGoogleCalendarData() {
      try {
        setStatus("Loading calendars…");

        const calendarResp = await gapi.client.calendar.calendarList.list();
        const calendars = calendarResp.result.items || [];
        const visibleCalendars = calendars.filter(cal => cal.selected !== false);

        calendarsById = new Map(
          visibleCalendars.map(cal => [cal.id, cal])
        );

        const start = new Date();
        start.setHours(0, 0, 0, 0);

        const end = new Date(start);
        end.setDate(end.getDate() + 7);

        const responses = await Promise.all(
          visibleCalendars.map(cal =>
            gapi.client.calendar.events.list({
              calendarId: cal.id,
              timeMin: start.toISOString(),
              timeMax: end.toISOString(),
              showDeleted: false,
              singleEvents: true,
              orderBy: "startTime",
              maxResults: 250,
            }).then(resp => {
              const items = resp.result.items || [];
              return items.map(event => ({
                ...event,
                calendarId: cal.id,
              }));
            })
          )
        );

        weekEvents = responses.flat();
        await loadDashboardLists();
        renderAll();
        setStatus(`Loaded ${weekEvents.length} events`);
      } catch (err) {
        console.error(err);
        setStatus("Load failed");
      }
    }

    document.getElementById("backAppsBtn").addEventListener("click", () => {
      window.location.href = "../index.html";
    });

    document.getElementById("authBtn").addEventListener("click", handleAuthClick);
    document.getElementById("signOutBtn").addEventListener("click", handleSignoutClick);
    document.getElementById("todayCard").addEventListener("click", () => {
      const todayKey = formatDateKey(new Date());
      window.location.href = `./day.html?date=${todayKey}`;
    });
    document.getElementById("monthBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      window.location.href = "./calendar.html";
    });

    document.getElementById("quickAddBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      const todayKey = formatDateKey(new Date());
      window.location.href = `./day.html?date=${todayKey}&add=1`;
    });
    document.getElementById("groceryPreviewCard").addEventListener("click", () => {
      window.location.href = "./grocery.html";
    });
    document.getElementById("todoPreviewCard").addEventListener("click", () => {
      window.location.href = "./todo.html";
    });
    document.getElementById("groceryPreviewBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      window.location.href = "./grocery.html";
    });
    document.getElementById("todoPreviewBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      window.location.href = "./todo.html";
    });

    renderAll();
    loadWeather();

    document.getElementById("authBtn").disabled = true;
    setStatus("Loading Google tools…");

    window.addEventListener("load", async () => {
      try {
        await gapiLoaded();
        gisLoaded();
      } catch (err) {
        console.error(err);
        setStatus("Setup failed");
      }
    });
  </script>
</body>
</html>
