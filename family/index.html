<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak Family Command Center</title>
  <meta name="description" content="PocketSteak Family Command Center home page." />

  <style>
    :root{
      --bg:#0e0f12;
      --panel:#1a1c22;
      --panel-2:#22252d;
      --surface:rgba(255,255,255,.045);
      --surface-strong:rgba(255,255,255,.075);
      --border:rgba(255,255,255,.08);
      --border-strong:rgba(255,255,255,.12);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --accent:#ff7a18;
      --accent-2:#ff9c4d;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --shadow-soft:0 8px 20px rgba(0,0,0,.22);
      --radius:22px;
      --card-pad:16px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;width:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:clamp(10px, 1.8vw, 16px);
    }

    .page{
      width:min(1600px, 100%);
      max-width:1600px;
      margin:0 auto;
      display:grid;
      gap:clamp(10px, 1.5vw, 16px);
      min-height:calc(100dvh - (clamp(10px, 1.8vw, 16px) * 2));
    }

    .weather-banner,
    .today-card,
    .preview-card,
    .day-card,
    .overlay-shell,
    .nav-btn,
    .status-pill{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .topbar{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto minmax(0, 1fr);
      align-items:center;
      gap:12px;
      min-height:64px;
      padding:10px 12px;
      background:
        linear-gradient(90deg, rgba(255,122,24,.12), transparent 20%, transparent 80%, rgba(255,122,24,.08)),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .top-right{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .brand-left{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      min-width:0;
      position:relative;
    }

    .brand-logo{
      width:58px;
      height:58px;
      object-fit:contain;
      flex:0 0 auto;
      filter:drop-shadow(0 6px 12px rgba(0,0,0,.22));
    }

    .brand-copy{
      display:flex;
      align-items:baseline;
      gap:10px;
      min-width:0;
    }

    .brand-eyebrow{
      font-size:13px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent-2);
      line-height:1;
      white-space:nowrap;
      text-shadow:0 0 18px rgba(255,156,77,.18);
    }

    .brand-title{
      font-size:20px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1;
      color:var(--text);
      white-space:nowrap;
    }

    .brand-center{
      display:flex;
      justify-content:center;
      align-items:center;
      min-width:0;
      padding:0 10px;
    }

    .center-ribbon{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      width:100%;
      min-width:0;
      padding:6px 10px;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .ride-waits{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:0;
      flex-wrap:nowrap;
      flex:1 1 auto;
    }

    .ride-chip{
      display:grid;
      gap:3px;
      min-width:140px;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      flex:0 1 auto;
    }

    .ride-name{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .ride-wait{
      font-size:20px;
      font-weight:900;
      letter-spacing:-.03em;
      color:var(--text);
      line-height:1;
    }

    .center-divider{
      width:1px;
      align-self:stretch;
      background:linear-gradient(180deg, transparent, rgba(255,255,255,.14), transparent);
      flex:0 0 auto;
    }

    .countdown-ribbon{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
      min-width:0;
    }

    .countdown-summary{
      display:grid;
      gap:2px;
    }

    .countdown-eyebrow{
      font-size:10px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent-2);
    }

    .countdown-target{
      font-size:12px;
      font-weight:800;
      color:var(--text);
      white-space:nowrap;
    }

    .countdown-units{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .countdown-unit{
      display:grid;
      gap:1px;
      min-width:52px;
      padding:8px 9px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      text-align:center;
    }

    .countdown-value{
      font-size:18px;
      font-weight:900;
      letter-spacing:-.03em;
      color:var(--text);
      line-height:1;
    }

    .countdown-label{
      font-size:9px;
      font-weight:900;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .center-credit{
      font-size:10px;
      font-weight:800;
      color:var(--muted);
      text-decoration:none;
      white-space:nowrap;
      transition:color .18s ease;
    }

    .center-credit:hover{
      color:var(--text);
    }

    .top-btn{
      border:none;
      color:var(--text);
      min-height:42px;
      padding:10px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      box-shadow:none;
      transition:transform .18s ease, background .18s ease, border-color .18s ease, filter .18s ease;
    }

    .top-btn:hover{
      background:linear-gradient(180deg,#252932,#2f3440);
      transform:translateY(-1px);
    }

    .top-btn.accent{
      background:var(--accent);
      border-color:transparent;
    }

    .top-btn.accent:hover{
      filter:brightness(1.06);
    }

    .status-pill{
      min-height:42px;
      padding:7px 12px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
      min-width:260px;
    }

    .status-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status-text{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .weather-banner{
      min-height:92px;
      padding:12px 14px;
      display:grid;
      grid-template-columns:2.1fr repeat(6, 1fr);
      gap:10px;
      align-items:stretch;
      user-select:none;
      background:
        linear-gradient(90deg, rgba(255,122,24,.08), transparent 16%, transparent 84%, rgba(255,122,24,.06)),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
    }

    .weather-today,
    .weather-day{
      background:
        linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.035)),
        var(--surface);
      border:1px solid rgba(255,255,255,.05);
      border-radius:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .weather-today{
      padding:12px 14px;
      gap:6px;
      position:relative;
      overflow:hidden;
    }

    .weather-today::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(115deg, transparent 0%, rgba(255,255,255,.055) 42%, transparent 72%);
      pointer-events:none;
    }

    .weather-day{
      padding:8px 7px;
      align-items:center;
      text-align:center;
      gap:4px;
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .weather-day:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.1);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04)),
        var(--surface);
    }

    .weather-location{
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .weather-today-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .weather-today-left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .weather-today-label{
      font-size:16px;
      font-weight:900;
      color:var(--text);
    }

    .weather-today-temp{
      font-size:30px;
      line-height:1;
      font-weight:900;
    }

    .weather-today-details{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .weather-icon{
      font-size:28px;
      line-height:1;
      flex:0 0 auto;
    }

    .weather-day-name{
      font-size:13px;
      font-weight:900;
      color:var(--text);
      white-space:nowrap;
    }

    .weather-day-icon{
      font-size:24px;
      line-height:1;
    }

    .weather-day-temps{
      font-size:13px;
      font-weight:800;
      color:var(--text);
      white-space:nowrap;
    }

    .weather-day-condition{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      line-height:1.15;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .home-layout{
      display:grid;
      grid-template-columns:minmax(320px, 1.05fr) minmax(320px, 1fr);
      grid-template-rows:auto 1fr;
      grid-template-areas:
        "today previews"
        "days previews";
      gap:clamp(10px, 1.4vw, 14px);
      align-items:stretch;
      min-height:0;
      height:auto;
      flex:1 1 auto;
    }

    .today-card,
    .day-card,
    .preview-card{
      width:100%;
      min-width:0;
    }

    .today-card{
      padding:var(--card-pad);
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:0;
      height:auto;
      cursor:pointer;
      border-color:var(--border-strong);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      position:relative;
      overflow:hidden;
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), transparent 38%),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
    }

    .today-card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,122,24,.45);
      box-shadow:0 22px 56px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05);
    }

    #todayCard{
      grid-area:today;
    }

    .today-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .today-heading{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .today-label{
      font-size:13px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent-2);
    }

    .today-date{
      font-size:38px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .today-full-date{
      font-size:15px;
      color:var(--muted);
      font-weight:700;
    }

    .quick-add-btn{
      border:none;
      background:var(--accent);
      color:#fff;
      padding:12px 16px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      min-width:120px;
      transition:transform .18s ease, filter .18s ease;
    }

    .quick-add-btn:hover{
      filter:brightness(1.06);
      transform:translateY(-1px);
    }

    .today-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .month-btn{
      border:none;
      background:rgba(255,255,255,.08);
      color:var(--text);
      padding:12px 16px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      min-width:132px;
      transition:transform .18s ease, background .18s ease;
    }

    .month-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .time-blocks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      grid-auto-rows:minmax(0, auto);
      gap:10px;
      margin-top:2px;
      min-height:0;
      overflow:auto;
      padding-right:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,.18) transparent;
    }

    .time-block{
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
        var(--surface);
      border:1px solid rgba(255,255,255,.06);
      border-left:6px solid var(--accent);
      border-radius:18px;
      padding:12px 12px 10px;
      min-height:60px;
      display:grid;
      gap:6px;
      box-shadow:var(--shadow-soft);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .time-block:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 22px rgba(0,0,0,.24);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.035)),
        var(--surface);
    }

    .time-range{
      font-size:13px;
      font-weight:900;
      color:var(--accent-2);
      letter-spacing:.02em;
    }

    .time-title{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
    }

    .empty-state{
      color:var(--muted);
      font-weight:700;
      padding:6px 2px;
    }

    .days-grid{
      grid-area:days;
      display:grid;
      grid-template-columns:repeat(3, minmax(220px, 1fr));
      gap:clamp(10px, 1.4vw, 12px);
      align-content:start;
      justify-content:center;
      justify-items:stretch;
      height:auto;
      min-height:0;
    }

    .day-card{
      height:auto;
      min-height:0;
      padding:14px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:hidden;
      border-color:rgba(255,255,255,.1);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 42%),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
    }

    .day-card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,122,24,.28);
      box-shadow:0 20px 48px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .day-name{
      font-size:18px;
      font-weight:900;
      line-height:1.05;
      letter-spacing:-.02em;
    }

    .day-date{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .day-events{
      display:grid;
      gap:8px;
      margin-top:4px;
      min-height:0;
      overflow:auto;
      padding-right:2px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,.16) transparent;
    }

    .mini-event{
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
        var(--surface);
      border-radius:12px;
      border-left:4px solid var(--accent);
      padding:8px 10px;
      display:grid;
      gap:4px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.025);
    }

    .mini-time{
      font-size:12px;
      color:var(--accent-2);
      font-weight:900;
    }

    .mini-title{
      font-size:13px;
      font-weight:800;
      line-height:1.2;
    }

    .nav-row{
      display:grid;
      grid-template-columns:repeat(6, minmax(120px, 1fr));
      gap:clamp(10px, 1.4vw, 12px);
      justify-content:center;
    }

    .preview-grid{
      grid-area:previews;
      display:grid;
      grid-template-columns:repeat(2, minmax(260px, 1fr));
      grid-template-rows:1fr;
      gap:clamp(10px, 1.4vw, 12px);
      align-items:stretch;
      align-content:stretch;
      justify-content:center;
      justify-items:stretch;
      height:100%;
      min-height:0;
      overflow:visible;
    }

    .preview-card{
      height:100%;
      min-height:0;
      padding:14px;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
      gap:12px;
      align-self:stretch;
      cursor:pointer;
      border-color:rgba(255,255,255,.1);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 42%),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
    }

    .preview-card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,122,24,.45);
      box-shadow:0 20px 48px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .preview-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .preview-heading{
      display:grid;
      gap:6px;
    }

    .preview-title{
      font-size:19px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.02em;
    }

    .preview-meta{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
      line-height:1.35;
    }

    .preview-open{
      border:none;
      background:rgba(255,122,24,.16);
      color:var(--accent-2);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      font-weight:900;
      min-width:118px;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease;
    }

    .preview-open:hover{
      transform:translateY(-1px);
      background:rgba(255,122,24,.22);
    }

    .preview-list{
      display:grid;
      gap:8px;
      align-content:start;
      min-height:0;
      overflow:auto;
      padding-right:4px;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,.18) transparent;
    }

    .preview-item{
      background:
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
        var(--surface);
      border:1px solid rgba(255,255,255,.05);
      border-left:4px solid var(--accent);
      border-radius:14px;
      padding:10px 12px;
      display:grid;
      gap:4px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.025);
      transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .preview-item:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,.16);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.035)),
        var(--surface);
    }

    .preview-item.done{
      opacity:.72;
      border-left-color:rgba(255,255,255,.18);
    }

    .preview-item-title{
