<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak Family Command Center</title>
  <meta name="description" content="PocketSteak Family Command Center home page." />

  <style>
    :root{
      --bg:#0e0f12;
      --panel:#1a1c22;
      --panel-2:#22252d;
      --border:rgba(255,255,255,.08);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --accent:#ff7a18;
      --accent-2:#ff9c4d;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:20px;
    }

    .page{
      max-width:1600px;
      margin:0 auto;
      display:grid;
      gap:20px;
    }

    .weather-banner,
    .today-card,
    .day-card,
    .nav-btn,
    .top-btn,
    .status-pill{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .top-right{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .top-btn{
      border:none;
      color:var(--text);
      min-height:54px;
      padding:14px 18px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .top-btn:hover{
      background:linear-gradient(180deg,#24272f,#2c3039);
    }

    .top-btn.accent{
      background:var(--accent);
      border-color:transparent;
    }

    .top-btn.accent:hover{
      filter:brightness(1.06);
    }

    .status-pill{
      min-height:54px;
      padding:10px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
      min-width:260px;
    }

    .status-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status-text{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .weather-banner{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px 24px;
      gap:16px;
      flex-wrap:wrap;
    }

    .weather-left{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .weather-label{
      font-size:14px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .weather-main{
      font-size:28px;
      font-weight:900;
      line-height:1;
    }

    .weather-sub{
      font-size:16px;
      color:var(--muted);
      font-weight:600;
    }

    .home-layout{
      display:grid;
      grid-template-columns:minmax(380px, 1.15fr) minmax(540px, 1fr);
      gap:20px;
      align-items:stretch;
    }

    .today-card{
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:18px;
      min-height:520px;
    }

    .today-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
    }

    .today-heading{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .today-label{
      font-size:15px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-2);
    }

    .today-date{
      font-size:44px;
      line-height:1;
      font-weight:900;
    }

    .today-full-date{
      font-size:18px;
      color:var(--muted);
      font-weight:700;
    }

    .quick-add-btn{
      border:none;
      background:var(--accent);
      color:#fff;
      padding:14px 18px;
      border-radius:16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      min-width:120px;
    }

    .quick-add-btn:hover{
      filter:brightness(1.06);
    }

    .time-blocks{
      display:grid;
      gap:14px;
      margin-top:4px;
    }

    .time-block{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.05);
      border-left:6px solid var(--accent);
      border-radius:20px;
      padding:18px 18px 16px;
      min-height:90px;
      display:grid;
      gap:8px;
    }

    .time-range{
      font-size:14px;
      font-weight:900;
      color:var(--accent-2);
      letter-spacing:.02em;
    }

    .time-title{
      font-size:24px;
      font-weight:900;
      line-height:1.1;
    }

    .empty-state{
      color:var(--muted);
      font-weight:700;
      padding:8px 2px;
    }

    .days-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
      align-content:stretch;
    }

    .day-card{
      min-height:250px;
      padding:16px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:12px;
      transition:transform .15s ease;
    }

    .day-card:hover{
      transform:translateY(-3px);
    }

    .day-name{
      font-size:22px;
      font-weight:900;
      line-height:1;
    }

    .day-date{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .day-events{
      display:grid;
      gap:10px;
      margin-top:6px;
    }

    .mini-event{
      background:rgba(255,255,255,.05);
      border-radius:14px;
      border-left:5px solid var(--accent);
      padding:10px 12px;
      display:grid;
      gap:4px;
    }

    .mini-time{
      font-size:12px;
      color:var(--accent-2);
      font-weight:900;
    }

    .mini-title{
      font-size:14px;
      font-weight:800;
      line-height:1.2;
    }

    .nav-row{
      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:16px;
    }

    .nav-btn{
      border:none;
      color:var(--text);
      min-height:96px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease;
    }

    .nav-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(255,122,24,.45);
    }

    @media (max-width: 1200px){
      .home-layout{
        grid-template-columns:1fr;
      }

      .days-grid{
        grid-template-columns:repeat(3, 1fr);
      }

      .nav-row{
        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width: 820px){
      body{
        padding:14px;
      }

      .weather-banner{
        flex-direction:column;
        align-items:flex-start;
      }

      .today-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .days-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .nav-row{
        grid-template-columns:repeat(2, 1fr);
      }

      .today-date{
        font-size:36px;
      }

      .top-right,
      .top-actions{
        width:100%;
      }

      .top-btn{
        flex:1 1 0;
      }

      .status-pill{
        width:100%;
      }
    }

    @media (max-width: 560px){
      .days-grid,
      .nav-row{
        grid-template-columns:1fr;
      }
    }
  </style>

  <script async defer src="https://apis.google.com/js/api.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="top-actions">
        <button class="top-btn" id="backAppsBtn" type="button">← Back to Apps</button>
      </div>

      <div class="top-right">
        <div class="status-pill">
          <div class="status-label">Google</div>
          <div class="status-text" id="statusText">Loading…</div>
        </div>
        <button class="top-btn accent" id="authBtn" type="button">Connect</button>
        <button class="top-btn" id="signOutBtn" type="button" style="display:none;">Sign Out</button>
      </div>
    </div>

    <section class="weather-banner">
      <div class="weather-left">
        <div class="weather-label">Weather</div>
        <div class="weather-main" id="weatherMain">Weather banner placeholder</div>
        <div class="weather-sub" id="weatherSub">We can hook this to a real API later.</div>
      </div>
    </section>

    <section class="home-layout">
      <article class="today-card">
        <div class="today-top">
          <div class="today-heading">
            <div class="today-label">Today</div>
            <div class="today-date" id="todayDate">--</div>
            <div class="today-full-date" id="todayFullDate">--</div>
          </div>

          <button class="quick-add-btn" id="quickAddBtn" type="button">Quick Add</button>
        </div>

        <div class="time-blocks" id="todayTimeBlocks"></div>
      </article>

      <section class="days-grid" id="daysGrid"></section>
    </section>

    <section class="nav-row">
      <button class="nav-btn" data-target="Calendar" type="button">Calendar</button>
      <button class="nav-btn" data-target="Grocery List" type="button">Grocery List</button>
      <button class="nav-btn" data-target="To-Do List" type="button">To-Do List</button>
      <button class="nav-btn" data-target="Nichol" type="button">Nichol</button>
      <button class="nav-btn" data-target="Jolie" type="button">Jolie</button>
      <button class="nav-btn" data-target="Andrew" type="button">Andrew</button>
    </section>
  </div>

  <script>
    const CLIENT_ID = "82204016171-ta1ipuu88gie0tkq69je3di5uifu1kki.apps.googleusercontent.com";
    const API_KEY = "AIzaSyBPZEeYB8IaheJPJA2Y44msGfDwIhJMpGU";
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = "https://www.googleapis.com/auth/calendar";

    const TOKEN_KEY = "pocketsteak_google_access_token";
    const TOKEN_EXP_KEY = "pocketsteak_google_token_exp";

    let tokenClient = null;
    let gapiInited = false;
    let gisInited = false;
    let calendarsById = new Map();
    let weekEvents = [];

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function saveToken(accessToken, expiresInSeconds = 3600) {
      const expiresAt = Date.now() + (expiresInSeconds * 1000);
      sessionStorage.setItem(TOKEN_KEY, accessToken);
      sessionStorage.setItem(TOKEN_EXP_KEY, String(expiresAt));
    }

    function getSavedToken() {
      const token = sessionStorage.getItem(TOKEN_KEY);
      const exp = Number(sessionStorage.getItem(TOKEN_EXP_KEY) || "0");
      if (!token || !exp) return null;
      if (Date.now() >= exp) {
        clearSavedToken();
        return null;
      }
      return token;
    }

    function clearSavedToken() {
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(TOKEN_EXP_KEY);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatMonthDay(date) {
      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });
    }

    function formatTodayBig(date) {
      return date.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function formatTodayFull(date) {
      return date.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      });
    }

    function getShortDayName(date) {
      return date.toLocaleDateString(undefined, { weekday: "short" });
    }

    function isAllDayEvent(event) {
      return !!event.start.date;
    }

    function getEventDateKey(event) {
      if (event.start.date) return event.start.date;
      return formatDateKey(new Date(event.start.dateTime));
    }

    function getEventTimeLabel(event) {
      if (isAllDayEvent(event)) return "All day";

      const start = new Date(event.start.dateTime);
      const end = new Date(event.end.dateTime);

      const startLabel = start.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      const endLabel = end.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });

      return `${startLabel} - ${endLabel}`;
    }

    function getCalendarColor(calendarId) {
      const cal = calendarsById.get(calendarId);
      return cal?.backgroundColor || "#ff7a18";
    }

    function getEventsForDate(dateKey) {
      return weekEvents
        .filter(event => getEventDateKey(event) === dateKey)
        .sort((a, b) => {
          const aStart = a.start.dateTime || `${a.start.date}T00:00:00`;
          const bStart = b.start.dateTime || `${b.start.date}T00:00:00`;
          return aStart.localeCompare(bStart);
        });
    }

    function renderToday() {
      const today = new Date();
      const todayKey = formatDateKey(today);
      const todayEvents = getEventsForDate(todayKey);

      document.getElementById("todayDate").textContent = formatTodayBig(today);
      document.getElementById("todayFullDate").textContent = formatTodayFull(today);

      const container = document.getElementById("todayTimeBlocks");
      container.innerHTML = "";

      if (todayEvents.length === 0) {
        container.innerHTML = `<div class="empty-state">No events today.</div>`;
        return;
      }

      todayEvents.forEach(event => {
        const block = document.createElement("div");
        block.className = "time-block";
        block.style.borderLeftColor = getCalendarColor(event.calendarId);
        block.innerHTML = `
          <div class="time-range">${getEventTimeLabel(event)}</div>
          <div class="time-title">${event.summary || "(Untitled event)"}</div>
        `;
        container.appendChild(block);
      });
    }

    function renderNextSixDays() {
      const grid = document.getElementById("daysGrid");
      grid.innerHTML = "";

      for (let i = 1; i <= 6; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i);

        const key = formatDateKey(date);
        const events = getEventsForDate(key);

        const card = document.createElement("article");
        card.className = "day-card";

        let eventsHtml = "";
        if (events.length > 0) {
          eventsHtml = events.map(event => `
            <div class="mini-event" style="border-left-color:${getCalendarColor(event.calendarId)}">
              <div class="mini-time">${getEventTimeLabel(event)}</div>
              <div class="mini-title">${event.summary || "(Untitled event)"}</div>
            </div>
          `).join("");
        }

        card.innerHTML = `
          <div>
            <div class="day-name">${getShortDayName(date)}</div>
            <div class="day-date">${formatMonthDay(date)}</div>
          </div>
          <div class="day-events">${eventsHtml}</div>
        `;

        card.addEventListener("click", () => {
          window.location.href = `./day.html?date=${key}`;
        });

        grid.appendChild(card);
      }
    }

    function renderAll() {
      renderToday();
      renderNextSixDays();
    }

    async function gapiLoaded() {
      await new Promise((resolve) => gapi.load("client", resolve));
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });
      gapiInited = true;
      maybeReady();
    }

    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.error(resp);
            setStatus("Connection failed");
            return;
          }

          const token = gapi.client.getToken();
          if (token?.access_token) {
            saveToken(token.access_token, resp.expires_in || 3600);
          }

          document.getElementById("authBtn").textContent = "Refresh";
          document.getElementById("signOutBtn").style.display = "inline-flex";

          await loadGoogleCalendarData();
        },
      });

      gisInited = true;
      maybeReady();
    }

    async function maybeReady() {
      if (!gapiInited || !gisInited) return;

      document.getElementById("authBtn").disabled = false;

      const savedToken = getSavedToken();
      if (savedToken) {
        gapi.client.setToken({ access_token: savedToken });
        document.getElementById("authBtn").textContent = "Refresh";
        document.getElementById("signOutBtn").style.display = "inline-flex";
        setStatus("Restoring connection…");
        await loadGoogleCalendarData();
      } else {
        setStatus("Not connected");
      }
    }

    async function handleAuthClick() {
      if (!tokenClient) return;
      setStatus("Connecting…");
      tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function handleSignoutClick() {
      const token = gapi.client.getToken();
      if (token?.access_token) {
        google.accounts.oauth2.revoke(token.access_token);
      }

      gapi.client.setToken("");
      clearSavedToken();
      calendarsById = new Map();
      weekEvents = [];
      document.getElementById("authBtn").textContent = "Connect";
      document.getElementById("signOutBtn").style.display = "none";
      setStatus("Not connected");
      renderAll();
    }

    async function loadGoogleCalendarData() {
      try {
        setStatus("Loading calendars…");

        const calendarResp = await gapi.client.calendar.calendarList.list();
        const calendars = calendarResp.result.items || [];
        const visibleCalendars = calendars.filter(cal => cal.selected !== false);

        calendarsById = new Map(
          visibleCalendars.map(cal => [cal.id, cal])
        );

        const start = new Date();
        start.setHours(0, 0, 0, 0);

        const end = new Date(start);
        end.setDate(end.getDate() + 7);

        const responses = await Promise.all(
          visibleCalendars.map(cal =>
            gapi.client.calendar.events.list({
              calendarId: cal.id,
              timeMin: start.toISOString(),
              timeMax: end.toISOString(),
              showDeleted: false,
              singleEvents: true,
              orderBy: "startTime",
              maxResults: 250,
            }).then(resp => {
              const items = resp.result.items || [];
              return items.map(event => ({
                ...event,
                calendarId: cal.id,
              }));
            })
          )
        );

        weekEvents = responses.flat();
        renderAll();
        setStatus(`Loaded ${weekEvents.length} events`);
      } catch (err) {
        console.error(err);
        setStatus("Load failed");
      }
    }

    function handleNavClick(label) {
      if (label === "Calendar") {
        window.location.href = "./calendar.html";
        return;
      }
      alert(`${label} page is next to build.`);
    }

    document.getElementById("backAppsBtn").addEventListener("click", () => {
      window.location.href = "../index.html";
    });

    document.getElementById("authBtn").addEventListener("click", handleAuthClick);
    document.getElementById("signOutBtn").addEventListener("click", handleSignoutClick);

    document.getElementById("quickAddBtn").addEventListener("click", () => {
      const todayKey = formatDateKey(new Date());
      window.location.href = `./day.html?date=${todayKey}&add=1`;
    });

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => handleNavClick(btn.dataset.target));
    });

    renderAll();
    document.getElementById("authBtn").disabled = true;
    setStatus("Loading Google tools…");

    window.addEventListener("load", async () => {
      try {
        await gapiLoaded();
        gisLoaded();
      } catch (err) {
        console.error(err);
        setStatus("Setup failed");
      }
    });
  </script>
</body>
</html>
