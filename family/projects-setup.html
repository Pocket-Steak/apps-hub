<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PocketSteak Family - Projects Setup</title>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #1a1c22;
      --panel-2: #22252d;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.12);
      --text: #f5f7fb;
      --muted: #b7bfd3;
      --accent: #ff8a1f;
      --accent-hover: #e97812;
      --danger: #d93025;
      --green: #22c55e;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 14px;
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; color: var(--text); font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; }
    html { background: #171922; }
    body {
      padding: 16px; min-height: 100dvh;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,0.12), transparent 55%),
        linear-gradient(180deg, #0d0e11 0%, #12141a 35%, #171922 100%);
    }
    .app { max-width: 1400px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent 34%),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    h1 { margin: 18px 0 0; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .helper { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .btn {
      border: 1px solid var(--border-strong); background: var(--panel-2); color: var(--text);
      padding: 10px 14px; border-radius: var(--radius-md); font-weight: 600;
      cursor: pointer; min-height: 44px; font-size: 14px;
    }
    .btn:hover { background: #2a2d36; }
    .btn-accent { background: var(--accent); color: #1a1a1a; border-color: transparent; }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: white; border-color: transparent; }
    .btn-danger:hover { filter: brightness(1.1); }
    .status-pill { padding: 6px 10px; border-radius: 999px; font-size: 11px; border: 1px solid var(--border-strong); }
    .status-pill.status-ok { background: rgba(34,197,94,0.15); color: #86efac; border-color: rgba(34,197,94,0.35); }
    .status-pill.status-bad { background: rgba(220,38,38,0.15); color: #fca5a5; border-color: rgba(220,38,38,0.35); }
    .field { display: grid; gap: 4px; }
    .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .field input, .field select {
      background: var(--panel); color: var(--text); border: 1px solid var(--border-strong);
      border-radius: 10px; padding: 10px 12px; font-size: 14px; min-height: 44px;
    }
    .field input:focus, .field select:focus { outline: 2px solid var(--accent); }
    .form-grid {
      display: grid; gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      align-items: end;
    }
    .form-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .task-row {
      display: grid; gap: 10px;
      grid-template-columns: 1fr auto;
      padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md);
      background: rgba(255,255,255,0.02); align-items: start;
      margin-top: 10px;
    }
    .task-info { display: grid; gap: 4px; }
    .task-title { font-weight: 700; font-size: 16px; }
    .task-meta { color: var(--muted); font-size: 13px; display: flex; flex-direction: column; gap: 2px; }
    .task-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: start; }
    .task-edit { grid-column: 1 / -1; padding-top: 10px; border-top: 1px dashed var(--border-strong); }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 999px; background: rgba(255,138,31,0.15); color: var(--accent); font-size: 11px; font-weight: 600; margin-right: 4px; }
    .badge.inactive { background: rgba(255,255,255,0.06); color: var(--muted); }
    .empty {
      padding: 18px; text-align: center; color: var(--muted);
      border: 1px dashed var(--border-strong); border-radius: var(--radius-md);
    }
    .message {
      margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-md);
      font-size: 13px; display: none;
    }
    .message.error { display: block; background: rgba(220,38,38,0.15); color: #fca5a5; }
    .message.success { display: block; background: rgba(34,197,94,0.15); color: #86efac; }
    .group-title { margin-top: 18px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    @media (max-width: 600px) {
      .task-row { grid-template-columns: 1fr; }
      .task-actions { justify-content: flex-start; }
      h1 { font-size: 22px; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/family-supabase.js?v=20260421"></script>
  <script>
    (function ensurePocketSteakSupabaseFallback() {
      if (window.PocketSteakSupabase) return;
      const URL_KEY = "pocketsteak_supabase_url";
      const ANON_KEY_KEY = "pocketsteak_supabase_anon_key";
      const DEFAULT_URL = "https://vmmdskviwqddgalccoyc.supabase.co";
      const DEFAULT_ANON_KEY = "sb_publishable_Y95c2qYSmD8YKdaIeOZYWA_6GmC2OHM";
      function normalizeText(v){return String(v||"").replace(/[​-‍﻿]/g,"").trim();}
      function normalizeUrl(v){const t=normalizeText(v);if(!t)return"";try{const u=new URL(t);u.pathname=u.pathname.replace(/\/rest\/v1\/?$/i,"/").replace(/\/auth\/v1\/?$/i,"/");u.search="";u.hash="";return u.toString().replace(/\/$/,"");}catch(_){return t.replace(/\/$/,"");}}
      function isLikelySupabaseUrl(v){try{const u=new URL(normalizeUrl(v));return Boolean(u.hostname&&u.hostname.includes("supabase.co"));}catch(_){return false;}}
      function isLikelyPublishableKey(v){const t=normalizeText(v);return t.startsWith("sb_publishable_")||t.startsWith("sb_anon_");}
      function getConfig(){const u=normalizeText(localStorage.getItem(URL_KEY));const a=normalizeText(localStorage.getItem(ANON_KEY_KEY));const url=isLikelySupabaseUrl(u)?normalizeUrl(u):DEFAULT_URL;const anonKey=isLikelyPublishableKey(a)?a:DEFAULT_ANON_KEY;return{url,anonKey,configured:Boolean(url&&anonKey)};}
      function createClient(){const c=getConfig();if(!c.configured)return null;if(!window.supabase||typeof window.supabase.createClient!=="function")throw new Error("Supabase client library is not loaded.");return window.supabase.createClient(c.url,c.anonKey,{auth:{persistSession:false,autoRefreshToken:false}});}
      window.PocketSteakSupabase={getConfig,createClient};
    })();
  </script>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="topbar">
        <div class="toolbar-group">
          <a class="btn" href="/family/">← Back to Home</a>
          <a class="btn" href="/projects/">Viewer</a>
        </div>
        <div class="toolbar-group">
          <button class="btn" type="button" onclick="window.location.href='/settings/'">Settings</button>
          <div id="statusPill" class="status-pill status-bad">
            <span id="statusText">Loading…</span>
          </div>
          <button class="btn btn-accent" id="reloadBtn" type="button">Reload</button>
        </div>
      </div>
      <h1>Projects Setup</h1>
      <div class="helper">Configure daily chores and date-specific tasks. They populate the Projects viewer.</div>
      <div id="message" class="message"></div>
    </section>

    <section class="card">
      <h2 id="formTitle">Add a New Task</h2>
      <div class="form-grid">
        <div class="field" style="grid-column: 1 / -1">
          <label for="titleInput">Title</label>
          <input id="titleInput" type="text" placeholder="e.g. Sweep garage" />
        </div>
        <div class="field">
          <label for="recurrenceSelect">Recurrence</label>
          <select id="recurrenceSelect">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="twice_weekly">Twice Weekly</option>
            <option value="bi_weekly">Bi-Weekly (every 2 weeks)</option>
            <option value="monthly">Monthly</option>
            <option value="every_other_month">Every Other Month</option>
            <option value="twice_a_year">Twice A Year</option>
            <option value="yearly">Once A Year</option>
          </select>
        </div>
        <div class="field" id="dowField" style="display:none">
          <label for="dowSelect">Day of Week</label>
          <select id="dowSelect"></select>
        </div>
        <div class="field" id="dow2Field" style="display:none">
          <label for="dow2Select">Second Day of Week</label>
          <select id="dow2Select"></select>
        </div>
        <div class="field" id="womField" style="display:none">
          <label for="womSelect">Week of Month</label>
          <select id="womSelect">
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
            <option value="5">5th</option>
            <option value="-1">Last</option>
          </select>
        </div>
        <div class="field" id="monthField" style="display:none">
          <label for="monthSelect">Month</label>
          <select id="monthSelect"></select>
        </div>
        <div class="field" id="month2Field" style="display:none">
          <label for="month2Select">Second Month</label>
          <select id="month2Select"></select>
        </div>
        <div class="field" id="startField" style="display:none">
          <label for="startDateInput">Start Date</label>
          <input id="startDateInput" type="date" />
        </div>
      </div>
      <div class="form-actions" style="margin-top: 12px">
        <button class="btn btn-accent" id="saveBtn" type="button">Add Task</button>
        <button class="btn" id="cancelEditBtn" type="button" style="display:none">Cancel Edit</button>
      </div>
    </section>

    <section class="card">
      <h2>All Tasks</h2>
      <div id="dailyGroup">
        <div class="group-title">Daily Chores</div>
        <div id="dailyList"></div>
        <div id="dailyEmpty" class="empty" style="display:none">No daily chores yet.</div>
      </div>
      <div id="dateGroup">
        <div class="group-title">Date-Specific Tasks</div>
        <div id="dateList"></div>
        <div id="dateEmpty" class="empty" style="display:none">No date-specific tasks yet.</div>
      </div>
    </section>
  </main>

  <script>
    const TASKS_TABLE = "family_project_tasks";

    const RECURRENCE_VALUES = new Set([
      "daily","weekly","twice_weekly","bi_weekly","monthly",
      "every_other_month","twice_a_year","yearly",
    ]);
    const RECURRENCE_LABELS = {
      daily:"Daily", weekly:"Weekly", twice_weekly:"Twice Weekly", bi_weekly:"Bi-Weekly",
      monthly:"Monthly", every_other_month:"Every Other Month", twice_a_year:"Twice A Year", yearly:"Yearly",
    };
    const WEEKDAY_LABELS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTH_LABELS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const WEEK_OF_MONTH_LABELS = ["1st","2nd","3rd","4th","5th"];

    let supabaseClient = null;
    let supabaseSig = "";
    let tasks = [];
    let editingId = null;

    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");
    const reloadBtn = document.getElementById("reloadBtn");
    const messageEl = document.getElementById("message");
    const titleInput = document.getElementById("titleInput");
    const recurrenceSelect = document.getElementById("recurrenceSelect");
    const dowSelect = document.getElementById("dowSelect");
    const dow2Select = document.getElementById("dow2Select");
    const womSelect = document.getElementById("womSelect");
    const monthSelect = document.getElementById("monthSelect");
    const month2Select = document.getElementById("month2Select");
    const startDateInput = document.getElementById("startDateInput");
    const dowField = document.getElementById("dowField");
    const dow2Field = document.getElementById("dow2Field");
    const womField = document.getElementById("womField");
    const monthField = document.getElementById("monthField");
    const month2Field = document.getElementById("month2Field");
    const startField = document.getElementById("startField");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const formTitle = document.getElementById("formTitle");
    const dailyList = document.getElementById("dailyList");
    const dailyEmpty = document.getElementById("dailyEmpty");
    const dateList = document.getElementById("dateList");
    const dateEmpty = document.getElementById("dateEmpty");

    WEEKDAY_LABELS.forEach((label, idx) => {
      const opt1 = document.createElement("option");
      opt1.value = String(idx); opt1.textContent = label;
      dowSelect.appendChild(opt1);
      const opt2 = document.createElement("option");
      opt2.value = String(idx); opt2.textContent = label;
      dow2Select.appendChild(opt2);
    });
    MONTH_LABELS.forEach((label, idx) => {
      const opt1 = document.createElement("option");
      opt1.value = String(idx+1); opt1.textContent = label;
      monthSelect.appendChild(opt1);
      const opt2 = document.createElement("option");
      opt2.value = String(idx+1); opt2.textContent = label;
      month2Select.appendChild(opt2);
    });
    dowSelect.value = "1";
    dow2Select.value = "4";
    monthSelect.value = "1";
    month2Select.value = "7";
    startDateInput.value = new Date().toISOString().slice(0,10);

    function escapeHtml(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
    function setStatus(text, ok=false){statusText.textContent=text;statusPill.classList.toggle("status-ok",ok);statusPill.classList.toggle("status-bad",!ok);}
    function showMessage(text="", type=""){messageEl.textContent=text;messageEl.className="message";if(type)messageEl.classList.add(type);if(text){setTimeout(()=>{if(messageEl.textContent===text)showMessage();},4000);}}

    function ensureClient() {
      const cfg = window.PocketSteakSupabase?.getConfig();
      if (!cfg?.configured) throw new Error("Supabase not configured.");
      const sig = `${cfg.url}::${cfg.anonKey}`;
      if (!supabaseClient || supabaseSig !== sig) {
        supabaseClient = window.PocketSteakSupabase.createClient();
        supabaseSig = sig;
      }
      return supabaseClient;
    }

    function normalizeRecurrence(v){const n=String(v||"").trim();return RECURRENCE_VALUES.has(n)?n:"daily";}
    function normalizeDayOfWeek(v){const n=Number(v);return Number.isInteger(n)&&n>=0&&n<=6?n:1;}
    function normalizeMonth(v){const n=Number(v);return Number.isInteger(n)&&n>=1&&n<=12?n:1;}
    function normalizeWeekOfMonth(v){const n=Number(v);if(n===-1)return -1;return Number.isFinite(n)&&n>=1&&n<=5?n:1;}
    function getWeekOfMonthLabel(n){const w=normalizeWeekOfMonth(n);if(w===-1)return"Last";return WEEK_OF_MONTH_LABELS[w-1]||"1st";}

    function usesDayOfWeek(r){return ["weekly","twice_weekly","bi_weekly","monthly","every_other_month","twice_a_year","yearly"].includes(r);}
    function usesDayOfWeek2(r){return r === "twice_weekly";}
    function usesWeekOfMonth(r){return ["monthly","every_other_month","twice_a_year","yearly"].includes(r);}
    function usesMonth(r){return ["twice_a_year","yearly"].includes(r);}
    function usesMonth2(r){return r === "twice_a_year";}
    function usesStartDate(r){return r !== "daily";}

    function refreshFormFields() {
      const r = normalizeRecurrence(recurrenceSelect.value);
      dowField.style.display = usesDayOfWeek(r) ? "" : "none";
      dow2Field.style.display = usesDayOfWeek2(r) ? "" : "none";
      womField.style.display = usesWeekOfMonth(r) ? "" : "none";
      monthField.style.display = usesMonth(r) ? "" : "none";
      month2Field.style.display = usesMonth2(r) ? "" : "none";
      startField.style.display = usesStartDate(r) ? "" : "none";
    }

    recurrenceSelect.addEventListener("change", refreshFormFields);
    refreshFormFields();

    function getScheduleLabel(recurrence, schedule = {}) {
      const r = normalizeRecurrence(recurrence);
      if (r === "daily") return "Every day";
      const wd = WEEKDAY_LABELS[normalizeDayOfWeek(schedule.dayOfWeek)] || "Monday";
      if (r === "weekly") return wd;
      if (r === "bi_weekly") return `${wd} (every 2 weeks)`;
      if (r === "twice_weekly") {
        const wd2 = WEEKDAY_LABELS[normalizeDayOfWeek(schedule.dayOfWeek2)] || "Thursday";
        return `${wd} & ${wd2}`;
      }
      if (r === "monthly") return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of month`;
      if (r === "every_other_month") return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} (every 2 months)`;
      if (r === "twice_a_year") {
        const m1 = normalizeMonth(schedule.month);
        const fallback = ((m1+5)%12)+1;
        const m2 = normalizeMonth(schedule.month2 ?? fallback);
        return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of ${MONTH_LABELS[m1-1]} & ${MONTH_LABELS[m2-1]}`;
      }
      if (r === "yearly") {
        const m = normalizeMonth(schedule.month);
        return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of ${MONTH_LABELS[m-1]}`;
      }
      return "";
    }

    function getTaskSchedule(t) {
      const month = normalizeMonth(t?.recurrence_month);
      const fallback2 = ((month+5)%12)+1;
      return {
        dayOfWeek: normalizeDayOfWeek(t?.recurrence_day_of_week),
        dayOfWeek2: normalizeDayOfWeek(t?.recurrence_day_of_week_2 ?? 4),
        weekOfMonth: normalizeWeekOfMonth(t?.recurrence_week_of_month ?? 1),
        month,
        month2: normalizeMonth(t?.recurrence_month_2 ?? fallback2),
        startDate: t?.recurrence_start_date || null,
      };
    }

    async function loadAll({ silent = false } = {}) {
      try {
        if (!silent) setStatus("Loading…", false);
        const client = ensureClient();
        const res = await client
          .from(TASKS_TABLE)
          .select("id,title,active,recurrence_interval,recurrence_day_of_week,recurrence_day_of_week_2,recurrence_week_of_month,recurrence_month,recurrence_month_2,recurrence_day_of_month,recurrence_start_date,sort_order,created_at")
          .order("sort_order", { ascending: true, nullsLast: true })
          .order("created_at", { ascending: false });
        if (res.error) throw res.error;
        tasks = res.data || [];
        setStatus("Connected", true);
        renderTasks();
      } catch (error) {
        console.error(error);
        setStatus("Error", false);
        if (!silent) showMessage(error?.message || "Failed to load.", "error");
      }
    }

    function renderTasks() {
      const daily = tasks.filter(t => normalizeRecurrence(t.recurrence_interval) === "daily");
      const date = tasks.filter(t => normalizeRecurrence(t.recurrence_interval) !== "daily");
      renderList(daily, dailyList, dailyEmpty);
      renderList(date, dateList, dateEmpty);
    }

    function renderList(rows, container, emptyEl) {
      container.innerHTML = "";
      emptyEl.style.display = rows.length ? "none" : "block";
      for (const t of rows) {
        const r = normalizeRecurrence(t.recurrence_interval);
        const schedule = getTaskSchedule(t);
        const startLine = (r !== "daily" && schedule.startDate)
          ? `Starts ${new Date(schedule.startDate).toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" })}`
          : "";
        const activeBadge = t.active ? `<span class="badge">Active</span>` : `<span class="badge inactive">Inactive</span>`;
        const row = document.createElement("div");
        row.className = "task-row";
        row.innerHTML = `
          <div class="task-info">
            <div class="task-title">${activeBadge}${escapeHtml(t.title)}</div>
            <div class="task-meta">
              <span>${escapeHtml(RECURRENCE_LABELS[r] || r)}</span>
              <span>${escapeHtml(getScheduleLabel(r, schedule))}</span>
              ${startLine ? `<span>${escapeHtml(startLine)}</span>` : ""}
            </div>
          </div>
          <div class="task-actions">
            <button class="btn" type="button" data-edit="${escapeHtml(t.id)}">Edit</button>
            <button class="btn" type="button" data-toggle="${escapeHtml(t.id)}">${t.active ? "Deactivate" : "Activate"}</button>
            <button class="btn btn-danger" type="button" data-delete="${escapeHtml(t.id)}">Delete</button>
          </div>
        `;
        row.querySelector("[data-edit]").addEventListener("click", () => startEdit(t.id));
        row.querySelector("[data-toggle]").addEventListener("click", () => toggleActive(t.id));
        row.querySelector("[data-delete]").addEventListener("click", () => deleteTask(t.id));
        container.appendChild(row);
      }
    }

    function clearForm() {
      titleInput.value = "";
      recurrenceSelect.value = "daily";
      dowSelect.value = "1";
      dow2Select.value = "4";
      womSelect.value = "1";
      monthSelect.value = "1";
      month2Select.value = "7";
      startDateInput.value = new Date().toISOString().slice(0,10);
      editingId = null;
      saveBtn.textContent = "Add Task";
      cancelEditBtn.style.display = "none";
      formTitle.textContent = "Add a New Task";
      refreshFormFields();
    }

    function startEdit(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      editingId = id;
      titleInput.value = t.title || "";
      recurrenceSelect.value = normalizeRecurrence(t.recurrence_interval);
      dowSelect.value = String(normalizeDayOfWeek(t.recurrence_day_of_week));
      dow2Select.value = String(normalizeDayOfWeek(t.recurrence_day_of_week_2 ?? 4));
      womSelect.value = String(normalizeWeekOfMonth(t.recurrence_week_of_month ?? 1));
      monthSelect.value = String(normalizeMonth(t.recurrence_month));
      month2Select.value = String(normalizeMonth(t.recurrence_month_2 ?? ((normalizeMonth(t.recurrence_month)+5)%12)+1));
      startDateInput.value = t.recurrence_start_date || new Date().toISOString().slice(0,10);
      refreshFormFields();
      saveBtn.textContent = "Save Changes";
      cancelEditBtn.style.display = "";
      formTitle.textContent = `Editing: ${t.title}`;
      titleInput.focus();
      titleInput.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function buildPayload() {
      const title = titleInput.value.trim();
      if (!title) {
        showMessage("Title is required.", "error");
        titleInput.focus();
        return null;
      }
      const r = normalizeRecurrence(recurrenceSelect.value);
      const payload = {
        title,
        active: true,
        recurrence_interval: r,
        recurrence_day_of_week: usesDayOfWeek(r) ? Number(dowSelect.value) : 1,
        recurrence_day_of_week_2: usesDayOfWeek2(r) ? Number(dow2Select.value) : 4,
        recurrence_week_of_month: usesWeekOfMonth(r) ? Number(womSelect.value) : 1,
        recurrence_month: usesMonth(r) ? Number(monthSelect.value) : 1,
        recurrence_month_2: usesMonth2(r) ? Number(month2Select.value) : 7,
        recurrence_day_of_month: 1,
        recurrence_start_date: usesStartDate(r) ? startDateInput.value : null,
      };
      return payload;
    }

    async function saveTask() {
      try {
        const payload = buildPayload();
        if (!payload) return;
        const client = ensureClient();
        if (editingId) {
          const { error } = await client.from(TASKS_TABLE).update(payload).eq("id", editingId);
          if (error) throw error;
          showMessage("Task updated.", "success");
        } else {
          const sortMax = tasks.reduce((m, t) => Math.max(m, t.sort_order || 0), 0);
          payload.sort_order = sortMax + 10;
          const { error } = await client.from(TASKS_TABLE).insert(payload);
          if (error) throw error;
          showMessage("Task added.", "success");
        }
        clearForm();
        await loadAll({ silent: true });
      } catch (error) {
        console.error(error);
        showMessage(error?.message || "Failed to save task.", "error");
      }
    }

    async function toggleActive(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      try {
        const client = ensureClient();
        const { error } = await client.from(TASKS_TABLE).update({ active: !t.active }).eq("id", id);
        if (error) throw error;
        await loadAll({ silent: true });
      } catch (error) {
        console.error(error);
        showMessage(error?.message || "Failed to toggle.", "error");
      }
    }

    async function deleteTask(id) {
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      if (!confirm(`Delete "${t.title}"? This also removes its completion history.`)) return;
      try {
        const client = ensureClient();
        const { error } = await client.from(TASKS_TABLE).delete().eq("id", id);
        if (error) throw error;
        if (editingId === id) clearForm();
        await loadAll({ silent: true });
        showMessage("Task deleted.", "success");
      } catch (error) {
        console.error(error);
        showMessage(error?.message || "Failed to delete.", "error");
      }
    }

    saveBtn.addEventListener("click", saveTask);
    cancelEditBtn.addEventListener("click", clearForm);
    reloadBtn.addEventListener("click", () => loadAll());
    titleInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); saveTask(); }
    });

    setStatus("Loading…", false);
    loadAll();
  </script>
</body>
</html>
