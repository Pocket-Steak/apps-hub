<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak Recipes</title>
  <meta name="description" content="PocketSteak recipes inside the family command center." />

  <style>
    :root{
      --bg:#0e0f12;
      --panel:#1a1c22;
      --panel-2:#22252d;
      --border:rgba(255,255,255,.1);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --accent:#ff7a18;
      --accent-2:#ff9c4d;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:12px;
      overflow:hidden;
    }

    .page{
      height:calc(100dvh - 24px);
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
      gap:12px;
      max-width:1800px;
      margin:0 auto;
    }

    .topbar{
      min-height:66px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:
        linear-gradient(90deg, rgba(255,122,24,.12), transparent 22%, transparent 80%, rgba(255,122,24,.08)),
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      box-shadow:var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-logo{
      width:48px;
      height:48px;
      object-fit:contain;
      filter:drop-shadow(0 6px 12px rgba(0,0,0,.22));
      flex:0 0 auto;
    }

    .brand-copy{
      display:grid;
      gap:3px;
      min-width:0;
    }

    .brand-eyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent-2);
      line-height:1;
    }

    .brand-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.02em;
      line-height:1;
      color:var(--text);
      white-space:nowrap;
    }

    .top-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .top-btn{
      border:none;
      min-height:42px;
      padding:10px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease, filter .18s ease;
    }

    .top-btn:hover{
      background:rgba(255,255,255,.14);
      transform:translateY(-1px);
    }

    .top-btn.accent{
      background:var(--accent);
      color:#fff;
    }

    .top-btn.accent:hover{
      filter:brightness(1.06);
    }

    .recipes-shell{
      min-height:0;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:#050505;
      box-shadow:var(--shadow);
    }

    .recipes-frame{
      display:block;
      width:100%;
      height:100%;
      border:0;
      background:#050505;
    }

    @media (max-width: 720px){
      body{
        padding:10px;
      }

      .page{
        height:calc(100dvh - 20px);
        gap:10px;
      }

      .topbar{
        min-height:auto;
        align-items:stretch;
        flex-direction:column;
      }

      .brand,
      .top-actions{
        width:100%;
      }

      .top-actions{
        justify-content:stretch;
      }

      .top-btn{
        flex:1 1 160px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand" aria-label="PocketSteak Recipes">
        <div class="brand-copy">
          <div class="brand-eyebrow">Command Center</div>
          <div class="brand-title">Recipes</div>
        </div>
      </div>

      <div class="top-actions">
        <button class="top-btn accent" id="backHomeBtn" type="button">Back to Command Center</button>
      </div>
    </header>

    <section class="recipes-shell" aria-label="PocketSteak recipes app">
      <iframe
        class="recipes-frame"
        src="https://pocketsteak-recipes.vercel.app/"
        title="PocketSteak Recipes"
        sandbox="allow-forms allow-scripts allow-same-origin"
      ></iframe>
    </section>
  </main>

  <script>
    document.getElementById("backHomeBtn").addEventListener("click", () => {
      window.location.href = "/family/";
    });
  </script>
</body>
</html>
