<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak's Apps</title>
  <style>
    :root {
      --bg: #050505;
      --brand: #FF4500;
      --brand-glow: rgba(255, 69, 0, 0.35);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --glass: blur(12px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Edgy Mesh Gradient Background */
      background-image: 
        radial-gradient(at 0% 0%, rgba(255, 69, 0, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(255, 69, 0, 0.1) 0px, transparent 50%);
      overflow-x: hidden;
    }

    header {
      max-width: 1100px;
      margin: 40px auto 20px;
      padding: 0 20px;
      text-align: center;
    }

    .logo {
      width: 80px;
      filter: drop-shadow(0 0 20px var(--brand-glow));
      margin-bottom: 10px;
    }

    .mast-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mast-title span { color: var(--brand); -webkit-text-fill-color: var(--brand); }

    main {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
    }

    /* Bento Grid Logic */
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(6, 1fr);
    }

    .tile {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
    }

    /* Highlighting Active Apps */
    .tile.featured {
      grid-column: span 3;
      background: rgba(255, 69, 0, 0.05);
      border: 1px solid rgba(255, 69, 0, 0.3);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    
    .tile.standard { grid-column: span 2; }

    .tile:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
    }

    .tile.featured:hover {
      border-color: var(--brand);
      box-shadow: 0 0 30px var(--brand-glow);
    }

    /* App Badges */
    .status-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
    }

    .featured .status-badge { background: var(--brand); color: #fff; }
    .tst-badge { background: #333 !important; color: #0f0 !important; font-family: monospace; }

    .mark {
      font-size: 32px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }

    .name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .desc { font-size: 14px; color: var(--text-dim); line-height: 1.5; font-weight: 400; }

    .btn {
      margin-top: auto;
      align-self: flex-start;
      padding: 10px 20px;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      border: none;
      transition: 0.2s;
    }

    .featured .btn { background: var(--brand); color: #fff; }

    footer {
      padding: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Mobile Cleanup */
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .tile.featured, .tile.standard { grid-column: span 1; }
      .mast-title { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="/assets/pocket_steak_logo.png" alt="Logo" />
    <h1 class="mast-title">POCKETSTEAK <span>APPS</span></h1>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>© 2026 POCKETSTEAK — SYSTEM ACTIVE</footer>

  <script>
    const APPS = [
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "The central nervous system for the household. Calendars, lists, and notes.",
        url: "/family/",
        type: "featured"
      },
      {
        emoji: "🍽️",
        name: "Recipe Extractor",
        desc: "Clean, ad-free recipes stripped from the web in seconds.",
        url: "https://pocketsteak-recipes.vercel.app/",
        type: "featured"
      },
      {
        emoji: "🧪",
        name: "Command Center TST",
        desc: "Sandbox environment for experimental features.",
        url: "/family-tst/",
        type: "standard",
        status: "TEST"
      },
      {
        emoji: "🗳️",
        name: "Secret Vote",
        desc: "Anonymous ranking system. WIP.",
        url: "https://pocket-steak.github.io/secret-vote/#/",
        type: "standard",
        status: "WIP"
      },
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "T-Minus August 15, 2026.",
        url: "/countdown/",
        type: "standard",
        status: "WIP"
      }
    ];

    const grid = document.getElementById("grid");

    grid.innerHTML = APPS.map((app) => `
      <a href="${app.url}" class="tile ${app.type}" ${app.url.startsWith('http') ? 'target="_blank"' : ''}>
        ${app.status ? `<span class="status-badge ${app.status === 'TEST' ? 'tst-badge' : ''}">${app.status}</span>` : '<span class="status-badge">Active</span>'}
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <button class="btn">${app.status === 'WIP' ? 'Preview' : 'Launch'}</button>
      </a>
    `).join("");
  </script>
</body>
</html>
