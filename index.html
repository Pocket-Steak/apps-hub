<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocketSteak's Apps</title>
  <meta name="description" content="A bold, fun hub for PocketSteak's projects and apps." />

  <style>
    :root{
      --ink:#0a0a0a; --ink-invert:#fff;
      --shadow-1:0 20px 60px rgba(0,0,0,.35);
      --radius-xxl:28px; --grid-max:1120px;
      --tile-fg:#0b0b0b; --mark-bg:rgba(255,255,255,.92); --mark-border:rgba(0,0,0,.05);
      --brand:#ff7a18;
    }

    .theme-night{
      --bg-a:#0b0b0d; --bg-b:#141417; --bg-c:#1c1c20; --bg-d:#2a2a2f;
      --tile-1:linear-gradient(135deg,#2c2c31,#16161a);
      --tile-2:linear-gradient(135deg,#34343a,#1b1b20);
      --tile-3:linear-gradient(135deg,#3a3a41,#202026);
      --tile-4:linear-gradient(135deg,#2f2f36,#141419);
      --tile-fg:#f2f3f5; --mark-bg:rgba(255,255,255,.08); --mark-border:rgba(255,255,255,.15);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink-invert);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,255,255,.18), transparent 60%),
        radial-gradient(1000px 600px at 110% 10%, rgba(255,255,255,.12), transparent 55%),
        linear-gradient(135deg,var(--bg-a),var(--bg-b) 35%,var(--bg-c) 70%,var(--bg-d));
      background-size:200% 200%;
      animation:bgShift 18s ease-in-out infinite alternate;
    }
    @keyframes bgShift{from{background-position:0% 40%}to{background-position:100% 60%}}

    header{max-width:var(--grid-max);margin:0 auto;padding:28px 20px 0}
    .mast{ display:flex; align-items:center; gap:10px; }

    .logo{
      width:clamp(140px,22vw,260px);
      height:auto; display:block;
      filter:brightness(1.1) drop-shadow(0 6px 18px rgba(0,0,0,.6));
    }

    .mast-title{
      display:flex; flex-direction:column; align-items:center;
      line-height:1.02;
    }
    .mast-title .line1{ font-weight:900; font-size:clamp(42px,6vw,92px); }
    .mast-title .line2{ font-weight:900; font-size:clamp(38px,5.5vw,84px); }

    .mast-title .line1,
    .mast-title .line2 {
      background: linear-gradient(180deg, #ffb457, #ff7a18 60%, #ff5400);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .mast-bar{
      height:10px; border-radius:999px;
      background:rgba(255,255,255,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 10px 26px rgba(0,0,0,.18);
      margin:14px 0 18px 0;
    }

    main{max-width:var(--grid-max);margin:0 auto;padding:12px 20px 60px}
    .grid{display:grid;gap:28px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}

    .tile{
      display:flex;flex-direction:column;gap:14px;padding:22px;
      border-radius:var(--radius-xxl);
      background:var(--tile-1);
      color:var(--tile-fg);
      box-shadow:var(--shadow-1);
      border:1px solid rgba(255,255,255,.2);
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .tile:hover{transform:translateY(-4px);box-shadow:0 28px 80px rgba(0,0,0,.45)}

    .mark{
      width:64px;height:64px;display:grid;place-items:center;
      border-radius:20px;font-size:32px;
      background:var(--mark-bg);
      border:1px solid var(--mark-border);
    }

    .name{font-weight:900;font-size:24px}
    .desc{opacity:.9;font-weight:600}

    .actions{margin-top:auto;display:flex;justify-content:flex-end}

    .btn{
      font-weight:900;
      padding:10px 14px;
      border-radius:14px;
      background:var(--brand);
      color:#fff;
      border:none;
      cursor:pointer;
    }

    .btn.disabled{
      background:rgba(255,255,255,.18);
      cursor:not-allowed;
    }

    footer{text-align:center;color:rgba(255,255,255,.75);font-weight:600;padding-bottom:24px}
  </style>
</head>

<body class="theme-night">
  <header>
    <div class="mast">
      <img class="logo" src="./assets/pocket_steak_logo.png" alt="PocketSteak logo" />
      <div class="mast-title">
        <span class="line1">PocketSteak's</span>
        <span class="line2">Apps</span>
      </div>
    </div>
    <div class="mast-bar"></div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>© PocketSteak — Built to tap.</footer>

  <script>
    const APPS = [
      {
        emoji: "🗳️",
        name: "The Secret Vote",
        desc: "Anonymous room-based ranking magic.",
        url: "https://pocket-steak.github.io/secret-vote/#/"
      },
      {
        emoji: "⏳",
        name: "Countdown",
        desc: "Live countdown to August 15, 2026.",
        url: "/countdown/"
      },
      {
        emoji: "🏠",
        name: "Family Command Center",
        desc: "Weekly calendar, grocery list, to-do list, and family notes.",
        url: "/family/"
      },
      {
        emoji: "🚧",
        name: "MTG Stats",
        desc: "Track & compare your game nights — Under construction.",
        url: "#",
        underConstruction: true
      },
      {
        emoji: "🚧",
        name: "The Randomizer",
        desc: "Instant decisions. Zero debates — Under construction.",
        url: "#",
        underConstruction: true
      }
    ];

    const grid = document.getElementById("grid");

    grid.innerHTML = APPS.map((app) => `
      <article class="tile" data-url="${app.url}" data-wip="${app.underConstruction ? 1 : 0}">
        <div class="mark">${app.emoji}</div>
        <div class="name">${app.name}</div>
        <div class="desc">${app.desc}</div>
        <div class="actions">
          ${
            app.underConstruction
              ? `<button class="btn disabled">Coming Soon</button>`
              : `<button class="btn">Open</button>`
          }
        </div>
      </article>
    `).join("");

    grid.addEventListener("click", (e) => {
      const tile = e.target.closest(".tile");
      if (!tile) return;
      if (tile.dataset.wip === "1") return;

      const url = tile.dataset.url;
      if (!url) return;

      if (url.startsWith("/")) {
        window.location.href = url;
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });
  </script>
</body>
</html>
