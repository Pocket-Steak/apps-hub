<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>PocketSteak Family - Projects</title>

  <style>
    :root {
      --bg: #0e0f12;
      --panel: #1a1c22;
      --panel-2: #22252d;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #f5f7fb;
      --muted: #b7bfd3;
      --accent: #ff8a1f;
      --accent-hover: #e97812;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #dc2626;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 14px;
      --tap: 54px;
      --maxw: 1600px;
      --card-pad: 16px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%; color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    html { background: #171922; }
    body {
      padding: 16px; min-height: 100dvh;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255, 122, 24, 0.12), transparent 55%),
        linear-gradient(180deg, #0d0e11 0%, #12141a 35%, #171922 100%);
    }
    .app {
      max-width: var(--maxw); margin: 0 auto;
      display: grid; gap: 16px;
    }
    .card {
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 34%),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: var(--card-pad);
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; flex-wrap: wrap;
    }
    .toolbar-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--border-strong); background: var(--panel-2);
      color: var(--text); padding: 10px 14px; border-radius: var(--radius-md);
      font-weight: 600; cursor: pointer; min-height: 44px; font-size: 14px;
    }
    .btn:hover { background: #2a2d36; }
    .btn-accent { background: var(--accent); color: #1a1a1a; border-color: transparent; }
    .btn-accent:hover { background: var(--accent-hover); }
    .status-pill {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 6px 10px; border-radius: 999px; font-size: 11px;
      border: 1px solid var(--border-strong); line-height: 1.1;
    }
    .status-pill.status-ok { background: rgba(34, 197, 94, 0.15); color: #86efac; border-color: rgba(34, 197, 94, 0.35); }
    .status-pill.status-bad { background: rgba(220, 38, 38, 0.15); color: #fca5a5; border-color: rgba(220, 38, 38, 0.35); }
    .status-label { font-size: 9px; opacity: 0.7; letter-spacing: 0.04em; }
    h1 { margin: 18px 0 0; font-size: 28px; }
    .section-title {
      margin: 0 0 12px; font-size: 18px; display: flex; justify-content: space-between;
      align-items: center; gap: 8px;
    }
    .section-title .count {
      font-size: 12px; color: var(--muted); font-weight: 500;
    }
    .tile-grid {
      display: grid; gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    .tile {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-left: 6px solid var(--green);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px; min-height: 100px;
      transition: border-color 0.2s, background 0.2s;
    }
    .tile.status-green { border-left-color: var(--green); }
    .tile.status-yellow { border-left-color: var(--yellow); }
    .tile.status-red { border-left-color: var(--red); }
    .tile-title {
      font-weight: 700; font-size: 16px; line-height: 1.25;
    }
    .tile-meta {
      font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 2px;
    }
    .tile-actions { margin-top: auto; display: flex; gap: 6px; }
    .tile-action {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1px solid var(--border-strong); background: var(--panel);
      color: var(--text); font-weight: 600; cursor: pointer; min-height: 44px; font-size: 13px;
    }
    .tile-action.primary { background: var(--accent); color: #1a1a1a; border-color: transparent; }
    .tile-action.primary:hover { background: var(--accent-hover); }
    .tile-action:hover { background: #2a2d36; }
    .empty {
      padding: 18px; text-align: center; color: var(--muted);
      border: 1px dashed var(--border-strong); border-radius: var(--radius-md);
    }
    .message {
      margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-md);
      font-size: 13px; display: none;
    }
    .message.error { display: block; background: rgba(220, 38, 38, 0.15); color: #fca5a5; }
    .message.success { display: block; background: rgba(34, 197, 94, 0.15); color: #86efac; }
    .age-chip {
      display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .age-chip.status-green { background: rgba(34, 197, 94, 0.18); color: #86efac; }
    .age-chip.status-yellow { background: rgba(234, 179, 8, 0.18); color: #fde68a; }
    .age-chip.status-red { background: rgba(220, 38, 38, 0.18); color: #fca5a5; }
    @media (max-width: 600px) {
      .tile-grid { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
    }
  </style>

      function createClient(){const c=getConfig();if(!c.configured)return null;if(!window.supabase||typeof window.supabase.createClient!=="function")throw new Error("Supabase client library is not loaded.");return window.supabase.createClient(c.url,c.anonKey,{auth:{persistSession:false,autoRefreshToken:false}});}
      window.PocketSteakSupabase={getConfig,createClient,formatDateKey,getStartOfDay,getWeekStartDateFor,getCurrentDayKey(){return formatDateKey(getStartOfDay());},getCurrentWeekKey(){return formatDateKey(getWeekStartDateFor(new Date()));}};

<body>

    <section class="card">

  <script>
    const TASKS_TABLE = "family_project_tasks";
    const COMPLETIONS_TABLE = "family_project_task_completions";
    const SYNC_INTERVAL_MS = 15000;

    const RECURRENCE_VALUES = new Set([
      "daily","weekly","twice_weekly","bi_weekly","monthly",
      "every_other_month","twice_a_year","yearly",
    ]);
    const RECURRENCE_LABELS = {
      daily:"Daily", weekly:"Weekly", twice_weekly:"Twice Weekly", bi_weekly:"Bi Weekly",
      monthly:"Monthly", every_other_month:"Every Other Month", twice_a_year:"Twice A Year", yearly:"Yearly",
    };
    const WEEKDAY_LABELS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTH_LABELS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const WEEK_OF_MONTH_LABELS = ["1st","2nd","3rd","4th","5th"];
    const MS_PER_DAY = 24*60*60*1000;

    let supabaseClient = null;
    let supabaseSig = "";
    let tasks = [];
    let completions = [];
    let isBusy = false;

    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");
    const reloadBtn = document.getElementById("reloadBtn");
    const messageEl = document.getElementById("message");
    const dailyList = document.getElementById("dailyList");
    const dailyEmpty = document.getElementById("dailyEmpty");
    const dailyCount = document.getElementById("dailyCount");
    const dateList = document.getElementById("dateList");
    const dateEmpty = document.getElementById("dateEmpty");
    const dateCount = document.getElementById("dateCount");

    function escapeHtml(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
    function setStatus(text, ok=false){statusText.textContent=text;statusPill.classList.toggle("status-ok",ok);statusPill.classList.toggle("status-bad",!ok);}
    function showMessage(text="", type=""){messageEl.textContent=text;messageEl.className="message";if(type)messageEl.classList.add(type);}

    function ensureClient() {
      const cfg = window.PocketSteakSupabase?.getConfig();
      if (!cfg?.configured) throw new Error("Supabase not configured.");
      const sig = `${cfg.url}::${cfg.anonKey}`;
      if (!supabaseClient || supabaseSig !== sig) {
        supabaseClient = window.PocketSteakSupabase.createClient();
        supabaseSig = sig;
      }
      return supabaseClient;
    }

    function normalizeRecurrence(v){const n=String(v||"").trim();return RECURRENCE_VALUES.has(n)?n:"daily";}
    function normalizeDayOfWeek(v){const n=Number(v);return Number.isInteger(n)&&n>=0&&n<=6?n:1;}
    function normalizeMonth(v){const n=Number(v);return Number.isInteger(n)&&n>=1&&n<=12?n:1;}
    function normalizeWeekOfMonth(v){const n=Number(v);if(n===-1)return -1;return Number.isFinite(n)&&n>=1&&n<=5?n:1;}
    function getWeekOfMonthLabel(n){const w=normalizeWeekOfMonth(n);if(w===-1)return"Last";return WEEK_OF_MONTH_LABELS[w-1]||"1st";}

    function formatDateKey(d){return window.PocketSteakSupabase?.formatDateKey?window.PocketSteakSupabase.formatDateKey(d):(()=>{const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`;})();}
    function getStartOfDay(d=new Date()){return window.PocketSteakSupabase?.getStartOfDay?window.PocketSteakSupabase.getStartOfDay(d):(()=>{const x=new Date(d);x.setHours(0,0,0,0);return x;})();}
    function getWeekStartDateFor(d=new Date()){return window.PocketSteakSupabase?.getWeekStartDateFor?window.PocketSteakSupabase.getWeekStartDateFor(d):(()=>{const x=getStartOfDay(d);const day=x.getDay();const diff=day===0?-6:1-day;x.setDate(x.getDate()+diff);return x;})();}
    function parseScheduleDate(v){const t=String(v||"").trim();if(!t)return null;const m=t.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m){const d=new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));return Number.isNaN(d.getTime())?null:d;}const d=new Date(t);if(Number.isNaN(d.getTime()))return null;d.setHours(0,0,0,0);return d;}
    function getUtcDayNumber(d){return Math.floor(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/MS_PER_DAY);}
    function addDays(d,n){const x=getStartOfDay(d);x.setDate(x.getDate()+n);return x;}
    function addMonthsClamped(d,n){const x=getStartOfDay(d);return new Date(x.getFullYear(),x.getMonth()+n,1);}
    function getFirstWeekdayOnOrAfter(d,dow){const x=getStartOfDay(d);const t=normalizeDayOfWeek(dow);const diff=(t-x.getDay()+7)%7;x.setDate(x.getDate()+diff);return x;}
    function getFirstWeekdayInMonth(y,mi,dow){return getFirstWeekdayOnOrAfter(new Date(y,mi,1),dow);}
    function getNthWeekdayInMonth(y,mi,dow,n){const w=normalizeWeekOfMonth(n);const d=normalizeDayOfWeek(dow);if(w===-1){const last=new Date(y,mi+1,0);const diff=(last.getDay()-d+7)%7;return new Date(y,mi,last.getDate()-diff);}const first=getFirstWeekdayInMonth(y,mi,d);const res=addDays(first,(w-1)*7);if(res.getMonth()!==mi)return addDays(first,(w-2)*7);return res;}
    function getScheduleStartDate(s={}){return getStartOfDay(parseScheduleDate(s.startDate)||new Date());}
    function isBeforeStartDate(d,sd){return getStartOfDay(d).getTime()<getStartOfDay(sd).getTime();}
    function getBiWeeklyBucketStart(d,sd){const ws=getWeekStartDateFor(d);const as=getWeekStartDateFor(sd);const weeks=Math.floor((getUtcDayNumber(ws)-getUtcDayNumber(as))/7);return addDays(as,Math.floor(weeks/2)*14);}
    function getEveryOtherMonthBucketStart(d,sd){const x=getStartOfDay(d);const s=getStartOfDay(sd);const months=((x.getFullYear()-s.getFullYear())*12)+x.getMonth()-s.getMonth();return new Date(s.getFullYear(),s.getMonth()+Math.floor(months/2)*2,1);}
    function getLatestTwiceYearlyDate(d,s={}){const x=getStartOfDay(d);const m1=normalizeMonth(s.month)-1;const fallback=((m1+6)%12)+1;const m2=normalizeMonth(s.month2??fallback)-1;const wom=normalizeWeekOfMonth(s.weekOfMonth??1);const dow=normalizeDayOfWeek(s.dayOfWeek);const cands=[];for(let y=x.getFullYear()-1;y<=x.getFullYear()+1;y++){cands.push(getNthWeekdayInMonth(y,m1,dow,wom));cands.push(getNthWeekdayInMonth(y,m2,dow,wom));}return cands.filter(c=>c.getTime()<=x.getTime()).sort((a,b)=>b.getTime()-a.getTime())[0]||cands[0];}

    function getTaskSchedule(t){
      const month = normalizeMonth(t?.recurrence_month);
      const fallback2 = ((month+5)%12)+1;
      return {
        dayOfWeek: normalizeDayOfWeek(t?.recurrence_day_of_week),
        dayOfWeek2: normalizeDayOfWeek(t?.recurrence_day_of_week_2 ?? 4),
        weekOfMonth: normalizeWeekOfMonth(t?.recurrence_week_of_month ?? 1),
        month,
        month2: normalizeMonth(t?.recurrence_month_2 ?? fallback2),
        startDate: t?.recurrence_start_date || (t?.created_at?.slice(0,10)) || formatDateKey(new Date()),
      };
    }

    function getRecurrencePeriodStart(recurrence, schedule = {}, dateInput = new Date()) {
      const interval = normalizeRecurrence(recurrence);
      const date = getStartOfDay(dateInput);
      const startDate = getScheduleStartDate(schedule);
      if (interval !== "daily" && date.getTime() < startDate.getTime()) return null;

      if (interval === "daily") return date;

      if (interval === "weekly") {
        let due = getFirstWeekdayOnOrAfter(getWeekStartDateFor(date), schedule.dayOfWeek);
        if (date.getTime() < due.getTime()) due = addDays(due, -7);
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      if (interval === "bi_weekly") {
        let bucket = getBiWeeklyBucketStart(date, startDate);
        let due = getFirstWeekdayOnOrAfter(bucket, schedule.dayOfWeek);
        if (isBeforeStartDate(due, startDate)) due = addDays(due, 14);
        if (date.getTime() < due.getTime()) {
          bucket = addDays(bucket, -14);
          due = getFirstWeekdayOnOrAfter(bucket, schedule.dayOfWeek);
        }
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      if (interval === "twice_weekly") {
        const d1 = normalizeDayOfWeek(schedule.dayOfWeek);
        const d2 = normalizeDayOfWeek(schedule.dayOfWeek2);
        let cand = new Date(date);
        for (let i = 0; i <= 13; i++) {
          const dow = cand.getDay();
          if (dow === d1 || dow === d2) return isBeforeStartDate(cand, startDate) ? null : cand;
          cand = addDays(cand, -1);
        }
        return null;
      }
      if (interval === "monthly") {
        const wom = schedule.weekOfMonth || 1;
        let due = getNthWeekdayInMonth(date.getFullYear(), date.getMonth(), schedule.dayOfWeek, wom);
        if (date.getTime() < due.getTime()) {
          const prev = addMonthsClamped(date, -1);
          due = getNthWeekdayInMonth(prev.getFullYear(), prev.getMonth(), schedule.dayOfWeek, wom);
        }
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      if (interval === "every_other_month") {
        const wom = schedule.weekOfMonth || 1;
        let bucket = getEveryOtherMonthBucketStart(date, startDate);
        let due = getNthWeekdayInMonth(bucket.getFullYear(), bucket.getMonth(), schedule.dayOfWeek, wom);
        if (isBeforeStartDate(due, startDate)) {
          bucket = addMonthsClamped(bucket, 2);
          due = getNthWeekdayInMonth(bucket.getFullYear(), bucket.getMonth(), schedule.dayOfWeek, wom);
        }
        if (date.getTime() < due.getTime()) {
          bucket = addMonthsClamped(bucket, -2);
          due = getNthWeekdayInMonth(bucket.getFullYear(), bucket.getMonth(), schedule.dayOfWeek, wom);
        }
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      if (interval === "twice_a_year") {
        const due = getLatestTwiceYearlyDate(date, schedule);
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      if (interval === "yearly") {
        const mi = normalizeMonth(schedule.month) - 1;
        const wom = normalizeWeekOfMonth(schedule.weekOfMonth ?? 1);
        let due = getNthWeekdayInMonth(date.getFullYear(), mi, schedule.dayOfWeek, wom);
        if (date.getTime() < due.getTime()) due = getNthWeekdayInMonth(date.getFullYear()-1, mi, schedule.dayOfWeek, wom);
        return isBeforeStartDate(due, startDate) ? null : due;
      }
      return date;
    }

    function getScheduleLabel(recurrence, schedule = {}) {
      const r = normalizeRecurrence(recurrence);
      if (r === "daily") return "Every day";
      const wd = WEEKDAY_LABELS[normalizeDayOfWeek(schedule.dayOfWeek)] || "Monday";
      if (r === "weekly") return wd;
      if (r === "bi_weekly") return `${wd} (every 2 weeks)`;
      if (r === "twice_weekly") {
        const wd2 = WEEKDAY_LABELS[normalizeDayOfWeek(schedule.dayOfWeek2)] || "Thursday";
        return `${wd} & ${wd2}`;
      }
      if (r === "monthly") return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of month`;
      if (r === "every_other_month") return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} (every 2 months)`;
      if (r === "twice_a_year") {
        const m1 = normalizeMonth(schedule.month);
        const fallback = ((m1+5)%12)+1;
        const m2 = normalizeMonth(schedule.month2 ?? fallback);
        return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of ${MONTH_LABELS[m1-1]} & ${MONTH_LABELS[m2-1]}`;
      }
      if (r === "yearly") {
        const m = normalizeMonth(schedule.month);
        return `${getWeekOfMonthLabel(schedule.weekOfMonth)} ${wd} of ${MONTH_LABELS[m-1]}`;
      }
      return "";
    }

    function getAgeStatus(daysSinceStart){
      if (daysSinceStart >= 6) return "red";
      if (daysSinceStart >= 3) return "yellow";
      return "green";
    }

    async function loadAll({ silent = false } = {}) {
      if (isBusy) return;
      try {
        isBusy = true;
        if (!silent) setStatus("Loading…", false);
        const client = ensureClient();

        const tasksRes = await client
          .from(TASKS_TABLE)
          .select("id,title,active,recurrence_interval,recurrence_day_of_week,recurrence_day_of_week_2,recurrence_week_of_month,recurrence_month,recurrence_month_2,recurrence_day_of_month,recurrence_start_date,sort_order,created_at")
          .order("sort_order", { ascending: true, nullsLast: true })
          .order("created_at", { ascending: false });
        if (tasksRes.error) throw tasksRes.error;
        tasks = (tasksRes.data || []).filter(t => t.active !== false);

        const compRes = await client
          .from(COMPLETIONS_TABLE)
          .select("id,task_id,period_key,completed_at")
          .order("completed_at", { ascending: false });
        if (compRes.error) throw compRes.error;
        completions = compRes.data || [];

        setStatus("Connected", true);
        render();
      } catch (error) {
        console.error(error);
        setStatus("Error", false);
        if (!silent) showMessage(error?.message || "Failed to load.", "error");
      } finally {
        isBusy = false;
      }
    }

    function completionFor(taskId, periodKey){
      return completions.find(c => c.task_id === taskId && c.period_key === periodKey);
    }

    function render() {
      const now = new Date();
      const today = getStartOfDay(now);
      const todayKey = formatDateKey(today);

      dailyList.innerHTML = "";
      dateList.innerHTML = "";

      const dailyTasks = [];
      const dateTasks = [];

      for (const t of tasks) {
        const recurrence = normalizeRecurrence(t.recurrence_interval);
        const schedule = getTaskSchedule(t);
        if (recurrence === "daily") {
          if (completionFor(t.id, todayKey)) continue;
          dailyTasks.push({ task: t, recurrence, schedule, periodKey: todayKey, periodStart: today, daysSince: 0 });
        } else {
          const periodStart = getRecurrencePeriodStart(recurrence, schedule, today);
          if (!periodStart) continue;
          const periodKey = formatDateKey(periodStart);
          if (completionFor(t.id, periodKey)) continue;
          const daysSince = Math.floor((today.getTime() - periodStart.getTime()) / MS_PER_DAY);
          if (daysSince < 0) continue;
          dateTasks.push({ task: t, recurrence, schedule, periodKey, periodStart, daysSince });
        }
      }

      dailyTasks.sort((a,b) => (a.task.sort_order ?? 9999) - (b.task.sort_order ?? 9999) || a.task.title.localeCompare(b.task.title));
      dateTasks.sort((a,b) => b.daysSince - a.daysSince || a.task.title.localeCompare(b.task.title));

      dailyCount.textContent = dailyTasks.length ? `${dailyTasks.length} pending` : "";
      dateCount.textContent = dateTasks.length ? `${dateTasks.length} pending` : "";

      dailyEmpty.style.display = dailyTasks.length ? "none" : "block";
      dateEmpty.style.display = dateTasks.length ? "none" : "block";

      for (const row of dailyTasks) {
        const tile = document.createElement("article");
        tile.className = "tile status-green";
        tile.innerHTML = `
          <div class="tile-title">${escapeHtml(row.task.title)}</div>
          <div class="tile-meta"><span>Daily</span></div>
          <div class="tile-actions">
            <button class="tile-action primary" type="button" data-done="${escapeHtml(row.task.id)}" data-period="${escapeHtml(row.periodKey)}">Done</button>
          </div>
        `;
        tile.querySelector("[data-done]").addEventListener("click", () => markDone(row.task.id, row.periodKey));
        dailyList.appendChild(tile);
      }

      for (const row of dateTasks) {
        const status = getAgeStatus(row.daysSince);
        const tile = document.createElement("article");
        tile.className = `tile status-${status}`;
        const dueText = row.periodStart.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
        const dayNum = row.daysSince + 1;
        tile.innerHTML = `
          <div class="tile-title">${escapeHtml(row.task.title)}</div>
          <div class="tile-meta">
            <span>${escapeHtml(RECURRENCE_LABELS[row.recurrence] || "")}</span>
            <span>${escapeHtml(getScheduleLabel(row.recurrence, row.schedule))}</span>
            <span>Started ${escapeHtml(dueText)} · <span class="age-chip status-${status}">Day ${dayNum}</span></span>
          </div>
          <div class="tile-actions">
            <button class="tile-action primary" type="button" data-done="${escapeHtml(row.task.id)}" data-period="${escapeHtml(row.periodKey)}">Done</button>
          </div>
        `;
        tile.querySelector("[data-done]").addEventListener("click", () => markDone(row.task.id, row.periodKey));
        dateList.appendChild(tile);
      }
    }

    async function markDone(taskId, periodKey) {
      try {
        const client = ensureClient();
        const { error } = await client
          .from(COMPLETIONS_TABLE)
          .upsert({ task_id: taskId, period_key: periodKey, completed_at: new Date().toISOString() }, { onConflict: "task_id,period_key" });
        if (error) throw error;
        await loadAll({ silent: true });
      } catch (error) {
        console.error(error);
        showMessage(error?.message || "Failed to mark done.", "error");
      }
    }

    reloadBtn.addEventListener("click", () => loadAll());
    function syncIfVisible(){ if (document.visibilityState !== "hidden") loadAll({ silent: true }); }
    window.addEventListener("focus", syncIfVisible);
    document.addEventListener("visibilitychange", syncIfVisible);
    setInterval(syncIfVisible, SYNC_INTERVAL_MS);

    setStatus("Loading…", false);
    loadAll();
  </script>
</body>
</html>
