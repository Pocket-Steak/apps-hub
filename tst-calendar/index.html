<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Command Center TST Calendar</title>
  <meta name="description" content="PocketSteak Command Center TST calendar month view." />

  <style>
    :root{
      --panel:#1a1c22;
      --panel-2:#22252d;
      --surface:rgba(255,255,255,.045);
      --border:rgba(255,255,255,.08);
      --border-strong:rgba(255,255,255,.12);
      --text:#f3f4f6;
      --muted:#b8bcc8;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --shadow-soft:0 8px 20px rgba(0,0,0,.22);
      --radius:22px;
      --accent:#ff7a18;
      --accent-2:#ffb26f;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 0% 0%, rgba(255,122,24,.12), transparent 55%),
        linear-gradient(180deg,#0d0e11,#12141a 35%, #171922 100%);
      color:var(--text);
      padding:16px;
    }

    .page{
      max-width:1600px;
      margin:0 auto;
      display:grid;
      grid-template-rows:auto auto auto minmax(0, 1fr);
      gap:14px;
      height:calc(100dvh - 32px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav-btn,
    .icon-btn,
    .top-btn,
    .status-pill{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border-strong);
      border-radius:16px;
      box-shadow:var(--shadow);
    }

    .nav-btn,
    .top-btn,
    .icon-btn{
      border:none;
      color:var(--text);
      padding:12px 16px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      min-height:48px;
      transition:transform .18s ease, background .18s ease, filter .18s ease;
    }

    .nav-btn:hover,
    .top-btn:hover,
    .icon-btn:hover{
      background:linear-gradient(180deg,#24272f,#2c3039);
      transform:translateY(-1px);
    }

    .top-btn.accent{
      background:var(--accent);
      border-color:transparent;
    }

    .top-btn.accent:hover{
      filter:brightness(1.06);
    }

    .status-pill{
      min-height:48px;
      padding:8px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:2px;
      min-width:260px;
    }

    .status-label{
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .status-text{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .month-bar,
    .legend,
    .calendar-shell{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.05), transparent 34%),
        linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border-strong);
      border-radius:22px;
      box-shadow:var(--shadow);
    }

    .month-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 18px;
      gap:12px;
    }

    .month-title{
      font-size:25px;
      font-weight:850;
      text-align:center;
      flex:1;
    }

    .icon-btn{
      min-width:48px;
      font-size:18px;
    }

    .legend{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      padding:12px 14px;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      font-weight:800;
      color:var(--muted);
    }

    .swatch{
      width:14px;
      height:14px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .calendar-shell{
      min-height:0;
      overflow:hidden;
      display:grid;
      grid-template-rows:auto minmax(0, 1fr);
    }

    .weekday-row,
    .month-grid{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
    }

    .month-grid{
      min-height:0;
      overflow:auto;
    }

    .weekday-row{
      background:var(--surface);
      border-bottom:1px solid var(--border);
    }

    .weekday{
      padding:12px 8px;
      text-align:center;
      font-size:13px;
      font-weight:900;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .day-cell{
      min-height:132px;
      border-right:1px solid var(--border);
      border-bottom:1px solid var(--border);
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:6px;
      cursor:pointer;
      transition:background .18s ease, box-shadow .18s ease;
    }

    .day-cell:nth-child(7n){
      border-right:none;
    }

    .day-cell:hover{
      background:rgba(255,255,255,.04);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .day-cell.faded{
      opacity:.42;
    }

    .day-cell.today{
      outline:2px solid rgba(255,122,24,.55);
      outline-offset:-2px;
    }

    .day-number{
      font-size:15px;
      font-weight:900;
    }

    .event-list{
      display:grid;
      gap:4px;
      overflow:hidden;
    }

    .event-chip{
      border-radius:10px;
      padding:5px 7px;
      font-size:11px;
      font-weight:800;
      line-height:1.2;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      box-shadow:var(--shadow-soft);
    }

    .more{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      padding-top:2px;
    }

    .empty-month{
      padding:16px;
      color:var(--muted);
      font-weight:700;
    }

    @media (max-width: 1100px){
      body{
        padding:16px;
      }

      .topbar{
        align-items:stretch;
      }

      .top-actions{
        width:100%;
      }

      .top-actions .top-btn,
      .top-actions .nav-btn{
        flex:1 1 180px;
      }

      .status-pill{
        flex:1 1 260px;
      }

      .day-cell{
        min-height:130px;
      }
    }

    @media (max-width: 800px){
      body{
        padding:14px;
      }

      .month-title{
        font-size:22px;
      }

      .day-cell{
        min-height:110px;
        padding:8px;
      }

      .event-chip{
        font-size:11px;
      }

      .topbar{
        align-items:stretch;
      }

      .top-actions{
        width:100%;
      }

      .top-actions .top-btn,
      .top-actions .nav-btn{
        flex:1 1 0;
      }

      .month-bar{
        padding:14px 16px;
      }
    }

    @media (orientation: landscape) and (max-height: 900px){
      body{
        padding:12px;
      }

      .page{
        gap:12px;
      }

      .top-btn,
      .nav-btn,
      .icon-btn{
        min-height:44px;
        padding:10px 14px;
      }

      .status-pill{
        min-height:44px;
        padding:8px 12px;
      }

      .month-bar{
        padding:12px 14px;
      }

      .month-title{
        font-size:21px;
      }

      .legend{
        padding:10px 12px;
        gap:10px;
      }

      .legend-item{
        font-size:13px;
      }

      .weekday{
        padding:10px 6px;
        font-size:12px;
      }

      .day-cell{
        min-height:108px;
        padding:7px;
      }
    }

    @media (max-height: 960px){
      body{
        padding:12px;
      }

      .page{
        gap:12px;
        height:calc(100dvh - 24px);
      }

      .top-actions{
        gap:10px;
      }

      .nav-btn,
      .top-btn,
      .icon-btn{
        min-height:42px;
        padding:10px 14px;
        font-size:14px;
      }

      .status-pill{
        min-height:42px;
        padding:7px 12px;
      }

      .month-bar{
        padding:12px 14px;
      }

      .month-title{
        font-size:22px;
      }

      .legend{
        padding:10px 12px;
      }

      .weekday{
        padding:10px 6px;
        font-size:12px;
      }

      .day-cell{
        min-height:114px;
        padding:7px;
        gap:5px;
      }
    }

    @media (orientation: landscape) and (max-height: 820px){
      body{
        padding:10px;
      }

      .page{
        gap:10px;
        height:calc(100dvh - 20px);
      }

      .top-actions{
        gap:8px;
      }

      .nav-btn,
      .top-btn,
      .icon-btn{
        min-height:38px;
        padding:8px 12px;
        font-size:13px;
      }

      .status-pill{
        min-height:38px;
        padding:6px 10px;
      }

      .month-bar{
        padding:10px 12px;
      }

      .month-title{
        font-size:20px;
      }

      .legend{
        gap:10px;
        padding:9px 10px;
      }

      .legend-item{
        font-size:12px;
      }

      .day-cell{
        min-height:98px;
        padding:6px;
        gap:4px;
      }

      .day-number{
        font-size:13px;
      }

      .event-chip,
      .more{
        font-size:10px;
      }
    }
  </style>

    <section class="month-bar">
      <button class="icon-btn" id="prevMonthBtn" type="button">←</button>

      <button class="icon-btn" id="nextMonthBtn" type="button">→</button>
    </section>

    <section class="legend" id="legend"></section>

    <section class="calendar-shell">
      <div class="weekday-row" id="weekdayRow"></div>
      <div class="month-grid" id="monthGrid"></div>
    </section>
  </div>

  <script>
    const CLIENT_ID = "82204016171-ta1ipuu88gie0tkq69je3di5uifu1kki.apps.googleusercontent.com";
    const API_KEY = "AIzaSyBPZEeYB8IaheJPJA2Y44msGfDwIhJMpGU";
    const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
    const SCOPES = [
      "https://www.googleapis.com/auth/calendar",
      "https://www.googleapis.com/auth/spreadsheets",
    ].join(" ");

    const TOKEN_KEY = "pocketsteak_google_access_token";
    const TOKEN_EXP_KEY = "pocketsteak_google_token_exp";
    const STORAGE_KEY = "pocketsteak-family-events";

    let tokenClient = null;
    let gapiInited = false;
    let gisInited = false;
    let currentDate = new Date();
    let calendarsById = new Map();
    let monthEvents = [];

    function setStatus(text) {
      document.getElementById("statusText").textContent = text;
    }

    function saveToken(accessToken, expiresInSeconds = 3600) {
      const expiresAt = Date.now() + (expiresInSeconds * 1000);
      localStorage.setItem(TOKEN_KEY, accessToken);
      localStorage.setItem(TOKEN_EXP_KEY, String(expiresAt));
    }

    function getSavedToken() {
      const token = localStorage.getItem(TOKEN_KEY);
      const exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || "0");
      if (!token || !exp) return null;
      if (Date.now() >= exp) {
        clearSavedToken();
        return null;
      }
      return token;
    }

    function clearSavedToken() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(TOKEN_EXP_KEY);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatMonthTitle(date) {
      return date.toLocaleDateString(undefined, {
        month: "long",
        year: "numeric"
      });
    }

    function isSameDate(a, b) {
      return (
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate()
      );
    }

    function getMondayFirstIndex(date) {
      const day = date.getDay();
      return day === 0 ? 6 : day - 1;
    }

    function getCalendarColor(calendarId) {
      const found = calendarsById.get(calendarId);
      return found?.backgroundColor || "#ff7a18";
    }

    function getEventDateKey(event) {
      if (event.start.date) return event.start.date;
      return formatDateKey(new Date(event.start.dateTime));
    }

    function getEventsForDate(dateKey) {
      return [...monthEvents]
        .filter(event => getEventDateKey(event) === dateKey)
        .sort((a, b) => {
          const aStart = a.start.dateTime || `${a.start.date}T00:00:00`;
          const bStart = b.start.dateTime || `${b.start.date}T00:00:00`;
          return aStart.localeCompare(bStart);
        });
    }

    function buildLegend() {
      const legend = document.getElementById("legend");
      const calendars = [...calendarsById.values()].filter(cal => cal.selected !== false);

      if (calendars.length === 0) {
        legend.innerHTML = `<div class="empty-month">Connect Google Calendar to load your calendars.</div>`;
        return;
      }

      legend.innerHTML = calendars.map(cal => `
        <div class="legend-item">
          <span class="swatch" style="background:${cal.backgroundColor || "#ff7a18"}"></span>
          <span>${cal.summary}</span>
        </div>
      `).join("");
    }

    function buildWeekdays() {
      const names = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      document.getElementById("weekdayRow").innerHTML = names
        .map(name => `<div class="weekday">${name}</div>`)
        .join("");
    }

    function getMonthCells(viewDate) {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstOfMonth = new Date(year, month, 1);
      const startOffset = getMondayFirstIndex(firstOfMonth);
      const gridStart = new Date(year, month, 1 - startOffset);

      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        cells.push(d);
      }
      return cells;
    }

    function renderMonth() {
      document.getElementById("monthTitle").textContent = formatMonthTitle(currentDate);

      const monthGrid = document.getElementById("monthGrid");
      const today = new Date();
      const currentMonth = currentDate.getMonth();
      const cells = getMonthCells(currentDate);

      monthGrid.innerHTML = cells.map(date => {
        const key = formatDateKey(date);
        const events = getEventsForDate(key);
        const faded = date.getMonth() !== currentMonth ? "faded" : "";
        const todayClass = isSameDate(date, today) ? "today" : "";
        const visibleEvents = events.slice(0, 4);
        const remaining = events.length - visibleEvents.length;

        return `
          <article class="day-cell ${faded} ${todayClass}" data-date="${key}">
            <div class="day-number">${date.getDate()}</div>
            <div class="event-list">
              ${visibleEvents.map(event => `
                <div class="event-chip" style="background:${getCalendarColor(event.calendarId)}">
                  ${event.summary || "(Untitled event)"}
                </div>
              `).join("")}
              ${remaining > 0 ? `<div class="more">+ ${remaining} more</div>` : ""}
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".day-cell").forEach(cell => {
        cell.addEventListener("click", () => {
          window.location.href = `/tst-day/?date=${cell.dataset.date}`;
        });
      });
    }

    async function gapiLoaded() {
      await new Promise((resolve) => gapi.load("client", resolve));
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });
      gapiInited = true;
      maybeReady();
    }

    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) {
            console.error(resp);
            setStatus("Connection failed");
            return;
          }

          const token = gapi.client.getToken();
          if (token?.access_token) {
            saveToken(token.access_token, resp.expires_in || 3600);
          }

          document.getElementById("authBtn").textContent = "Refresh";
          document.getElementById("signOutBtn").style.display = "inline-flex";

          await loadGoogleCalendarData();
        },
      });

      gisInited = true;
      maybeReady();
    }

    async function maybeReady() {
      if (!gapiInited || !gisInited) return;

      document.getElementById("authBtn").disabled = false;

      const savedToken = getSavedToken();
      if (savedToken) {
        gapi.client.setToken({ access_token: savedToken });
        document.getElementById("authBtn").textContent = "Refresh";
        document.getElementById("signOutBtn").style.display = "inline-flex";
        setStatus("Restoring connection…");
        await loadGoogleCalendarData();
      } else {
        setStatus("Not connected");
      }
    }

    async function handleAuthClick() {
      if (!tokenClient) return;
      setStatus("Connecting…");
      tokenClient.requestAccessToken({ prompt: "consent" });
    }

    function handleSignoutClick() {
      const token = gapi.client.getToken();
      if (token?.access_token) {
        google.accounts.oauth2.revoke(token.access_token);
      }

      gapi.client.setToken("");
      clearSavedToken();
      calendarsById = new Map();
      monthEvents = [];
      document.getElementById("authBtn").textContent = "Connect";
      document.getElementById("signOutBtn").style.display = "none";
      setStatus("Not connected");
      buildLegend();
      renderMonth();
    }

    async function loadGoogleCalendarData() {
      try {
        setStatus("Loading calendars…");

        const calendarResp = await gapi.client.calendar.calendarList.list();
        const calendars = calendarResp.result.items || [];
        const visibleCalendars = calendars.filter(cal => cal.selected !== false);

        calendarsById = new Map(
          visibleCalendars.map(cal => [cal.id, cal])
        );

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 1);

        const responses = await Promise.all(
          visibleCalendars.map(cal =>
            gapi.client.calendar.events.list({
              calendarId: cal.id,
              timeMin: firstDay.toISOString(),
              timeMax: lastDay.toISOString(),
              showDeleted: false,
              singleEvents: true,
              orderBy: "startTime",
              maxResults: 250,
            }).then(resp => {
              const items = resp.result.items || [];
              return items.map(event => ({
                ...event,
                calendarId: cal.id,
              }));
            })
          )
        );

        monthEvents = responses.flat();

        buildLegend();
        renderMonth();
        setStatus(`Loaded ${monthEvents.length} events`);
      } catch (err) {
        console.error(err);
        setStatus("Load failed");
      }
    }

    document.getElementById("backHomeBtn").addEventListener("click", () => {
      window.location.href = "/family-tst/";
    });

    document.getElementById("authBtn").addEventListener("click", handleAuthClick);
    document.getElementById("signOutBtn").addEventListener("click", handleSignoutClick);

    document.getElementById("prevMonthBtn").addEventListener("click", async () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
      renderMonth();
      if (getSavedToken()) {
        await loadGoogleCalendarData();
      }
    });

    document.getElementById("nextMonthBtn").addEventListener("click", async () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
      renderMonth();
      if (getSavedToken()) {
        await loadGoogleCalendarData();
      }
    });

    buildWeekdays();
    buildLegend();
    renderMonth();

    document.getElementById("authBtn").disabled = true;

    window.addEventListener("load", async () => {
      try {
        await gapiLoaded();
        gisLoaded();
      } catch (err) {
        console.error(err);
        setStatus("Setup failed");
      }
    });
  </script>
</body>
</html>
